<script>
/* ═══════════════════════════════════════════════════════════════════════════
   HUDDLE — team weekly meeting (V3.9.1)

   A huddle is a meeting. Inside the meeting, you walk through partners and
   capture: was it discussed (note), do we need to come back to it next week
   (followup checkbox)?

   "Pull forward" button populates this week's meeting with last week's
   followup partners + their prior notes as context.

   No delete. Edit only. Edits append to history.
═══════════════════════════════════════════════════════════════════════════ */

var huddleState = {
  loading: false,
  weeks: 12,
  data: null,
  lastFetchTeam: null,
  modalOpen: false,
  modalEditingId: null,
  modalDraft: { week_start: '', title: '', partner_notes: [], general_notes: '' },
  partnerSuggest: { items: [] },
  pullForwardAvailable: null   // { count, items } | null while loading
};

function initHuddleView() {
  var host = document.getElementById('view-huddle');
  if (!host) return;
  if (huddleState.data && huddleState.lastFetchTeam === _userTeam) {
    huddleRenderBody_();
    return;
  }
  host.innerHTML = huddleShellHtml_();
  loadHuddle();
  refreshIcons();
}

function huddleShellHtml_() {
  return ''
    + '<div class="filter-bar" style="justify-content:space-between;padding:10px 14px">'
      + '<div style="display:flex;align-items:center;gap:10px">'
        + '<span style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4)">Window</span>'
        + '<select id="huddleWeeks" class="nx-select" onchange="huddleSetWeeks(parseInt(this.value,10))">'
          + ['4','12','26','52','0'].map(function(v) {
              var sel = parseInt(v, 10) === huddleState.weeks ? ' selected' : '';
              var label = v === '0' ? 'All time' : 'Last ' + v + (v === '52' ? ' weeks (1y)' : ' weeks');
              return '<option value="' + v + '"' + sel + '>' + label + '</option>';
            }).join('')
        + '</select>'
        + '<span id="huddleCount" style="font-size:10px;color:var(--ink-4)">—</span>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
        + '<button class="btn-ghost" onclick="loadHuddle()"><i data-lucide="refresh-cw" style="width:12px;height:12px"></i> Refresh</button>'
        + '<button class="btn-primary" onclick="huddleOpenModal(null)"><i data-lucide="plus" style="width:12px;height:12px"></i> New Meeting</button>'
      + '</div>'
    + '</div>'
    + '<div id="huddleBody" style="flex:1;overflow-y:auto;background:var(--bg);padding:18px 24px"></div>';
}

function huddleSetWeeks(w) { huddleState.weeks = w; loadHuddle(); }

function loadHuddle() {
  huddleState.loading = true;
  huddleRenderBody_();
  google.script.run
    .withSuccessHandler(function(d) {
      huddleState.loading = false;
      huddleState.data = d || { team: _userTeam, entries: [] };
      huddleState.lastFetchTeam = _userTeam;
      huddleRenderBody_();
    })
    .withFailureHandler(function() {
      huddleState.loading = false;
      huddleState.data = { team: _userTeam, entries: [] };
      huddleRenderBody_();
    })
    .getHuddleLog(_userTeam, huddleState.weeks);
}

function huddleRenderBody_() {
  var el = document.getElementById('huddleBody');
  var countEl = document.getElementById('huddleCount');
  if (!el) return;

  if (huddleState.loading) {
    el.innerHTML = '<div style="padding:60px;text-align:center;color:var(--ink-4);font-size:12px"><i data-lucide="loader-2" class="spin" style="width:14px;height:14px;vertical-align:middle"></i> Loading meetings…</div>';
    if (countEl) countEl.textContent = '—';
    refreshIcons();
    return;
  }

  var entries = (huddleState.data && huddleState.data.entries) || [];
  if (countEl) countEl.textContent = entries.length + (entries.length === 1 ? ' meeting' : ' meetings');

  if (!entries.length) {
    el.innerHTML = '<div class="section-card" style="padding:48px 20px;text-align:center;color:var(--ink-4);font-size:12px">'
      + '<i data-lucide="users-round" style="width:32px;height:32px;opacity:0.4;display:block;margin:0 auto 12px"></i>'
      + '<div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px">No meetings logged</div>'
      + '<div style="margin-bottom:16px">Capture this week\'s team meeting — partner-by-partner, what was discussed, what needs followup.</div>'
      + '<button class="btn-primary" onclick="huddleOpenModal(null)"><i data-lucide="plus" style="width:12px;height:12px"></i> New Meeting</button>'
    + '</div>';
    refreshIcons();
    return;
  }

  // Group by week_start
  var groups = {};
  entries.forEach(function(e) {
    var key = (e.week_start || '').slice(0, 10);
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  var weekKeys = Object.keys(groups).sort(function(a, b) { return b.localeCompare(a); });

  el.innerHTML = weekKeys.map(function(wk) {
    return '<div style="margin-bottom:24px">'
      + '<div style="font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-4);margin-bottom:8px;padding-left:2px">' + huddleWeekLabel_(wk) + '</div>'
      + groups[wk].map(huddleEntryCardHtml_).join('')
    + '</div>';
  }).join('');
  refreshIcons();
}

function huddleEntryCardHtml_(e) {
  var author = huddleAuthorShort_(e.created_by);
  var ts = huddleDateStr_(e.created_ts);
  var editedSuffix = e.last_edited_ts
    ? ' · <span style="color:var(--ink-4);font-style:italic">edited ' + huddleDateStr_(e.last_edited_ts) + '</span>'
    : '';

  // Per-partner rows (compact). Followup pill on the right.
  var partnerRowsHtml = '';
  var followupCount = 0;
  if (e.partner_notes && e.partner_notes.length) {
    partnerRowsHtml = '<div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">'
      + e.partner_notes.map(function(pn) {
          if (pn.followup) followupCount++;
          var followupPill = pn.followup
            ? '<span style="font-size:8px;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:1px 6px;border-radius:99px;letter-spacing:0.06em;flex-shrink:0">FOLLOWUP</span>'
            : '';
          var noteHtml = pn.note
            ? '<div style="font-size:11.5px;color:var(--ink-2);margin-top:2px;line-height:1.5;white-space:pre-wrap">' + esc(pn.note) + '</div>'
            : '<div style="font-size:11px;color:var(--ink-4);font-style:italic;margin-top:1px">All good — no notes</div>';
          return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px">'
            + '<div style="display:flex;align-items:center;gap:8px">'
              + '<span style="font-weight:700;font-size:12px;color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(pn.partner) + '</span>'
              + followupPill
            + '</div>'
            + noteHtml
          + '</div>';
        }).join('')
    + '</div>';
  }

  var generalHtml = e.general_notes
    ? '<div style="margin-top:10px;background:var(--bg);border:1px dashed var(--border);border-radius:8px;padding:8px 12px">'
      + '<div style="font-size:8.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4);margin-bottom:4px">General notes</div>'
      + '<div style="font-size:11.5px;color:var(--ink-2);line-height:1.5;white-space:pre-wrap">' + esc(e.general_notes) + '</div>'
    + '</div>'
    : '';

  var followupBadge = followupCount > 0
    ? '<span style="font-size:9px;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:2px 8px;border-radius:99px;letter-spacing:0.04em">' + followupCount + ' FOLLOWUP' + (followupCount === 1 ? '' : 'S') + '</span>'
    : '';
  var partnerCount = (e.partner_notes || []).length;
  var countBadge = partnerCount > 0
    ? '<span style="font-size:10px;color:var(--ink-3);font-weight:600">' + partnerCount + ' partner' + (partnerCount === 1 ? '' : 's') + '</span>'
    : '';

  return '<div class="section-card" style="margin:0 0 8px;padding:14px 16px">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'
      + '<div style="flex:1;min-width:0">'
        + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
          + '<span style="font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-0.01em;line-height:1.3">' + esc(e.title || '(Untitled meeting)') + '</span>'
          + countBadge
          + followupBadge
        + '</div>'
        + '<div style="font-size:10px;color:var(--ink-4);margin-top:3px">' + esc(author) + ' · ' + esc(ts) + editedSuffix + '</div>'
      + '</div>'
      + '<button class="icon-btn" onclick="huddleOpenModal(\'' + esc(e.id) + '\')" title="Edit" style="width:26px;height:26px;flex-shrink:0"><i data-lucide="pencil" style="width:11px;height:11px"></i></button>'
    + '</div>'
    + partnerRowsHtml
    + generalHtml
  + '</div>';
}

function huddleWeekLabel_(weekIso) {
  if (!weekIso) return 'Unknown week';
  var d = new Date(weekIso);
  if (isNaN(d.getTime())) return weekIso;
  var monStr = d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short' });
  var end = new Date(d.getTime());
  end.setDate(end.getDate() + 6);
  var endStr = end.toLocaleDateString('en-IE', { day: 'numeric', month: 'short', year: 'numeric' });
  var thisMon = huddleCurrentWeekStart_();
  var isThisWeek = weekIso === thisMon.slice(0, 10);
  var prefix = isThisWeek ? 'This week · ' : '';
  return prefix + 'Week of ' + monStr + ' – ' + endStr;
}

function huddleDateStr_(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short', year: 'numeric' }) + ' · ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function huddleAuthorShort_(email) {
  return (email || '').split('@')[0].split('.').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ') || '—';
}

function huddleCurrentWeekStart_() {
  var d = new Date();
  var day = d.getDay();
  var diff = (day === 0) ? -6 : (1 - day);
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d.toISOString().slice(0, 10);
}

/* ── ADD/EDIT MODAL ─────────────────────────────────────────────────────── */

function huddleOpenModal(editingId) {
  huddleState.modalOpen = true;
  huddleState.modalEditingId = editingId;
  huddleState.pullForwardAvailable = null;

  if (editingId) {
    var entry = (huddleState.data.entries || []).find(function(e) { return e.id === editingId; });
    if (!entry) { showToast('Entry not found', 'error'); return; }
    huddleState.modalDraft = {
      week_start: (entry.week_start || '').slice(0, 10),
      title: entry.title || '',
      partner_notes: (entry.partner_notes || []).map(function(p) {
        return { partner: p.partner, note: p.note || '', followup: !!p.followup };
      }),
      general_notes: entry.general_notes || ''
    };
  } else {
    huddleState.modalDraft = {
      week_start: huddleCurrentWeekStart_(),
      title: huddleSuggestedTitle_(),
      partner_notes: [],
      general_notes: ''
    };
  }
  huddleRenderModal_();

  // For new meetings, fetch last week's followups so we can offer "Pull forward".
  if (!editingId) {
    google.script.run
      .withSuccessHandler(function(items) {
        huddleState.pullForwardAvailable = { count: (items || []).length, items: items || [] };
        huddleUpdatePullForwardBtn_();
      })
      .withFailureHandler(function() {
        huddleState.pullForwardAvailable = { count: 0, items: [] };
        huddleUpdatePullForwardBtn_();
      })
      .getLastWeekFollowups(_userTeam);
  }
}

function huddleSuggestedTitle_() {
  var d = new Date();
  return d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short' }) + ' Sync';
}

function huddleCloseModal() {
  huddleState.modalOpen = false;
  huddleState.modalEditingId = null;
  var m = document.getElementById('huddleModal');
  if (m) m.remove();
}

function huddleRenderModal_() {
  var existing = document.getElementById('huddleModal');
  if (existing) existing.remove();
  var d = huddleState.modalDraft;
  var titleText = huddleState.modalEditingId ? 'Edit Meeting' : 'New Meeting';
  var modal = document.createElement('div');
  modal.id = 'huddleModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(15,15,15,0.45);z-index:5000;display:flex;align-items:center;justify-content:center;padding:24px';
  modal.innerHTML = ''
    + '<div style="background:var(--surface);border-radius:14px;width:100%;max-width:760px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 16px 40px rgba(0,0,0,0.16);overflow:hidden">'
      + '<div style="padding:16px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">'
        + '<div>'
          + '<div style="font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-4)">Huddle</div>'
          + '<div style="font-size:18px;font-weight:700;letter-spacing:-0.01em;margin-top:2px">' + titleText + '</div>'
        + '</div>'
        + '<button class="icon-btn" onclick="huddleCloseModal()" style="width:30px;height:30px"><i data-lucide="x" style="width:14px;height:14px"></i></button>'
      + '</div>'
      + '<div style="padding:16px 22px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px">'
        + '<div style="display:grid;grid-template-columns:1fr 180px;gap:10px">'
          + '<div>'
            + '<label class="nx-field-label">Title</label>'
            + '<input type="text" id="huddleTitleInput" value="' + esc(d.title) + '" placeholder="e.g. Apr 28 Sync" class="nx-field-input" style="font-size:13px">'
          + '</div>'
          + '<div>'
            + '<label class="nx-field-label">Week</label>'
            + '<input type="date" id="huddleWeekInput" value="' + esc(d.week_start) + '" class="nx-field-input" style="font-size:13px">'
          + '</div>'
        + '</div>'

        + '<div>'
          + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
            + '<label class="nx-field-label" style="margin:0">Partners discussed</label>'
            + '<button id="huddlePullFwdBtn" class="btn-ghost" onclick="huddlePullForward()" style="display:none;font-size:11px;padding:4px 10px"><i data-lucide="corner-down-right" style="width:11px;height:11px"></i> <span id="huddlePullFwdLabel">Pull forward</span></button>'
          + '</div>'
          + '<div id="huddlePartnerList" style="display:flex;flex-direction:column;gap:6px"></div>'
          + '<div style="position:relative;margin-top:8px">'
            + '<input type="text" id="huddlePartnerInput" placeholder="Add partner — type to search…" oninput="huddlePartnerSearch(this.value)" onkeydown="huddlePartnerKey(event)" autocomplete="off" class="nx-field-input" style="font-size:12px">'
            + '<div id="huddlePartnerSuggest" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-top:4px;max-height:240px;overflow-y:auto;z-index:20;box-shadow:0 6px 18px rgba(0,0,0,0.08)"></div>'
          + '</div>'
        + '</div>'

        + '<div>'
          + '<label class="nx-field-label">General notes <span style="color:var(--ink-4);font-weight:500">(optional — for non-partner items)</span></label>'
          + '<textarea id="huddleGeneralInput" placeholder="Process changes, scheduling, anything not tied to a specific partner…" class="nx-field-input" style="font-size:13px;min-height:80px;resize:vertical;font-family:inherit;line-height:1.5"></textarea>'
        + '</div>'
      + '</div>'
      + '<div style="padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px">'
        + (huddleState.modalEditingId ? '<button class="btn-ghost" onclick="huddleShowHistory()"><i data-lucide="history" style="width:12px;height:12px"></i> History</button>' : '<span></span>')
        + '<div style="display:flex;gap:8px">'
          + '<button class="btn-ghost" onclick="huddleCloseModal()">Cancel</button>'
          + '<button class="btn-primary" id="huddleSaveBtn" onclick="huddleSubmit()"><i data-lucide="check" style="width:12px;height:12px"></i> ' + (huddleState.modalEditingId ? 'Save Changes' : 'Save Meeting') + '</button>'
        + '</div>'
      + '</div>'
    + '</div>';
  document.body.appendChild(modal);
  document.getElementById('huddleGeneralInput').value = d.general_notes || '';
  huddleRenderPartnerList_();
  refreshIcons();
}

function huddleRenderPartnerList_() {
  var wrap = document.getElementById('huddlePartnerList');
  if (!wrap) return;
  var rows = huddleState.modalDraft.partner_notes;
  if (!rows.length) {
    wrap.innerHTML = '<div style="padding:14px;text-align:center;border:1px dashed var(--border);border-radius:8px;font-size:11px;color:var(--ink-4)">No partners yet — type below to add. Each partner gets a note + a "needs followup" checkbox.</div>';
    return;
  }
  wrap.innerHTML = rows.map(function(p, idx) {
    return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
        + '<span style="font-weight:700;font-size:12px;color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(p.partner) + '</span>'
        + '<label style="display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--ink-3);cursor:pointer;user-select:none;font-weight:600">'
          + '<input type="checkbox" ' + (p.followup ? 'checked' : '') + ' onchange="huddleTogglePartnerFollowup(' + idx + ',this.checked)" style="accent-color:#92400e;width:13px;height:13px">'
          + ' Followup'
        + '</label>'
        + '<button class="icon-btn" onclick="huddleRemovePartner(' + idx + ')" title="Remove" style="width:24px;height:24px"><i data-lucide="x" style="width:11px;height:11px"></i></button>'
      + '</div>'
      + '<textarea oninput="huddleUpdatePartnerNote(' + idx + ',this.value)" placeholder="What was discussed? Or leave blank if all good." class="nx-field-input" style="font-size:12px;min-height:50px;resize:vertical;font-family:inherit;line-height:1.5;padding:6px 10px">' + esc(p.note) + '</textarea>'
    + '</div>';
  }).join('');
  refreshIcons();
}

function huddleUpdatePartnerNote(idx, val) {
  if (huddleState.modalDraft.partner_notes[idx]) {
    huddleState.modalDraft.partner_notes[idx].note = val;
  }
}

function huddleTogglePartnerFollowup(idx, val) {
  if (huddleState.modalDraft.partner_notes[idx]) {
    huddleState.modalDraft.partner_notes[idx].followup = !!val;
  }
}

function huddleRemovePartner(idx) {
  huddleState.modalDraft.partner_notes.splice(idx, 1);
  huddleRenderPartnerList_();
}

function huddlePartnerSearch(query) {
  var sug = document.getElementById('huddlePartnerSuggest');
  if (!sug) return;
  var q = String(query || '').toLowerCase().trim();
  if (!q) { sug.style.display = 'none'; return; }
  var existing = {};
  huddleState.modalDraft.partner_notes.forEach(function(p) { existing[p.partner.toLowerCase()] = true; });
  var matched = (typeof P !== 'undefined' ? P : []).filter(function(p) {
    var n = String(p.company || '').toLowerCase();
    return n.indexOf(q) > -1 && !existing[n];
  }).slice(0, 8);
  if (!matched.length) { sug.style.display = 'none'; return; }
  sug.innerHTML = matched.map(function(p) {
    return '<div onclick="huddleAddPartner(\'' + esc(p.company).replace(/'/g, "\\'") + '\')" style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);color:var(--ink)" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'">'
      + esc(p.company)
      + '<span style="font-size:10px;color:var(--ink-4);margin-left:8px">' + esc(p.country || '') + '</span>'
    + '</div>';
  }).join('');
  sug.style.display = 'block';
}

function huddlePartnerKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    var v = e.target.value.trim();
    if (v) huddleAddPartner(v);
  }
}

function huddleAddPartner(name) {
  if (!name) return;
  var existing = huddleState.modalDraft.partner_notes.some(function(p) {
    return p.partner.toLowerCase() === name.toLowerCase();
  });
  if (!existing) {
    huddleState.modalDraft.partner_notes.push({ partner: name, note: '', followup: false });
  }
  document.getElementById('huddlePartnerInput').value = '';
  document.getElementById('huddlePartnerSuggest').style.display = 'none';
  huddleRenderPartnerList_();
}

function huddleUpdatePullForwardBtn_() {
  var btn = document.getElementById('huddlePullFwdBtn');
  var lbl = document.getElementById('huddlePullFwdLabel');
  if (!btn) return;
  var pf = huddleState.pullForwardAvailable;
  if (!pf || pf.count <= 0) { btn.style.display = 'none'; return; }
  btn.style.display = 'inline-flex';
  if (lbl) lbl.textContent = 'Pull forward (' + pf.count + ')';
  refreshIcons();
}

function huddlePullForward() {
  var pf = huddleState.pullForwardAvailable;
  if (!pf || !pf.items || !pf.items.length) return;
  var existing = {};
  huddleState.modalDraft.partner_notes.forEach(function(p) { existing[p.partner.toLowerCase()] = true; });
  var added = 0;
  pf.items.forEach(function(item) {
    var k = (item.partner || '').toLowerCase();
    if (!k || existing[k]) return;
    existing[k] = true;
    huddleState.modalDraft.partner_notes.push({
      partner: item.partner,
      note: item.note ? '[from prior meeting] ' + item.note : '',
      followup: false  // don't auto-flag — fresh meeting, user re-decides
    });
    added++;
  });
  if (added > 0) {
    huddleRenderPartnerList_();
    showToast(added + ' partner' + (added === 1 ? '' : 's') + ' pulled forward', 'success');
  }
  // Hide the button after first use to avoid double-pull
  var btn = document.getElementById('huddlePullFwdBtn');
  if (btn) btn.style.display = 'none';
}

function huddleShowHistory() {
  var entry = (huddleState.data.entries || []).find(function(e) { return e.id === huddleState.modalEditingId; });
  if (!entry || !entry.edit_history || !entry.edit_history.length) {
    showToast('No edit history yet', 'info');
    return;
  }
  var lines = entry.edit_history.map(function(h) {
    return huddleDateStr_(h.ts) + ' · ' + (h.by || '') + (h.prev_title ? ' · "' + h.prev_title + '"' : '');
  });
  alert('Edit History:\n\n' + lines.join('\n'));
}

function huddleSubmit() {
  var weekIn = document.getElementById('huddleWeekInput').value;
  var title = document.getElementById('huddleTitleInput').value.trim();
  var generalNotes = document.getElementById('huddleGeneralInput').value.trim();
  var partnerNotes = huddleState.modalDraft.partner_notes;

  if (!title && !generalNotes && !partnerNotes.length) {
    showToast('Add a title, partner, or general note', 'error');
    return;
  }
  var weekIso = weekIn ? new Date(weekIn).toISOString() : new Date().toISOString();

  var btn = document.getElementById('huddleSaveBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="spin" style="width:12px;height:12px"></i> Saving…'; refreshIcons(); }

  var payload = {
    week_start: weekIso,
    title: title,
    partner_notes: partnerNotes,
    general_notes: generalNotes
  };

  var fn = huddleState.modalEditingId ? 'editHuddleEntry' : 'addHuddleEntry';
  var args = huddleState.modalEditingId ? [_userTeam, huddleState.modalEditingId, payload] : [_userTeam, payload];
  google.script.run
    .withSuccessHandler(function(res) { huddleAfterSubmit_(res); })
    .withFailureHandler(function(e) { huddleAfterSubmit_({ success: false, error: (e && e.message) || e }); })
    [fn].apply(null, args);
}

function huddleAfterSubmit_(res) {
  var btn = document.getElementById('huddleSaveBtn');
  if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="check" style="width:12px;height:12px"></i> ' + (huddleState.modalEditingId ? 'Save Changes' : 'Save Meeting'); refreshIcons(); }
  if (!res || !res.success) {
    showToast('Save failed: ' + (res && res.error ? res.error : 'unknown'), 'error');
    return;
  }
  showToast(huddleState.modalEditingId ? 'Meeting updated' : 'Meeting saved', 'success');
  huddleCloseModal();
  loadHuddle();
}
</script>
