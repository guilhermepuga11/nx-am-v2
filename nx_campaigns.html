<script>
/* ═══════════════════════════════════════════════════════════════════════════
   CAMPAIGNS DASHBOARD — V3.1 (CRM-style sortable table)
     Top:    KPI strip (campaigns, emails sent, avg reply rate, top campaign)
     Main:   Sortable table (Date, Campaign, Template, Sent, Replied, Rate,
             Errors, Sent By, Action). Click a row → drill-in drawer.
     Drawer: Per-recipient table + Scan Replies. Auto-scan on open if last
             scan >1h ago.
═══════════════════════════════════════════════════════════════════════════ */

var campState = {
  list: [],
  days: 90,
  lastAutoScan: {},
  activeDetail: null,
  loading: false,
  sortCol: 'lastSent',
  sortAsc: false,         // default: most recent first
  filterQuery: ''
};

function initCampaignsView() {
  var host = document.getElementById('view-campaigns');
  host.style.flexDirection = 'column';
  host.innerHTML = campShellHtml_();
  loadCampaignsList();
  refreshIcons();
}

function campShellHtml_() {
  return ''
    + '<div class="filter-bar" style="justify-content:space-between;padding:10px 14px">'
      + '<div style="display:flex;align-items:center;gap:10px">'
        + '<span style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4)">Window</span>'
        + '<select id="campDays" class="nx-select" onchange="campState.days=parseInt(this.value,10);loadCampaignsList()">'
          + '<option value="30">Last 30 days</option>'
          + '<option value="90" selected>Last 90 days</option>'
          + '<option value="180">Last 180 days</option>'
          + '<option value="365">Last 365 days</option>'
        + '</select>'
        + '<input class="nx-input" id="campSearchInput" placeholder="Search campaigns…" oninput="campState.filterQuery=this.value.toLowerCase();renderCampaignsTable()" style="width:220px;font-size:11px;padding:5px 10px">'
        + '<span style="font-size:10px;color:var(--ink-4)" id="campCount">—</span>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
        + '<button class="btn-ghost" onclick="loadCampaignsList()"><i data-lucide="refresh-cw" style="width:12px;height:12px"></i> Refresh</button>'
        + '<button class="btn-primary" onclick="switchView(\'email\')"><i data-lucide="plus" style="width:12px;height:12px"></i> New Campaign</button>'
      + '</div>'
    + '</div>'
    + '<div style="flex:1;overflow-y:auto;padding:18px 24px;background:var(--bg)">'
      + '<div id="campKpiStrip" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px"></div>'
      + '<div class="section-card" style="padding:0;overflow:hidden">'
        + '<div style="overflow:auto">'
          + '<table class="nx-table" id="campTable">'
            + '<thead><tr>'
              + '<th onclick="campSort(\'lastSent\')" style="white-space:nowrap">Last Sent</th>'
              + '<th onclick="campSort(\'name\')">Campaign</th>'
              + '<th onclick="campSort(\'templateKey\')">Template</th>'
              + '<th onclick="campSort(\'sent\')" style="text-align:right">Sent</th>'
              + '<th onclick="campSort(\'replied\')" style="text-align:right">Replied</th>'
              + '<th onclick="campSort(\'replyRate\')" style="text-align:right">Reply Rate</th>'
              + '<th onclick="campSort(\'errors\')" style="text-align:right">Errors</th>'
              + '<th onclick="campSort(\'sentBy\')">Sent By</th>'
              + '<th style="text-align:center">Action</th>'
            + '</tr></thead>'
            + '<tbody id="campTableBody"></tbody>'
          + '</table>'
        + '</div>'
      + '</div>'
    + '</div>'
    + '<div id="campDetailOverlay" onclick="closeCampDetail()" style="display:none;position:fixed;inset:0;background:rgba(13,13,12,0.45);backdrop-filter:blur(6px);z-index:85"></div>'
    + '<div id="campDetailDrawer" style="display:none;position:fixed;top:0;right:0;width:min(760px,92vw);height:100vh;background:var(--surface);border-left:1px solid var(--border);box-shadow:-20px 0 60px -10px rgba(13,13,12,0.25);z-index:86;flex-direction:column"></div>';
}

function loadCampaignsList() {
  campState.loading = true;
  document.getElementById('campTableBody').innerHTML = '<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--ink-4);font-size:12px">Loading campaigns…</td></tr>';
  document.getElementById('campKpiStrip').innerHTML = '';
  google.script.run
    .withSuccessHandler(function(list) {
      campState.loading = false;
      campState.list = Array.isArray(list) ? list : [];
      renderCampaignsKpiStrip();
      renderCampaignsTable();
      if (window.__highlightCampaignId) {
        var id = window.__highlightCampaignId;
        window.__highlightCampaignId = null;
        setTimeout(function() { openCampDetail(id); }, 150);
      }
    })
    .withFailureHandler(function(e) {
      campState.loading = false;
      document.getElementById('campTableBody').innerHTML = '<tr><td colspan="9" style="padding:40px;text-align:center;color:#be123c;font-size:12px">Failed to load: ' + esc(e.message || e) + '</td></tr>';
    })
    .getCampaignsList(campState.days, _userTeam);
}

function renderCampaignsKpiStrip() {
  var list = campState.list;
  var totalCampaigns = list.length;
  var totalSent = list.reduce(function(s, c) { return s + (c.sent || 0); }, 0);
  var totalReplied = list.reduce(function(s, c) { return s + (c.replied || 0); }, 0);
  var avgRate = totalSent > 0 ? Math.round((totalReplied / totalSent) * 100) : 0;
  var top = list.slice().sort(function(a, b) { return (b.replyRate || 0) - (a.replyRate || 0); })[0];
  var topName = top ? top.name : '—';
  var topRate = top ? Math.round((top.replyRate || 0) * 100) : 0;

  function card(label, value, sub) {
    return '<div class="kpi-card" style="padding:12px 16px"><div class="kpi-label">' + label + '</div><div class="kpi-value">' + value + '</div><div class="kpi-sub">' + sub + '</div></div>';
  }
  document.getElementById('campKpiStrip').innerHTML =
    card('Campaigns',        totalCampaigns.toLocaleString(),                  'in last ' + campState.days + ' days')
    + card('Emails Sent',    totalSent.toLocaleString(),                       totalReplied + ' replies')
    + card('Avg Reply Rate', avgRate + '%',                                    avgRate >= 20 ? 'strong' : avgRate >= 10 ? 'ok' : 'low')
    + card('Top Campaign',   topRate + '%',                                    esc((topName || '—').slice(0, 32)));
}

function campRateClass_(rate) {
  if (rate >= 0.20) return 'camp-rate-high';
  if (rate >= 0.10) return 'camp-rate-mid';
  return 'camp-rate-low';
}

function campSort(col) {
  if (campState.sortCol === col) campState.sortAsc = !campState.sortAsc;
  else { campState.sortCol = col; campState.sortAsc = false; }
  renderCampaignsTable();
}

function renderCampaignsTable() {
  var list = campState.list.slice();
  if (campState.filterQuery) {
    var q = campState.filterQuery;
    list = list.filter(function(c) {
      return ((c.name || '').toLowerCase().indexOf(q) > -1)
        || ((c.templateKey || '').toLowerCase().indexOf(q) > -1)
        || ((c.sentBy || '').toLowerCase().indexOf(q) > -1);
    });
  }
  var col = campState.sortCol, asc = campState.sortAsc;
  list.sort(function(a, b) {
    var va = a[col], vb = b[col];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string' || typeof vb === 'string') {
      va = String(va); vb = String(vb);
      return asc ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return asc ? (va - vb) : (vb - va);
  });

  document.getElementById('campCount').textContent = list.length + ' of ' + campState.list.length + ' campaign' + (campState.list.length === 1 ? '' : 's');

  if (!list.length) {
    document.getElementById('campTableBody').innerHTML = '<tr><td colspan="9" style="padding:48px;text-align:center;color:var(--ink-4);font-size:12px">' + (campState.filterQuery ? 'No campaigns match your search.' : 'No campaigns in this window yet. Start your first from <b>Outreach</b>.') + '</td></tr>';
    refreshIcons();
    return;
  }

  document.getElementById('campTableBody').innerHTML = list.map(function(c) {
    var rate = c.replyRate || 0;
    var ratePct = Math.round(rate * 100);
    var lastSent = c.lastSent ? new Date(c.lastSent).toLocaleDateString('en-IE', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    var errors = c.errors || 0;
    var errCell = errors > 0
      ? '<span style="color:#be123c;font-weight:700">' + errors + '</span>'
      : '<span style="color:var(--ink-4)">0</span>';
    return '<tr onclick="openCampDetail(\'' + esc(c.id) + '\')" style="cursor:pointer">'
      + '<td style="font-size:11px;color:var(--ink-2);white-space:nowrap">' + lastSent + '</td>'
      + '<td style="font-weight:500;color:var(--ink)">' + esc(c.name || '(untitled)') + '</td>'
      + '<td style="font-size:11px;color:var(--ink-3)">' + esc(c.templateKey || '—') + '</td>'
      + '<td style="text-align:right;font-weight:600">' + (c.sent || 0) + '</td>'
      + '<td style="text-align:right;font-weight:600">' + (c.replied || 0) + '</td>'
      + '<td style="text-align:right;font-weight:700" class="' + campRateClass_(rate) + '">' + ratePct + '%</td>'
      + '<td style="text-align:right">' + errCell + '</td>'
      + '<td style="font-size:10px;color:var(--ink-4);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(c.sentBy || '') + '">' + esc(c.sentBy || '—') + '</td>'
      + '<td style="text-align:center" onclick="event.stopPropagation()"><button class="icon-btn" style="width:26px;height:26px;margin:0 auto" onclick="openCampDetail(\'' + esc(c.id) + '\')" title="Open details"><i data-lucide="arrow-right" style="width:11px;height:11px"></i></button></td>'
      + '</tr>';
  }).join('');
  refreshIcons();
}

/* ── Drill-in drawer ─────────────────────────────────────────────────────── */
function openCampDetail(campaignId) {
  campState.activeDetail = { campaignId: campaignId, loading: true };
  document.getElementById('campDetailOverlay').style.display = 'block';
  var dr = document.getElementById('campDetailDrawer');
  dr.style.display = 'flex';
  dr.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink-4);font-size:12px">Loading campaign…</div>';

  google.script.run
    .withSuccessHandler(function(detail) {
      if (!detail) {
        dr.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink-4);font-size:12px">Campaign not found.</div>';
        return;
      }
      campState.activeDetail = Object.assign({}, detail, { loading: false });
      renderCampDetail();
      var now = Date.now();
      var last = campState.lastAutoScan[campaignId] || 0;
      if (now - last > 3600000) {
        campState.lastAutoScan[campaignId] = now;
        scanCampReplies(true);
      }
    })
    .withFailureHandler(function(e) {
      dr.innerHTML = '<div style="padding:40px;text-align:center;color:#be123c;font-size:12px">Failed: ' + esc(e.message || e) + '</div>';
    })
    .getCampaignDetail(campaignId, _userTeam);
}

function closeCampDetail() {
  document.getElementById('campDetailOverlay').style.display = 'none';
  document.getElementById('campDetailDrawer').style.display = 'none';
  campState.activeDetail = null;
}

function renderCampDetail() {
  var d = campState.activeDetail;
  if (!d) return;
  var dr = document.getElementById('campDetailDrawer');
  var recips = d.recipients || [];
  var sentCount = recips.filter(function(r) { var s = String(r.status || '').toUpperCase(); return s.indexOf('SENT') === 0 || s === 'OK'; }).length;
  var replied = recips.filter(function(r) { return r.replied; }).length;
  var rate = sentCount > 0 ? Math.round((replied / sentCount) * 100) : 0;
  dr.innerHTML = ''
    + '<div style="padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0">'
      + '<div style="min-width:0;flex:1">'
        + '<div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4);margin-bottom:3px">Campaign</div>'
        + '<div style="font-size:18px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(d.name || '(untitled)') + '</div>'
        + '<div style="font-size:11px;color:var(--ink-3);margin-top:4px">Template: ' + esc(d.templateKey || '—') + ' · ID: <span style="font-family:monospace;font-size:10px">' + esc(d.campaignId) + '</span></div>'
      + '</div>'
      + '<div style="display:flex;gap:8px;flex-shrink:0">'
        + '<button class="btn-ghost" onclick="scanCampReplies(false)" id="campScanBtn"><i data-lucide="search" style="width:12px;height:12px"></i> Scan replies</button>'
        + '<div class="icon-btn" onclick="closeCampDetail()"><i data-lucide="x" style="width:13px;height:13px"></i></div>'
      + '</div>'
    + '</div>'
    + '<div style="padding:14px 22px;background:var(--bg);border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);gap:12px;flex-shrink:0">'
      + '<div><div style="font-size:9px;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px">Sent</div><div style="font-size:18px;font-weight:700">' + sentCount + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px">Replied</div><div style="font-size:18px;font-weight:700">' + replied + '</div></div>'
      + '<div><div style="font-size:9px;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px">Reply Rate</div><div class="' + campRateClass_(sentCount > 0 ? replied / sentCount : 0) + '" style="font-size:18px;font-weight:700">' + rate + '%</div></div>'
    + '</div>'
    + '<div style="padding:10px 22px 6px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:160px 1fr 70px 90px auto;gap:10px;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4);flex-shrink:0">'
      + '<div>Partner</div><div>Email / Subject</div><div style="text-align:center">Status</div><div style="text-align:center">Reply</div><div></div>'
    + '</div>'
    + '<div id="campRecipList" style="flex:1;overflow-y:auto"></div>';
  renderCampRecipList();
  refreshIcons();
}

function renderCampRecipList() {
  var d = campState.activeDetail;
  if (!d) return;
  var recips = d.recipients || [];
  document.getElementById('campRecipList').innerHTML = recips.map(function(r) {
    var st = String(r.status || '').toUpperCase();
    var statusPill;
    if (st.indexOf('SENT') === 0 || st === 'OK') statusPill = '<span style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700">Sent</span>';
    else if (st.indexOf('ERROR') === 0) statusPill = '<span style="background:#fff1f2;color:#be123c;border:1px solid #fecdd3;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700" title="' + esc(r.status) + '">Error</span>';
    else if (st.indexOf('SKIP') === 0) statusPill = '<span style="background:#fffbeb;color:#b45309;border:1px solid #fde68a;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700" title="' + esc(r.status) + '">Skip</span>';
    else statusPill = '<span style="background:var(--bg);color:var(--ink-4);border:1px solid var(--border);padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700">' + esc(r.status || '—') + '</span>';

    var replyCell = r.replied
      ? '<span style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700" title="' + esc(r.replyDate || '') + '">Yes</span>'
      : '<span style="color:var(--ink-4);font-size:10px">—</span>';

    var threadBtn = r.threadId
      ? '<button class="icon-btn" style="width:24px;height:24px" onclick="event.stopPropagation();window.open(\'https://mail.google.com/mail/u/0/#inbox/' + esc(r.threadId) + '\',\'_blank\')" title="Open in Gmail"><i data-lucide="external-link" style="width:11px;height:11px"></i></button>'
      : '<span style="color:var(--ink-4);font-size:10px">—</span>';

    return '<div class="camp-detail-row">'
      + '<div style="min-width:0;overflow:hidden"><div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)">' + esc(r.partnerName || '—') + '</div><div style="font-size:10px;color:var(--ink-4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(r.email || '—') + '</div></div>'
      + '<div style="min-width:0;overflow:hidden"><div style="font-size:11.5px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(r.subject || '—') + '</div><div style="font-size:10px;color:var(--ink-4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(r.bodySnippet || '') + '</div></div>'
      + '<div style="text-align:center">' + statusPill + '</div>'
      + '<div style="text-align:center">' + replyCell + '</div>'
      + '<div>' + threadBtn + '</div>'
      + '</div>';
  }).join('') || '<div style="padding:40px;text-align:center;color:var(--ink-4);font-size:11px">No recipients.</div>';
  refreshIcons();
}

function scanCampReplies(silent) {
  if (!campState.activeDetail) return;
  var campaignId = campState.activeDetail.campaignId;
  var btn = document.getElementById('campScanBtn');
  if (btn && !silent) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="spin" style="width:12px;height:12px"></i> Scanning…'; refreshIcons(); }
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="search" style="width:12px;height:12px"></i> Scan replies'; refreshIcons(); }
      if (!silent) showToast('Scanned ' + (res.scanned || 0) + ' · detected ' + (res.detected || 0) + ' new ' + ((res.detected || 0) === 1 ? 'reply' : 'replies'), 'success');
      google.script.run
        .withSuccessHandler(function(detail) {
          if (detail) {
            campState.activeDetail = Object.assign({}, detail, { loading: false });
            renderCampDetail();
          }
          loadCampaignsList();
        })
        .getCampaignDetail(campaignId, _userTeam);
    })
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="search" style="width:12px;height:12px"></i> Scan replies'; refreshIcons(); }
      if (!silent) showToast('Scan failed: ' + (e.message || e), 'error');
    })
    .scanRepliesForCampaign(campaignId, _userTeam);
}
</script>
