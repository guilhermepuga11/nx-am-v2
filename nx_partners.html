<script>  
/* ═══════════════════════════════════════
   OVERVIEW — unified dashboard landing
   V3.8 — Left column collapsed from 3 widgets (Top Sales, Stock Alerts,
          SOH-by-Season pie) to 2 (Top Movers lens-switchable, Breakdown
          Mix dim+lens-switchable). Outreach + Email Feed moved right.
═══════════════════════════════════════ */
function buildOverview() {
  try {
    buildOvKpis();
    buildOvOutreach();
    buildOvTopMovers();      // V3.8 — replaces buildOvSales + buildOvStock
    buildOvBreakdownMix();   // V3.8 — replaces buildOvSohPie
    buildOvEmailFeed();
  } catch(e) { console.error('NEXUS buildOverview:', e); }
  refreshIcons();
}

/* ── COMPACT KPI STRIP — 4 sections × 2 rows (Sales | Stock | Mail | KPIs) ── */  
function buildOvKpis() {  
  var ck = P.filter(function(p) { return p.cockpit_matched; });

  var ytd = 0, pyYtd = 0, d7 = 0, pyD7 = 0;  
  ck.forEach(function(d) { ytd += d.cy_ytd; pyYtd += d.py_ytd; d7 += d.cy_7d; pyD7 += d.py_7d; });

  var stk = stockPartners();  
  var totalUnits = stk.reduce(function(s, r) { return s + r.today; }, 0);  
  var d15Total = stk.reduce(function(s, r) { return s + (r.values[r.values.length - 1] || 0); }, 0);

  // Mail metrics — outreach reply rate from Send Log totals  
  var totalSends = 0, totalReplied = 0;  
  P.forEach(function(d) {  
    var t = d.send_totals || { sent: 0, replied: 0 };  
    totalSends += t.sent;  
    totalReplied += t.replied;  
  });  
  var replyRate = totalSends > 0 ? Math.round((totalReplied / totalSends) * 100) : 0;

  var kRows = kpiPartners();  
  var avgPerfect = kRows.length ? kRows.reduce(function(s, r) { return s + r.perfect_now; }, 0) / kRows.length : 0;  
  var avgPerfectPrev = kRows.length ? kRows.reduce(function(s, r) { return s + r.perfect_prev; }, 0) / kRows.length : 0;  
  var avgNs = kRows.length ? kRows.reduce(function(s, r) { return s + r.ns_now; }, 0) / kRows.length : 0;  
  var avgNsPrev = kRows.length ? kRows.reduce(function(s, r) { return s + r.ns_prev; }, 0) / kRows.length : 0;

  var el = document.getElementById('ovKpis');  
  if (!el) return;

  function mini(label, value, sub) {  
    return '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:5px 0">'  
      + '<span style="font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-4)">' + label + '</span>'  
      + '<div style="text-align:right"><span style="font-size:22px;font-weight:700;letter-spacing:-0.03em;line-height:1">' + value + '</span>'  
      + '<div style="font-size:10px;color:var(--ink-3);margin-top:2px">' + sub + '</div></div></div>';  
  }

  function section(title, icon, tint, row1, row2) {  
    return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;position:relative;overflow:hidden">'  
      + '<div style="position:absolute;top:0;left:0;right:0;height:2px;background:' + tint + '"></div>'  
      + '<div style="font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-4);margin-bottom:2px;display:flex;align-items:center;gap:5px;padding-top:1px"><i data-lucide="' + icon + '" style="width:10px;height:10px"></i>' + title + '</div>'  
      + row1  
      + '<div style="border-top:1px solid var(--border);margin:3px 0"></div>'  
      + row2  
      + '</div>';  
  }

  el.innerHTML =  
    section('Sales', 'trending-up', 'var(--ink)',  
      mini('YTD GTV', fGtv(ytd), fPctStr(fPct(ytd, pyYtd), true) + ' vs PY'),  
      mini('7D GTV', fGtv(d7), fPctStr(fPct(d7, pyD7), true) + ' vs PY')  
    ) +  
    section('Stock', 'package', '#b0b0ac',  
      mini('Total Online', totalUnits.toLocaleString(), stk.length + ' partners'),  
      mini('15D Var', fPctStr(fPct(totalUnits, d15Total), false), (totalUnits - d15Total >= 0 ? '+' : '') + (totalUnits - d15Total).toLocaleString() + ' units')  
    ) +  
    section('Mail', 'mail', '#1d4ed8',  
      mini('Emails Logged', totalSends.toLocaleString(), 'total sends tracked'),  
      mini('Reply Rate', replyRate + '%', totalReplied + ' of ' + totalSends + ' outreach replied')  
    ) +  
    section('KPI', 'activity', '#c8c8c4',  
      mini('Avg Perfect%', avgPerfect.toFixed(1) + '%', fPctStr(fPct(avgPerfect, avgPerfectPrev), true) + ' vs prev'),  
      mini('Avg NS%', avgNs.toFixed(1) + '%', fPctStr(fPct(avgNs, avgNsPrev), true) + ' vs prev')  
    );  
}

/* ── OUTREACH (V3.2) — KPIs only with timeframe switcher ──────────────── */
// No row list — just 4 aggregate KPIs (Campaigns, Sent, Replied, Reply rate).
// Tiny segmented control inside the bubble lets the user flip between
// 30d / 90d / All-time. Backend supports days=0 to mean "no cutoff".
var _ovOutreachWindow = 90;   // default timeframe in days (0 = all time)
// V3.8 fix — Cache keyed by team + days. Was days-only, so team-switching kept
// stale outreach data from the previous team. Cache cleared in handleTeamSwitch.
var _ovOutreachCache = {};    // { '<team>:<days>': list }

function _ovOutreachCacheKey_(days) { return (_userTeam || '') + ':' + days; }

function buildOvOutreach() {
  loadOvOutreach_(_ovOutreachWindow);
}

function setOvOutreachWindow(days) {
  _ovOutreachWindow = days;
  loadOvOutreach_(days);
}

function loadOvOutreach_(days) {
  var el = document.getElementById('ovOutreachWrap');
  if (!el) return;

  var ck = _ovOutreachCacheKey_(days);
  // Cache hit — render immediately
  if (_ovOutreachCache[ck]) {
    renderOvOutreach_(_ovOutreachCache[ck], days);
    return;
  }

  el.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--ink-4);font-size:11px">Loading…</div>';
  google.script.run
    .withSuccessHandler(function(list) {
      _ovOutreachCache[ck] = Array.isArray(list) ? list : [];
      renderOvOutreach_(_ovOutreachCache[ck], days);
    })
    .withFailureHandler(function() {
      el.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--ink-4);font-size:11px">No outreach data</div>';
    })
    .getCampaignsList(days, _userTeam);
}

function renderOvOutreach_(list, days) {
  var el = document.getElementById('ovOutreachWrap');
  if (!el) return;

  var totalCampaigns = list.length;
  var totalSent = list.reduce(function(s, c) { return s + (c.sent || 0); }, 0);
  var totalReplied = list.reduce(function(s, c) { return s + (c.replied || 0); }, 0);
  var avgRate = totalSent > 0 ? Math.round((totalReplied / totalSent) * 100) : 0;
  var rateColor = avgRate >= 20 ? '#15803d' : avgRate >= 10 ? '#b45309' : '#dc2626';

  // Segmented control: 30 / 90 / All. Active pill styled like the wiz-step-pill active state.
  function segBtn(label, val) {
    var active = _ovOutreachWindow === val;
    var style = active
      ? 'background:var(--ink);color:#fff;border-color:var(--ink)'
      : 'background:var(--surface);color:var(--ink-3);border-color:var(--border)';
    return '<button onclick="setOvOutreachWindow(' + val + ')" style="' + style + ';border-width:1px;border-style:solid;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase">' + label + '</button>';
  }
  var switcher = '<div style="display:flex;gap:3px;padding:6px 12px;flex-shrink:0">'
    + segBtn('30D', 30)
    + segBtn('90D', 90)
    + segBtn('All', 0)
    + '</div>';

  // KPI grid — 2×2 inside the bubble to match the height budget (~150px after header+switcher).
  function kpi(label, value, sub) {
    return '<div style="display:flex;flex-direction:column;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);min-width:0">'
      + '<span style="font-size:8.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4);margin-bottom:2px">' + label + '</span>'
      + '<span style="font-size:18px;font-weight:700;letter-spacing:-0.03em;line-height:1.1">' + value + '</span>'
      + '<span style="font-size:9px;color:var(--ink-3);margin-top:2px">' + sub + '</span>'
      + '</div>';
  }

  var periodLabel = days === 0 ? 'all time' : 'last ' + days + 'd';
  var grid = '<div style="flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;padding:0 12px 10px;min-height:0">'
    + kpi('Campaigns', totalCampaigns.toLocaleString(), periodLabel)
    + kpi('Sent',       totalSent.toLocaleString(),    totalCampaigns > 0 ? 'across ' + totalCampaigns + ' campaign' + (totalCampaigns === 1 ? '' : 's') : '—')
    + kpi('Replied',    totalReplied.toLocaleString(), totalSent > 0 ? 'out of ' + totalSent : '—')
    + '<div style="display:flex;flex-direction:column;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);min-width:0">'
      + '<span style="font-size:8.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4);margin-bottom:2px">Reply Rate</span>'
      + '<span style="font-size:18px;font-weight:700;letter-spacing:-0.03em;line-height:1.1;color:' + rateColor + '">' + avgRate + '%</span>'
      + '<span style="font-size:9px;color:var(--ink-3);margin-top:2px">' + (avgRate >= 20 ? 'strong' : avgRate >= 10 ? 'ok' : totalSent > 0 ? 'low' : '—') + '</span>'
    + '</div>'
  + '</div>';

  el.innerHTML = switcher + grid;
}

/* ── TOP MOVERS (V3.8) — merges Top Sales + Stock Alerts behind a 2-way lens
   toggle. Same partner-row layout reused across lenses; only the metric +
   right-side pill changes. V3.12 — At Risk lens removed (Sales Risk is already
   reachable via the Cockpit insight filter, and the lens added more noise than
   signal on the overview). Lens descriptions surfaced as subtext for clarity. */
var _ovMoversLens = 'sales';  // 'sales' | 'stock'

var _OV_MOVERS_SUBS = {
  sales: 'Sales YTD — top GTV partners',
  stock: 'Biggest stock drops, last 15d'
};

function setOvMoversLens(which) {
  if (['sales','stock'].indexOf(which) < 0) return;
  _ovMoversLens = which;
  buildOvTopMovers();
}

function buildOvTopMovers() {
  var lensEl = document.getElementById('ovMoversLens');
  var subEl  = document.getElementById('ovMoversSub');
  var wrap   = document.getElementById('ovMoversWrap');
  if (lensEl) lensEl.innerHTML = _ovMoversLensBtn_('sales', 'Top Sales') + _ovMoversLensBtn_('stock', 'Stock Alerts');
  if (subEl)  subEl.textContent = _OV_MOVERS_SUBS[_ovMoversLens] || '';
  if (!wrap) return;

  if (_ovMoversLens === 'sales') return _ovRenderTopSales_(wrap);
  if (_ovMoversLens === 'stock') return _ovRenderStockAlerts_(wrap);
}

function _ovMoversLensBtn_(key, label) {
  var active = _ovMoversLens === key;
  var style = active
    ? 'background:var(--ink);color:#fff;border-color:var(--ink)'
    : 'background:var(--surface);color:var(--ink-3);border-color:var(--border)';
  return '<button onclick="setOvMoversLens(\'' + key + '\')" style="' + style + ';border-width:1px;border-style:solid;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase">' + label + '</button>';
}

// Top Sales — YTD GTV ranking, unchanged behavior from prior buildOvSales.
function _ovRenderTopSales_(el) {
  var rows = P.filter(function(p) { return p.cockpit_matched && p.cy_ytd > 0; });
  rows.sort(function(a, b) { return b.cy_ytd - a.cy_ytd; });
  var top = rows.slice(0, 100);
  if (!top.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink-4);font-size:11px">No sales data</div>'; return; }

  el.innerHTML = top.map(function(d, i) {
    var rank = i + 1;
    var isPos = d.ytd_pct >= 0;
    var pctVal = Math.round(d.ytd_pct * 100);
    var pctBg = isPos ? '#dcfce7' : '#fee2e2';
    var pctColor = isPos ? '#15803d' : '#dc2626';
    var pctBorder = isPos ? '#bbf7d0' : '#fecdd3';
    return '<div onclick="openDealByStore(\'' + esc(d.company) + '\')" style="display:flex;align-items:center;gap:10px;padding:6px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s" onmouseenter="this.style.background=\'var(--bg)\'" onmouseleave="this.style.background=\'\'">'
      + '<span style="font-size:9px;font-weight:700;color:var(--ink-4);width:18px;text-align:center;flex-shrink:0">' + rank + '</span>'
      + '<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(d.company) + '</div></div>'
      + '<span style="font-size:11px;font-weight:700;letter-spacing:-0.02em;flex-shrink:0;margin-right:6px">' + fGtv(d.cy_ytd) + '</span>'
      + '<span style="background:' + pctBg + ';color:' + pctColor + ';border:1px solid ' + pctBorder + ';padding:2px 7px;border-radius:5px;font-size:8.5px;font-weight:700;white-space:nowrap;flex-shrink:0">' + (isPos ? '+' : '') + pctVal + '%</span>'
      + '</div>';
  }).join('');
}

// Stock Alerts — partners with 15-day stock decline, sorted by severity.
function _ovRenderStockAlerts_(el) {
  var all = stockPartners();
  var alerts = all.filter(function(r) { return r.pct15 < -0.05; });
  alerts.sort(function(a, b) { return a.pct15 - b.pct15; });
  if (!alerts.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink-4);font-size:11px">No significant declines</div>'; return; }

  el.innerHTML = alerts.slice(0, 100).map(function(r, i) {
    var rank = i + 1;
    var dropPct = Math.abs(Math.round(r.pct15 * 100));
    return '<div onclick="openDealByStore(\'' + esc(r.store) + '\')" style="display:flex;align-items:center;gap:10px;padding:6px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s" onmouseenter="this.style.background=\'var(--bg)\'" onmouseleave="this.style.background=\'\'">'
      + '<span style="font-size:9px;font-weight:700;color:var(--ink-4);width:18px;text-align:center;flex-shrink:0">' + rank + '</span>'
      + '<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(r.store) + '</div></div>'
      + '<span style="font-size:10px;color:var(--ink-3);flex-shrink:0;margin-right:6px">' + r.today.toLocaleString() + '</span>'
      + '<span style="background:#fee2e2;color:#dc2626;border:1px solid #fecdd3;padding:2px 7px;border-radius:5px;font-size:8.5px;font-weight:700;white-space:nowrap;flex-shrink:0">↓ ' + dropPct + '%</span>'
      + '</div>';
  }).join('');
}

/* ── BREAKDOWN MIX (V3.8) — dim-switchable + lens-switchable team pie.
   Replaces the season-only SOH pie. Reads BREAKDOWNS[dim].totals.{sales,soh}
   (already team-aggregated by the backend, so no re-aggregation needed).
   Sales lens uses gtv; stock lens uses online units — both plotted as a pie.
   Colors via seasonColor_/breakdownColor_ from cockpit (shared palette). ── */
var _ovMixDim = 'season';   // 'season' | 'brand' | 'family'
var _ovMixLens = 'sales';   // 'sales' | 'stock'

function setOvMixDim(dim) {
  if (['season','brand','family'].indexOf(dim) < 0) return;
  _ovMixDim = dim;
  buildOvBreakdownMix();
}
function setOvMixLens(lens) {
  if (['sales','stock'].indexOf(lens) < 0) return;
  _ovMixLens = lens;
  buildOvBreakdownMix();
}

function buildOvBreakdownMix() {
  // Header controls
  var dimEl = document.getElementById('ovMixDim');
  var lensEl = document.getElementById('ovMixLens');
  var titleEl = document.getElementById('ovMixTitle');
  var viewEl = document.getElementById('ovMixViewLink');
  if (dimEl) dimEl.innerHTML = _ovMixSegBtn_('dim', 'season', 'Season') + _ovMixSegBtn_('dim', 'brand', 'Brand') + _ovMixSegBtn_('dim', 'family', 'Family');
  if (lensEl) lensEl.innerHTML = _ovMixSegBtn_('lens', 'sales', 'Sales') + _ovMixSegBtn_('lens', 'stock', 'Stock');

  var dimLabel = _ovMixDim === 'brand' ? 'Brand' : _ovMixDim === 'family' ? 'Family' : 'Season';
  var lensLabel = _ovMixLens === 'sales' ? 'Sales' : 'Stock';
  if (titleEl) titleEl.textContent = lensLabel + ' by ' + dimLabel;

  // Click-through wiring: jump to cockpit with matching tab+lens+dim.
  // Uses the setCkDim helper from nx_cockpit which resets ckSelectedSeason
  // and forces the breakdown lens on — so user lands exactly on this view.
  if (viewEl) {
    viewEl.onclick = function() {
      switchView('cockpit');
      setTimeout(function() {
        if (_ovMixLens === 'sales') switchCockpitTab('sales');
        else switchCockpitTab('stock');
        if (typeof setCkDim === 'function') setCkDim(_ovMixDim);
      }, 100);
    };
  }

  var el = document.getElementById('ovMixWrap');
  if (!el) return;

  // Pull active-dim subtree. Defensive fallback — BREAKDOWNS may be absent if
  // running against a pre-V3.7 payload (shouldn't happen in production).
  var subtree = null;
  if (typeof BREAKDOWNS !== 'undefined' && BREAKDOWNS[_ovMixDim]) {
    subtree = BREAKDOWNS[_ovMixDim];
  } else if (_ovMixDim === 'season' && typeof SEASONS !== 'undefined' && SEASONS) {
    // Legacy path — SEASONS has allSeasons rather than allValues
    subtree = { allValues: SEASONS.allSeasons || [], totals: SEASONS.totals || { sales: {}, soh: {} } };
  }
  if (!subtree || !subtree.allValues || !subtree.allValues.length) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink-4);font-size:11px">No ' + dimLabel.toLowerCase() + ' data</div>';
    return;
  }

  // Slices: values > 0 in the active lens metric. Sales uses gtv (commercial
  // relevance — a brand with 100 cheap units matters less than 10 expensive);
  // stock uses online units (what's sellable right now).
  var isStockMode = _ovMixLens === 'stock';
  var totalsSource = isStockMode ? (subtree.totals.soh || {}) : (subtree.totals.sales || {});
  var slices = [];
  subtree.allValues.forEach(function(name) {
    var t = totalsSource[name];
    if (!t) return;
    var v = isStockMode ? (t.online || 0) : (t.gtv || 0);
    if (v > 0) slices.push({ name: name, value: v, partners: t.partners || 0 });
  });
  if (!slices.length) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink-4);font-size:11px">No ' + lensLabel.toLowerCase() + ' data for ' + dimLabel.toLowerCase() + '</div>';
    return;
  }

  slices.sort(function(a, b) { return b.value - a.value; });
  var total = slices.reduce(function(s, x) { return s + x.value; }, 0);

  // V3.8 — Top-N + 'Other' bucket. Cap at 10 for the wider overview card;
  // anything past that collapses into a synthetic 'Other' so the chart
  // stays readable without dropping data.
  var MAX_BARS = 10;
  var bars;
  if (slices.length > MAX_BARS) {
    var top = slices.slice(0, MAX_BARS - 1);
    var rest = slices.slice(MAX_BARS - 1);
    var otherVal = 0;
    rest.forEach(function(s) { otherVal += s.value; });
    top.push({ name: 'Other', value: otherVal, partners: 0, _synthetic: true });
    bars = top;
  } else {
    bars = slices.slice();
  }
  // Pin literal-or-synthetic 'Other' to last for visual consistency.
  bars.sort(function(a, b) {
    if (a.name === 'Other' && b.name !== 'Other') return 1;
    if (b.name === 'Other' && a.name !== 'Other') return -1;
    return b.value - a.value;
  });

  // Value formatter: GTV for sales, plain number for units
  var fmtVal = function(v) { return isStockMode ? v.toLocaleString() : fGtv(v); };

  el.innerHTML =
    '<div style="padding:6px 14px 10px;height:100%;box-sizing:border-box;display:flex;flex-direction:column">'
      + '<div style="flex:1;min-height:0;display:flex;align-items:stretch;justify-content:center">'
        + ovBarChartSvg_(bars, total, fmtVal)
      + '</div>'
      + (slices.length > MAX_BARS - 1
          ? '<div style="font-size:9px;color:var(--ink-4);text-align:center;margin-top:4px">Top ' + (MAX_BARS - 1) + ' shown · ' + (slices.length - (MAX_BARS - 1)) + ' folded into Other</div>'
          : '')
    + '</div>';
}

function _ovMixSegBtn_(kind, val, label) {
  var active = (kind === 'dim' ? _ovMixDim : _ovMixLens) === val;
  var style = active
    ? 'background:var(--ink);color:#fff;border-color:var(--ink)'
    : 'background:var(--surface);color:var(--ink-3);border-color:var(--border)';
  var fn = kind === 'dim' ? 'setOvMixDim' : 'setOvMixLens';
  return '<button onclick="' + fn + '(\'' + val + '\')" style="' + style + ';border-width:1px;border-style:solid;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase">' + label + '</button>';
}

// Dim-aware color helper. Routes through cockpit's breakdownColor_ when
// available (V3.7+ — supports hash-based brand palette); falls back to
// seasonColor_ (which always resolves against the active dim in cockpit,
// so passing _ovMixDim != cockpit's ckActiveDim could mis-color).
// Using breakdownColor_ directly avoids that coupling.
function _ovColorFor_(name) {
  if (typeof breakdownColor_ === 'function') return breakdownColor_(_ovMixDim, name);
  if (typeof seasonColor_ === 'function') return seasonColor_(name);
  return { fg: '#64748b', bg: '#f1f5f9' };
}

// V3.8 — Vertical column chart for the overview Breakdown Mix card. Replaces
// the old pie + side-legend layout. Wider plot area than the drawer chart
// because the overview card is meaningfully bigger.
// fmtVal lets the caller pass a unit formatter (GTV vs plain units).
function ovBarChartSvg_(bars, total, fmtVal) {
  if (!bars || !bars.length) return '<div style="padding:20px;text-align:center;font-size:11px;color:var(--ink-4)">No data</div>';
  fmtVal = fmtVal || function(v) { return v.toLocaleString(); };
  var W = 460, H = 220;
  var padTop = 26, padBot = 56, padLeft = 8, padRight = 8;
  var plotW = W - padLeft - padRight;
  var plotH = H - padTop - padBot;
  var n = bars.length;
  var gap = 8;
  var barW = (plotW - gap * (n - 1)) / n;
  if (barW < 18) barW = 18;
  var maxV = bars.reduce(function(m, b) { return b.value > m ? b.value : m; }, 0) || 1;

  var items = bars.map(function(b, i) {
    var h = Math.max(2, Math.round((b.value / maxV) * plotH));
    var x = padLeft + i * (barW + gap);
    var y = padTop + (plotH - h);
    var pct = total > 0 ? Math.round((b.value / total) * 100) : 0;
    var fill = b.name === 'Other' ? '#9ca3af' : 'var(--ink)';
    var topLabel = fmtVal(b.value);
    var xLabel = (b.name && b.name.length > 13) ? b.name.slice(0, 12) + '…' : (b.name || '');
    return ''
      + '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h + '" fill="' + fill + '" rx="3">'
        + '<title>' + esc(b.name || '') + ': ' + fmtVal(b.value) + ' (' + pct + '%)</title>'
      + '</rect>'
      + '<text x="' + (x + barW / 2) + '" y="' + (y - 6) + '" text-anchor="middle" '
        + 'style="font-size:10px;font-weight:700;fill:var(--ink);font-variant-numeric:tabular-nums">' + esc(topLabel) + '</text>'
      + '<text x="' + (x + barW / 2) + '" y="' + (padTop + plotH + 14) + '" text-anchor="end" '
        + 'transform="rotate(-30 ' + (x + barW / 2) + ' ' + (padTop + plotH + 14) + ')" '
        + 'style="font-size:10px;fill:var(--ink-3);font-weight:600">' + esc(xLabel) + '</text>';
  }).join('');

  var baseline = '<line x1="' + padLeft + '" y1="' + (padTop + plotH) + '" x2="' + (W - padRight) + '" y2="' + (padTop + plotH) + '" stroke="var(--border)" stroke-width="1"/>';

  return '<svg width="100%" height="100%" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:100%">'
    + baseline + items
    + '</svg>';
}

// Legacy ovPieSvg_ alias — V3.8 routes any stray caller to the bar renderer.
function ovPieSvg_(slices, total, size) {
  // Legacy callers passed slices in DESC order; preserve that contract.
  return ovBarChartSvg_(slices.slice(0, 10), total, function(v) { return v.toLocaleString(); });
}

/* ── Helper: open drawer directly on Activity tab ───────────────────── */  
function openDealActivity(row) {  
  openDeal(row);  
  setTimeout(function() { switchDrawerTab('correspondence'); }, 150);  
}

/* ── LIVE EMAIL FEED (with snippet from latestEmail JSON) ─────────────── */  
function buildOvEmailFeed() {  
  var el = document.getElementById('ovEmailFeedList');  
  if (!el) return;

  var feed = [];  
  P.filter(function(p) { return p.cockpit_matched; }).forEach(function(p) {  
    var le = null;  
    try { le = typeof p.latestEmail === 'string' ? JSON.parse(p.latestEmail) : p.latestEmail; } catch(ex) {}  
    if (le) {  
      if (le.sent && le.sent.length) {  
        le.sent.forEach(function(s) {  
          var ts = s.timestamp ? new Date(s.timestamp).toISOString() : (s.date || '');  
          feed.push({ dir: 'out', partner: p.company, row: p.row, subject: s.subject || '(No Subject)', snippet: s.snippet || '', date: ts, email: '' });  
        });  
      }  
      if (le.received && le.received.length) {  
        le.received.forEach(function(r) {  
          var ts = r.timestamp ? new Date(r.timestamp).toISOString() : (r.date || '');  
          feed.push({ dir: 'in', partner: p.company, row: p.row, subject: r.subject || 'Email received', snippet: r.snippet || '', date: ts, email: '' });  
        });  
      }  
    }  
    if ((!le || (!le.sent || !le.sent.length)) && p.recent_campaigns && p.recent_campaigns.length) {  
      p.recent_campaigns.forEach(function(c) {  
        feed.push({ dir: 'out', partner: p.company, row: p.row, subject: c.subject || '(No Subject)', snippet: '', date: c.timestamp || '', email: c.email || '' });  
      });  
    }  
    if ((!le || !le.received || !le.received.length) && p.lastReceived && p.lastReceived !== '-' && p.lastReceived !== '') {  
      feed.push({ dir: 'in', partner: p.company, row: p.row, subject: 'Email received', snippet: '', date: p.lastReceived || '', email: p.email || '' });  
    }  
  });

  feed.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });  
  var latest = feed.slice(0, 30);

  if (!latest.length) {  
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink-4);font-size:11px">No recent email activity</div>';  
    return;  
  }

  el.innerHTML = latest.map(function(e) {  
    var isIn = e.dir === 'in';  
    var arrow = isIn  
      ? '<span style="background:#e8e8e6;color:#4a4a48;width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">↙</span>'  
      : '<span style="background:#dcdcda;color:#686866;width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">↗</span>';  
    var dateStr = e.date;  
    if (e.date && e.date.length > 10) {  
      try { var d = new Date(e.date); if (!isNaN(d.getTime())) { var isToday = d.toDateString() === new Date().toDateString(); dateStr = isToday ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short' }); } } catch(ex) {}  
    }  
    var snippetText = e.snippet ? (e.snippet.length > 80 ? e.snippet.substring(0, 80) + '…' : e.snippet) : '';

    return '<div style="display:flex;align-items:flex-start;gap:10px;padding:7px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s" onmouseenter="this.style.background=\'var(--bg)\'" onmouseleave="this.style.background=\'\'" onclick="openDealActivity(' + e.row + ')">'  
      + '<div style="padding-top:2px">' + arrow + '</div>'  
      + '<div style="flex:1;min-width:0">'  
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(e.partner) + '</span><span style="font-size:9px;color:var(--ink-4);flex-shrink:0;white-space:nowrap;margin-left:auto">' + esc(dateStr) + '</span></div>'  
      + '<div style="font-size:10.5px;font-weight:500;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px">' + esc(e.subject) + '</div>'  
      + (snippetText ? '<div style="font-size:10px;color:var(--ink-4);line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden">' + esc(snippetText) + '</div>' : '')  
      + '</div></div>';  
  }).join('');  
}  
</script>
