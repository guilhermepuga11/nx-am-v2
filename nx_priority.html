<!-- ══════════════════════════════════════════════════════════════════════════
     NEXUS — nx_priority.html
     The "{team}" landing: ONE combined surface. The spine is the team's
     PRIORITIES (directives → partners, authored in the Team view). Grounded
     book metrics fold in around them:
       • a KPI strip (book GTV · YoY, partners, open priorities, stock online);
       • Stock drops (24h) + Top movers (4-week) read straight from the data;
       • Stock + Mail analytics fold in inline (lazy, per-team remembered);
       • a "Deep dive ⤢" link opens the full Overview dashboard (kept as child).
     100% client-side over P[] + the engine in nx_intel.html (nxBrief).
═══════════════════════════════════════════════════════════════════════════════ -->
<style>
  /* !important beats the shared inline `overflow:hidden` on the #view-priority
     container in nexus.html (inline wins over a plain selector), restoring vertical
     scroll. overflow-x:hidden prevents a stray horizontal bar at full width. */
  #view-priority{padding:0;overflow-y:auto !important;overflow-x:hidden !important;}
  /* Full-width landing — use the horizontal space (the old 1220px cap left big
     empty gutters even on small screens). */
  .prv{max-width:none;width:100%;margin:0;padding:24px 28px 64px;}
  /* hero / controls */
  .prv-controls{display:flex;align-items:center;gap:9px;margin-left:auto;flex-wrap:wrap;}
  .prv-win{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--ink);background:var(--surface);
    border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;box-shadow:var(--sh-1);}
  .prv-win:hover{border-color:var(--ink-3);}
  .prv-setbtn,.prv-deep{font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--ink-2);
    background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;box-shadow:var(--sh-1);white-space:nowrap;}
  .prv-setbtn:hover,.prv-deep:hover{border-color:var(--ink-3);color:var(--ink);}
  /* GTV delta colors + sales/stock graph lens toggle (folded-in Overview) */
  #view-priority .tdv-kpi-s.up{color:#15803d;} #view-priority .tdv-kpi-s.down{color:#be123c;}
  /* analytics region */
  .prv-an{margin-top:14px;}
  .prv-an-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 4px 12px;}
  .prv-an-lab{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-4);margin-right:2px;}
  .prv-chip{font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--ink-3);
    background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 12px;cursor:pointer;transition:all .14s var(--ease);}
  .prv-chip:hover{border-color:var(--ink-3);color:var(--ink);}
  .prv-chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .prv-an-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:820px){.prv-an-grid{grid-template-columns:1fr;}}
  .prv-stat{display:flex;align-items:baseline;gap:6px;padding:7px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--ink-2);}
  .prv-stat:last-child{border-bottom:none;}
  .prv-stat b{font-size:14px;font-weight:800;letter-spacing:-.02em;color:var(--ink);font-variant-numeric:tabular-nums;}
  .prv-stat .l{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);}
  /* team directive (priority) rows — the landing spine */
  .prv-dir{display:flex;align-items:flex-start;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border);}
  .prv-dir:last-child{border-bottom:none;}
  .prv-dir-body{flex:1;min-width:0;}
  .prv-dir-txt{font-size:13px;font-weight:600;color:var(--ink);line-height:1.25;}
  .prv-dir-targets{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .prv-tchip{font-size:10px;font-weight:600;color:var(--ink-2);background:var(--bg);border:1px solid var(--border);border-radius:var(--r-xs);padding:2px 7px;cursor:pointer;}
  .prv-tchip:hover{border-color:var(--ink);color:var(--ink);}
  .prv-dir-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;font-size:10.5px;color:var(--ink-4);white-space:nowrap;}
  .prv-due{font-weight:700;color:var(--ink-3);} .prv-due.over{color:#be123c;}
  /* landing quick-launcher — jump to a team / Head / Admin (in-app) */
  .prv-jumpbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:0 0 16px;}
  .prv-jump-lab{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-4);margin-right:2px;}
  .prv-jump{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--ink-2);background:var(--surface);
    border:1px solid var(--border);border-radius:8px;padding:6px 13px;cursor:pointer;box-shadow:var(--sh-1);transition:all .14s var(--ease);}
  .prv-jump:hover{border-color:var(--ink-3);color:var(--ink);}
  .prv-jump.on{background:var(--ink);color:#fff;border-color:var(--ink);cursor:default;}
  .prv-jump-x{color:var(--ink-3);}
  /* no-permission overlay */
  .nxnp-ov{position:fixed;inset:0;z-index:9500;background:rgba(13,13,12,.34);display:flex;align-items:center;justify-content:center;}
  .nxnp-card{background:var(--surface);border:1px solid var(--border-2);border-radius:16px;box-shadow:var(--sh-3,0 24px 50px -16px rgba(13,13,12,.28));padding:30px 34px;max-width:360px;text-align:center;}
  .nxnp-ic{font-size:30px;margin-bottom:8px;}
  .nxnp-t{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--ink);margin-bottom:5px;}
  .nxnp-s{font-size:12.5px;color:var(--ink-3);line-height:1.45;margin-bottom:18px;}
  .nxnp-btn{font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;color:#fff;background:var(--ink);border:1px solid var(--ink);border-radius:8px;padding:8px 22px;cursor:pointer;}
  .nxnp-btn:hover{opacity:.88;}
</style>

<script>
/* ═══════════════════════════════ STATE ═══════════════════════════════ */
var _prvWin = 'stock';              // 'd7' | 'w4' | 'ytd' | 'stock'  (stock drops lead the landing)
var _prvExpanded = null;            // {stock:bool, mail:bool} — lazy-loaded per team

/* engine reuse helpers (defined in nx_intel.html; guard at call time) */
function _esc(s){ return (typeof _ixEsc==='function') ? _ixEsc(s) : String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }
function _prvJs(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function _prvNum(x){ return (typeof _ixNum==='function') ? _ixNum(x) : (isFinite(+x)?+x:0); }
function _prvPct(x){ return (typeof _ixPct==='function') ? _ixPct(x) : ((x>=0?'+':'')+Math.round(x*100)+'%'); }
function _prvMoney(x){ return (typeof _ixMoney==='function') ? _ixMoney(x) : (''+Math.round(_prvNum(x))); }
function _prvWinField(){ return _prvWin==='w4' ? 'w4_pct' : _prvWin==='ytd' ? 'ytd_pct' : 'd7_pct'; }

/* ═══════════ FOLDED OVERVIEW ANALYTICS (self-contained, lazy) ═══════════ */
function _prvExpKey(){ return 'nx_prv_exp_' + (typeof _userTeam!=='undefined'?_userTeam:''); }
function _prvLoadExpanded(seedOpen){
  if(_prvExpanded) return;
  try { var raw = localStorage.getItem(_prvExpKey()); if(raw){ _prvExpanded=JSON.parse(raw); return; } } catch(e){}
  _prvExpanded = seedOpen ? {stock:true, mail:true} : {stock:false, mail:false};
}
function prvToggleExpand(key){
  _prvLoadExpanded(false); _prvExpanded[key] = !_prvExpanded[key];
  try { localStorage.setItem(_prvExpKey(), JSON.stringify(_prvExpanded)); } catch(e){}
  initPriorityView();
}
/* Stock stat (self-contained; same data as Overview's Stock KPIs) */
function _prvStockStat(){
  var sp = (typeof stockPartners==='function') ? stockPartners() : [];
  if(!sp.length) return null;
  var now=0, old=0; sp.forEach(function(r){ now+=_prvNum(r.today); var v=r.values||[]; old+=_prvNum(v[v.length-1]); });
  var varPct = old>0 ? (now-old)/old : 0;
  return { online:now, varPct:varPct, n:sp.length };
}
/* Mail stat (self-contained; FIX: scope to cockpit_matched, not all P) */
function _prvMailStat(){
  var rows = ((typeof P!=='undefined'&&P)?P:[]).filter(function(p){ return p.cockpit_matched; });
  var sent=0, replied=0;
  rows.forEach(function(p){ var s=p.send_totals||{}; sent+=_prvNum(s.sent); replied+=_prvNum(s.replied); });
  if(sent<=0) return null;
  return { sent:sent, replied:replied, rate: sent>0?replied/sent:0 };
}
function _prvAnalyticsHtml(){
  _prvLoadExpanded(false);
  var stock = _prvStockStat(), mail = _prvMailStat();
  var bar = '<div class="prv-an-bar"><span class="prv-an-lab">View detail</span>'
    + (stock ? '<button class="prv-chip'+(_prvExpanded.stock?' on':'')+'" onclick="prvToggleExpand(\'stock\')">📦 Stock</button>' : '')
    + (mail  ? '<button class="prv-chip'+(_prvExpanded.mail?' on':'')+'" onclick="prvToggleExpand(\'mail\')">✉ Mail</button>' : '')
    + '<button class="prv-chip" onclick="switchView(\'overview\')">Full dashboard ⤢</button>'
    + '</div>';
  var cards = '';
  if(stock && _prvExpanded.stock){
    var vc = stock.varPct<0?'down':stock.varPct>0?'up':'flat';
    cards += '<div class="tdv-card"><div class="tdv-card-h"><i data-lucide="package"></i>Stock</div>'
      + '<div class="prv-stat"><b>'+stock.online.toLocaleString()+'</b> units online<span class="l">'+stock.n+' partners</span></div>'
      + '<div class="prv-stat"><b class="'+vc+'">'+_prvPct(stock.varPct)+'</b> 15-day variance<span class="l">SOH</span></div></div>';
  }
  if(mail && _prvExpanded.mail){
    cards += '<div class="tdv-card"><div class="tdv-card-h"><i data-lucide="mail"></i>Outreach</div>'
      + '<div class="prv-stat"><b>'+mail.sent.toLocaleString()+'</b> sent<span class="l">book</span></div>'
      + '<div class="prv-stat"><b>'+mail.replied.toLocaleString()+'</b> replied<span class="l">'+Math.round(mail.rate*100)+'% rate</span></div></div>';
  }
  return '<div class="prv-an">'+bar+(cards?'<div class="prv-an-grid">'+cards+'</div>':'')+'</div>';
}

/* ═══════════ RENDER HELPERS — drops + movers read straight from the data ═══════════ */
function _prvDropsRows(){
  if(_prvWin==='stock'){
    var sp = (typeof stockPartners==='function') ? stockPartners() : [];
    var drops = sp.filter(function(r){ return r.diff < 0; }).sort(function(a,b){ return a.diff - b.diff; }).slice(0,10);
    if(!drops.length) return '<div class="tdv-empty">No stock drops since yesterday</div>';
    return drops.map(function(r){ return '<div class="tdv-mv" onclick="prvOpen(\''+_prvJs(r.store)+'\')"><span class="tdv-mv-co">'+_esc(r.store)+'</span><span class="tdv-mv-d down">↓ '+Math.abs(r.diff).toLocaleString()+' u</span></div>'; }).join('');
  }
  var field = _prvWinField();
  var rows = ((typeof P!=='undefined'&&P)?P:[]).filter(function(p){ return _prvNum(p.cy_ytd)>0 && _prvNum(p[field])<=-0.05; });
  rows.sort(function(a,b){ return _prvNum(a[field]) - _prvNum(b[field]); }); rows = rows.slice(0,10);
  if(!rows.length) return '<div class="tdv-empty">No drops in this window</div>';
  return rows.map(function(p){ return '<div class="tdv-mv" onclick="prvOpen(\''+_prvJs(p.company)+'\')"><span class="tdv-mv-co">'+_esc(p.company)+'</span><span class="tdv-mv-d down">'+_prvPct(_prvNum(p[field]))+'</span></div>'; }).join('');
}
function _prvMoverRow(p){
  var d = _prvNum(p.w4_pct); var cls = d>0?'up':d<0?'down':'flat';
  return '<div class="tdv-mv" onclick="prvOpen(\''+_prvJs(p.company)+'\')"><span class="tdv-mv-co">'+_esc(p.company)+'</span><span class="tdv-mv-d '+cls+'">'+_prvPct(d)+'</span></div>';
}

/* team directive row — the landing spine (directive text + target chips + due/owner) */
function _prvDirectiveRow(p){
  var chips = (p.targets||[]).map(function(t){ return '<span class="prv-tchip" onclick="event.stopPropagation();prvOpen(\''+_prvJs(t)+'\')">'+_esc(t)+'</span>'; }).join('')
    || '<span style="font-size:10.5px;color:var(--ink-4)">no partners</span>';
  var over = (typeof nxPriIsOverdue==='function') && nxPriIsOverdue(p.due_date);
  var dueLbl = (typeof nxPriDueLabel==='function') ? nxPriDueLabel(p.due_date) : (p.due_date||'');
  var due = p.due_date ? '<span class="prv-due'+(over?' over':'')+'">due '+_esc(dueLbl)+'</span>' : '';
  var owner = p.owner ? '<span>'+_esc((typeof nxPriOwnerName==='function')?nxPriOwnerName(p.owner):p.owner)+'</span>' : '';
  return '<div class="prv-dir">'
    + '<span class="tdv-pri pri1" style="margin-top:5px;align-self:flex-start"></span>'
    + '<div class="prv-dir-body"><div class="prv-dir-txt">'+_esc(p.directive)+'</div>'
    +   '<div class="prv-dir-targets">'+chips+'</div></div>'
    + '<div class="prv-dir-meta">'+due+owner+'</div>'
    + '</div>';
}

/* ═══════════════════════════════ MAIN RENDER ═══════════════════════════════
   The landing spine is the team's PRIORITIES (directives → partners), authored in
   the Team view. Grounded book metrics (GTV, partners, stock drops, movers) fold
   in around them. */
function initPriorityView(){
  var host = document.getElementById('view-priority');
  if(!host) return;
  var list = ((typeof P!=='undefined'&&P)?P:[]);
  if(!list.length){ host.innerHTML = '<div class="prv"><div class="tdv-empty" style="margin-top:60px">No partner data loaded yet.</div></div>'; return; }

  // team directives (priorities) — lazy-loaded once, then re-render
  var pris = (typeof _priorities!=='undefined') ? _priorities : [];
  var loadingPris = (pris===null);
  if(loadingPris && typeof loadPriorities==='function' && !(typeof _prioritiesLoading!=='undefined' && _prioritiesLoading)) loadPriorities(function(){ initPriorityView(); });
  var openPris = (pris && pris.filter) ? pris.filter(function(p){ return p.status!=='done'; }) : [];
  var canEdit = (typeof _canEditPriorities==='function') ? _canEditPriorities() : false;

  var b = (typeof nxBrief==='function') ? nxBrief(list) : { count:list.length, gtv:0, yoy:0, up:[], down:[] };
  var teamName = (typeof _amLandingLabel_==='function') ? _amLandingLabel_() : 'Priority';
  var name = (typeof _ixName==='function') ? _ixName() : '';
  var greet = (typeof _ixGreet==='function') ? _ixGreet() : 'Welcome';
  var dateStr = new Date().toLocaleDateString('en-IE', { weekday:'long', day:'numeric', month:'long' });

  // hero controls — just "Manage priorities". The sales/stock window selector moved
  // down onto the Drops card (closer to the data it controls).
  var manageBtn = canEdit ? '<button class="prv-setbtn" onclick="switchView(\'team\')" title="Create &amp; manage team priorities">⚙ Manage priorities</button>' : '';

  // GTV strip — team-level GTV YTD / 4W / 7D (each vs last year) + stock online,
  // matching the Cockpit/Season KPI-card language. (Replaces the old mixed strip;
  // the Overview dashboard is folded into this landing — see graph below.)
  var stock = (typeof _prvStockStat==='function') ? _prvStockStat() : null;
  var stkCls = stock ? (stock.varPct<0?'down':stock.varPct>0?'up':'') : '';
  var g = _prvGtv();
  function _prvGtvCard(label, cy, py){
    var pct = (py>0) ? (cy-py)/py : 0, cls = pct>=0?'up':'down';
    return '<div class="tdv-kpi"><div class="tdv-kpi-l">'+label+'</div>'
      + '<div class="tdv-kpi-v">'+_prvMoney(cy)+'</div>'
      + '<div class="tdv-kpi-s '+(py>0?cls:'')+'">'+(py>0?(_prvPct(pct)+' vs last year'):'no prior-year')+'</div></div>';
  }
  var kpis = '<div class="tdv-kpis">'
    + _prvGtvCard('Book GTV · YTD', g.cy_ytd, g.py_ytd)
    + _prvGtvCard('GTV · 4 weeks',  g.cy_4w,  g.py_4w)
    + _prvGtvCard('GTV · 7 days',   g.cy_7d,  g.py_7d)
    + '<div class="tdv-kpi"><div class="tdv-kpi-l">Stock online · now</div><div class="tdv-kpi-v">'+(stock?stock.online.toLocaleString():'—')+'</div><div class="tdv-kpi-s '+stkCls+'">'+(stock?(_prvPct(stock.varPct)+' vs 15d ago'):'no stock data')+'</div></div>'
    + '</div>';

  // worklist = team directives (open)
  var listHtml, listCount;
  if(loadingPris){ listHtml = '<div class="tdv-empty">Loading priorities…</div>'; listCount=''; }
  else if(!openPris.length){
    listHtml = '<div class="tdv-empty">No team priorities yet. '+(canEdit?'<a onclick="switchView(\'team\')" style="cursor:pointer;text-decoration:underline">Set them in Team →</a>':'A manager will set the week.')+'</div>';
    listCount = '<span class="tdv-count">0</span>';
  } else {
    listHtml = openPris.map(_prvDirectiveRow).join('');
    listCount = '<span class="tdv-count">'+openPris.length+'</span>';
  }

  // Top movers (up & down) · 4-week — read straight from nxBrief
  var moversCard = '<div class="tdv-card"><div class="tdv-card-h"><i data-lucide="trending-up"></i>Top movers · 4 weeks</div>'
    + ((b.up&&b.up.length) ? b.up.map(_prvMoverRow).join('') : '<div class="tdv-empty">No risers</div>')
    + ((b.down&&b.down.length) ? '<div class="tdv-card-h" style="border-top:1px solid var(--border)"><i data-lucide="trending-down"></i>Cooling</div>'+b.down.map(_prvMoverRow).join('') : '')
    + '</div>';

  _prvLoadExpanded(true);

  host.innerHTML = '<div class="prv">'
    + '<div class="tdv-hero"><div><div class="tdv-greet">'+_esc(greet)+(name?', '+_esc(name):'')+'<span class="tdv-wave"> — '+_esc(teamName)+'</span></div>'
    +   '<div class="tdv-sub"><span>'+_esc(dateStr)+'</span><span>·</span><span class="tdv-fresh"><span class="dot"></span>'+_esc(teamName)+'</span>'
    +   '<span>·</span><span>'+b.count+' partners</span><span>·</span><span>'+openPris.length+' '+(openPris.length===1?'priority':'priorities')+'</span>'
    +   '</div></div>'
    +   '<div class="prv-controls">'+manageBtn+'</div>'
    + '</div>'
    + _prvLauncherHtml()
    + kpis
    // MAIN = "Sales by season" graph + Drops (with its own window selector);
    // SIDE = priorities + movers. Priorities sit in the side rail so an empty week
    // doesn't leave a big gap.
    + '<div class="tdv-grid" style="grid-template-columns:1.6fr 1fr">'
    +   '<div class="tdv-col">'
    +     _prvGraphHtml()
    +     _prvDropsCardHtml()
    +   '</div>'
    +   '<div class="tdv-col">'
    +     '<div class="tdv-card"><div class="tdv-card-h"><i data-lucide="target"></i>Priority this week'+listCount
    +        +(canEdit?'<button class="prv-setbtn" style="margin-left:auto;padding:4px 9px;font-size:10px" onclick="switchView(\'team\')">Manage</button>':'')+'</div>'+listHtml+'</div>'
    +     moversCard
    +   '</div>'
    + '</div>'
    + '</div>';

  if(typeof refreshIcons==='function') refreshIcons();
}

/* ═══════════ TEAM GTV + SALES/STOCK GRAPHS (folded-in Overview) ═══════════ */
// Team-level GTV totals (YTD/4W/7D + PY) — aggregated over the team's cockpit
// partners. cy_4w/cy_7d + py_* already ship per-partner in P, so no backend call.
function _prvGtv(){
  var ck = (typeof cockpitPartners==='function') ? cockpitPartners()
         : (((typeof P!=='undefined'&&P)?P:[]).filter(function(p){ return p.cockpit_matched; }));
  var t = { cy_ytd:0, py_ytd:0, cy_4w:0, py_4w:0, cy_7d:0, py_7d:0, n:ck.length };
  ck.forEach(function(d){
    t.cy_ytd+=_prvNum(d.cy_ytd); t.py_ytd+=_prvNum(d.py_ytd);
    t.cy_4w +=_prvNum(d.cy_4w);  t.py_4w +=_prvNum(d.py_4w);
    t.cy_7d +=_prvNum(d.cy_7d);  t.py_7d +=_prvNum(d.py_7d);
  });
  return t;
}

// Team-level "Sales by …" graph (GTV), read from the already team-aggregated
// BREAKDOWNS the backend ships. Switchable dimension: 'season' | 'month' | 'brand'.
// All three are SALES (a period total) — stock stays out (it's a snapshot).
var _prvGraphDim = 'season';   // 'season' | 'month' | 'brand'
function _prvGraphSlices(dim){
  var bd = (typeof BREAKDOWNS!=='undefined' && BREAKDOWNS && BREAKDOWNS[dim]) ? BREAKDOWNS[dim]
         : ((dim==='season' && typeof SEASONS!=='undefined' && SEASONS) ? { allValues:SEASONS.allSeasons, totals:SEASONS.totals } : null);
  if(!bd || !bd.totals || !bd.totals.sales) return [];
  var src = bd.totals.sales;
  var out = [];
  ((bd.allValues && bd.allValues.length) ? bd.allValues : Object.keys(src)).forEach(function(nm){
    var v = src[nm]; if(!v) return;
    var val = v.gtv||0;
    if(val>0) out.push({ name:nm, value:val });
  });
  out.sort(function(a,b){ return b.value-a.value; });
  return out;
}
// ── YoY model ──────────────────────────────────────────────────────────────
// The graph compares the CURRENT year vs LAST year. CY = the most recent year that
// has data (so it tracks "2026" in prod, "2025" in the sim, with no hard-coded year);
// PY = CY-1. Month data comes from BREAKDOWNS[dim].byStore[store][value].months
// (each sale lands in exactly one store×value×month cell → safe to sum).
function _prvYears(){
  var set={}; _prvAvailableMonths().forEach(function(mk){ var y=parseInt(String(mk).slice(0,4),10); if(y) set[y]=1; });
  var ys=Object.keys(set).map(Number).sort(function(a,b){ return b-a; });
  var cy = ys.length ? ys[0] : new Date().getFullYear();
  return { cy:cy, py:cy-1 };
}
// Build a bar that shows the CURRENT-year value with a YoY % label (green up / red
// down). No prior-year value is plotted — we only show CY months/brands + the variation.
function _prvYoYBar(name, cy, py){
  var fmt=function(v){ return (typeof fGtv==='function')?fGtv(v):_prvMoney(v); };
  var b={ name:name, value:cy };
  if(py>0){
    var p=(cy-py)/py;
    b.lab=_prvPct(p); b.labCol = p>=0 ? '#15803d' : '#be123c';
    b.tip = fmt(cy)+' vs '+fmt(py)+' last year · '+_prvPct(p)+' YoY';
  } else {
    b.lab = cy>0 ? 'new' : '—'; b.labCol='#15803d';
    b.tip = fmt(cy)+' · no prior-year figure';
  }
  return b;
}
// MONTH view — the CY year's months (chronological), each labelled with its YoY %
// vs the same month last year.
function _prvMonthYoYSeries(){
  var bd = (typeof BREAKDOWNS!=='undefined' && BREAKDOWNS && BREAKDOWNS.season) ? BREAKDOWNS.season : null;
  if(!bd || !bd.byStore) return [];
  var byMonth={};
  Object.keys(bd.byStore).forEach(function(sk){ var dvs=bd.byStore[sk]; Object.keys(dvs).forEach(function(dv){ ((dvs[dv]&&dvs[dv].months)||[]).forEach(function(mo){ if(mo&&mo.m) byMonth[mo.m]=(byMonth[mo.m]||0)+_prvNum(mo.g); }); }); });
  var yrs=_prvYears();
  var cyMonths=Object.keys(byMonth).filter(function(mk){ return parseInt(mk.slice(0,4),10)===yrs.cy; }).sort();
  return cyMonths.map(function(mk){ return _prvYoYBar(_prvMonthLabel(mk), byMonth[mk]||0, byMonth[yrs.py+'-'+mk.slice(5,7)]||0); });
}
// CATEGORICAL YoY (brand) — per value, CY vs PY. 'all' = CY-year total vs PY-year
// total; a selected month = that month vs the same month a year earlier.
function _prvDimYoY(dim, month){
  var bd = (typeof BREAKDOWNS!=='undefined' && BREAKDOWNS && BREAKDOWNS[dim]) ? BREAKDOWNS[dim] : null;
  if(!bd || !bd.byStore) return [];
  var yrs=_prvYears(), sel=(month && month!=='all');
  var selY=sel?parseInt(month.slice(0,4),10):0, selMM=sel?month.slice(5,7):'';
  var cyB={}, pyB={};
  Object.keys(bd.byStore).forEach(function(sk){ var dvs=bd.byStore[sk]; Object.keys(dvs).forEach(function(dv){
    ((dvs[dv]&&dvs[dv].months)||[]).forEach(function(mo){
      if(!mo||!mo.m) return; var y=parseInt(mo.m.slice(0,4),10), mm=mo.m.slice(5,7), g=_prvNum(mo.g);
      if(sel){ if(y===selY&&mm===selMM) cyB[dv]=(cyB[dv]||0)+g; else if(y===selY-1&&mm===selMM) pyB[dv]=(pyB[dv]||0)+g; }
      else { if(y===yrs.cy) cyB[dv]=(cyB[dv]||0)+g; else if(y===yrs.py) pyB[dv]=(pyB[dv]||0)+g; }
    });
  }); });
  var names={}; Object.keys(cyB).forEach(function(k){names[k]=1;}); Object.keys(pyB).forEach(function(k){names[k]=1;});
  return Object.keys(names).map(function(dv){ return {name:dv, cy:cyB[dv]||0, py:pyB[dv]||0}; });
}
function _prvMonthLabel(mk){
  var m = String(mk).match(/^(\d{4})-(\d{2})/);
  if(!m) return String(mk);
  var names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return (names[parseInt(m[2],10)-1]||m[2]) + " '" + m[1].slice(2);
}
function _prvHasBrand(){
  var b = (typeof BREAKDOWNS!=='undefined' && BREAKDOWNS && BREAKDOWNS.brand && BREAKDOWNS.brand.totals) ? BREAKDOWNS.brand.totals.sales : null;
  return !!(b && Object.keys(b).length);
}
// Season & Brand can be filtered to a single MONTH (data exists every month since
// Jan 2025). 'all' = the all-time totals; otherwise read each dim-value's GTV for the
// chosen month from byStore[...][value].months. (Month dim ignores this — it's a series.)
var _prvGraphMonth = 'all';   // 'all' | 'YYYY-MM'
function _prvAvailableMonths(){
  var bd = (typeof BREAKDOWNS!=='undefined' && BREAKDOWNS && BREAKDOWNS.season) ? BREAKDOWNS.season : null;
  if(!bd || !bd.byStore) return [];
  var set={};
  Object.keys(bd.byStore).forEach(function(sk){ var dvs=bd.byStore[sk]; Object.keys(dvs).forEach(function(dv){ ((dvs[dv]&&dvs[dv].months)||[]).forEach(function(mo){ if(mo&&mo.m) set[mo.m]=true; }); }); });
  return Object.keys(set).sort().reverse();   // most recent first
}
function _prvDimSlicesForMonth(dim, mk){
  var bd = (typeof BREAKDOWNS!=='undefined' && BREAKDOWNS && BREAKDOWNS[dim]) ? BREAKDOWNS[dim] : null;
  if(!bd || !bd.byStore) return [];
  var byVal={};
  Object.keys(bd.byStore).forEach(function(sk){ var dvs=bd.byStore[sk]; Object.keys(dvs).forEach(function(dv){ ((dvs[dv]&&dvs[dv].months)||[]).forEach(function(mo){ if(mo&&mo.m===mk) byVal[dv]=(byVal[dv]||0)+_prvNum(mo.g); }); }); });
  var out=Object.keys(byVal).map(function(dv){ return {name:dv, value:byVal[dv]}; }).filter(function(s){ return s.value>0; });
  out.sort(function(a,b){ return b.value-a.value; });
  return out;
}
function _prvGraphMonthSelectHtml(){
  var months=_prvAvailableMonths();
  var opts='<option value="all"'+(_prvGraphMonth==='all'?' selected':'')+'>All months</option>';
  months.forEach(function(mk){ opts+='<option value="'+mk+'"'+(_prvGraphMonth===mk?' selected':'')+'>'+_esc(_prvMonthLabel(mk))+'</option>'; });
  return '<select class="prv-win" style="padding:4px 9px;font-size:11px" onchange="setPrvGraphMonth(this.value)" title="Show this breakdown for one month">'+opts+'</select>';
}
function _prvBarSvg(bars, total, fmt){
  if(!bars.length) return '';
  var W=640, H=210, padT=22, padB=48, padL=6, padR=6;
  var plotW=W-padL-padR, plotH=H-padT-padB, n=bars.length, gap=8;
  var barW=Math.max(16,(plotW-gap*(n-1))/n);
  var maxV=bars.reduce(function(m,b){ return b.value>m?b.value:m; },0)||1;
  var items=bars.map(function(b,i){
    var h=Math.max(2,Math.round(b.value/maxV*plotH));
    var x=padL+i*(barW+gap), y=padT+(plotH-h);
    var pct=total>0?Math.round(b.value/total*100):0;
    var fill=b.name==='Other'?'#9ca3af':'var(--ink)';
    var lbl=(b.name&&b.name.length>12)?b.name.slice(0,11)+'…':(b.name||'');
    // Optional per-bar overrides: b.lab (top label text, e.g. a YoY %), b.labCol
    // (its colour), b.tip (tooltip body). Falls back to the GTV value (season view).
    var topTxt=(b.lab!=null)?b.lab:fmt(b.value);
    var topFill=b.labCol?b.labCol:'var(--ink)';
    var tip=(b.tip!=null)?(b.name+': '+b.tip):(b.name+': '+fmt(b.value)+' ('+pct+'%)');
    return '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+h+'" fill="'+fill+'" rx="3"><title>'+_esc(tip)+'</title></rect>'
      + '<text x="'+(x+barW/2)+'" y="'+(y-5)+'" text-anchor="middle" style="font-size:10px;font-weight:700;fill:'+topFill+'">'+_esc(topTxt)+'</text>'
      + '<text x="'+(x+barW/2)+'" y="'+(padT+plotH+14)+'" text-anchor="end" transform="rotate(-26 '+(x+barW/2)+' '+(padT+plotH+14)+')" style="font-size:9.5px;fill:var(--ink-3)">'+_esc(lbl)+'</text>';
  }).join('');
  return '<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" style="display:block;width:100%;height:auto">'
    + '<line x1="'+padL+'" y1="'+(padT+plotH)+'" x2="'+(W-padR)+'" y2="'+(padT+plotH)+'" stroke="var(--border)"/>'+items+'</svg>';
}
// Segmented dimension switch (Season / Month / Brand) — same component the rest of
// the app uses (filter-tag-btn in a bordered pill rail; cf. the drawer breakdown tabs).
function _prvGraphDimSwitchHtml(){
  var dims=[{k:'season',l:'Season'},{k:'month',l:'Month'}];
  if(_prvHasBrand()) dims.push({k:'brand',l:'Brand'});
  return '<div style="display:flex;gap:0;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:2px">'
    + dims.map(function(x){ var on=x.k===_prvGraphDim;
        return '<button onclick="setPrvGraphDim(\''+x.k+'\')" class="filter-tag-btn'+(on?' active':'')+'" style="font-size:10px;padding:3px 10px;border-radius:5px">'+x.l+'</button>'; }).join('')
    + '</div>';
}
function _prvGraphTitle(dim){ return dim==='month' ? 'Sales by month' : dim==='brand' ? 'Sales by brand' : 'Sales by season'; }
function _prvGraphHtml(){
  // SALES (GTV) by the selected dimension, current year with YoY where it applies:
  //  • MONTH — the CY year's months, each labelled with its YoY % vs the same month
  //    last year (only CY months shown; no prior-year bars).
  //  • BRAND — top 10 named brands by CY GTV, each labelled with its YoY %. The source
  //    "Other" bucket (~98%) is dropped from the bars and reported as one number below.
  //  • SEASON — absolute GTV composition (top 8 + "Other"). A product season (e.g.
  //    "SS25") is inherently one year's line, so a calendar YoY isn't meaningful here.
  // Season & Brand can be narrowed to a single month. Stock stays out (it's a snapshot).
  var dim=(typeof _prvGraphDim!=='undefined') ? _prvGraphDim : 'season';
  if(dim==='brand' && !_prvHasBrand()) dim='season';
  var month=(typeof _prvGraphMonth!=='undefined') ? _prvGraphMonth : 'all';
  var fmt=function(v){ return (typeof fGtv==='function')?fGtv(v):_prvMoney(v); };
  var bars=[], caption='', yoy=false;

  if(dim==='month'){
    bars=_prvMonthYoYSeries(); yoy=true;
  } else if(dim==='brand'){
    var items=_prvDimYoY('brand', month);
    var named=items.filter(function(it){ return it.name!=='Other'; }).sort(function(a,b){ return b.cy-a.cy; });
    var top=named.slice(0,10);                  // top 10 named brands by CY GTV
    bars=top.map(function(it){ return _prvYoYBar(it.name, it.cy, it.py); }).filter(function(b){ return b.value>0; });
    yoy=true;
    var totalCY=items.reduce(function(a,it){ return a+it.cy; },0);
    var shownCY=top.reduce(function(a,it){ return a+it.cy; },0);
    var otherAmt=Math.max(0, totalCY-shownCY); // dropped "Other" bucket + any brand past 10
    if(otherAmt>0){
      var op=totalCY>0?Math.round(otherAmt/totalCY*100):0;
      caption='<div style="margin-top:10px;padding-top:9px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;align-items:baseline;gap:6px;font-size:11px;color:var(--ink-4)"><span>Others</span><b style="color:var(--ink);font-size:13px;font-variant-numeric:tabular-nums">'+fmt(otherAmt)+'</b><span>'+op+'% of total</span></div>';
    }
  } else {
    // season — absolute composition (top 8 + Other rollup); optional single-month filter
    var slices = (month!=='all') ? _prvDimSlicesForMonth('season', month) : _prvGraphSlices('season');
    var MAX=8;
    if(slices.length>MAX){ var t=slices.slice(0,MAX-1), rest=slices.slice(MAX-1), ov=0; rest.forEach(function(s){ov+=s.value;}); t.push({name:'Other',value:ov}); bars=t; }
    else bars=slices.slice();
  }

  var total=bars.reduce(function(s,b){ return s+(b.value||0); },0);
  var title=_prvGraphTitle(dim)
    + ((dim!=='month' && month!=='all') ? ' · '+_esc(_prvMonthLabel(month)) : '')
    + (yoy ? ' · YoY%' : '');
  var body = bars.length ? (_prvBarSvg(bars,total,fmt)+caption) : '<div class="tdv-empty">No sales data for this view</div>';
  return '<div class="tdv-card" id="prvGraphCard">'
    + '<div class="tdv-card-h"><i data-lucide="bar-chart-2"></i>'+title
    +   '<div style="margin-left:auto;display:flex;align-items:center;gap:8px">'
    +     (dim!=='month' ? _prvGraphMonthSelectHtml() : '')
    +     _prvGraphDimSwitchHtml()
    +   '</div>'
    + '</div>'
    + '<div style="padding:14px 16px 12px">'+body+'</div>'
    + '</div>';
}
// Surgically re-render just the graph card so the controls feel instant (no full re-render).
function setPrvGraphDim(dim){
  if(dim!=='season'&&dim!=='month'&&dim!=='brand') return;
  _prvGraphDim=dim;
  _prvRerenderGraph_();
}
function setPrvGraphMonth(mk){ _prvGraphMonth=mk; _prvRerenderGraph_(); }
function _prvRerenderGraph_(){
  var el=document.getElementById('prvGraphCard');
  if(el){ el.outerHTML=_prvGraphHtml(); if(typeof refreshIcons==='function') refreshIcons(); }
  else initPriorityView();
}

/* ═══════════════════════════════ CONTROLS ═══════════════════════════════ */
// The sales/stock window selector lives ON the Drops card (next to the data it
// controls). Sales windows are PERIODS (vs last year); stock is a day-over-day
// SNAPSHOT delta — the labels say which, since the "when" differs by metric.
function _prvWinSelectHtml(){
  return '<select class="prv-win" style="margin-left:auto" onchange="prvSetWin(this.value)" title="What the Drops list shows">'
    + '<optgroup label="Sales · vs last year"><option value="d7"'+(_prvWin==='d7'?' selected':'')+'>This week</option>'
    + '<option value="w4"'+(_prvWin==='w4'?' selected':'')+'>4 weeks</option><option value="ytd"'+(_prvWin==='ytd'?' selected':'')+'>YTD</option></optgroup>'
    + '<optgroup label="Stock · snapshot"><option value="stock"'+(_prvWin==='stock'?' selected':'')+'>Stock · since yesterday</option></optgroup></select>';
}
function _prvDropsCardHtml(){
  var dropTitle = _prvWin==='stock' ? 'Stock drops · since yesterday' : ('Sales drops · ' + (_prvWin==='ytd'?'YTD':_prvWin==='w4'?'4 weeks':'this week'));
  return '<div class="tdv-card" id="prvDropsCard"><div class="tdv-card-h"><i data-lucide="trending-down"></i>'+_esc(dropTitle)+_prvWinSelectHtml()+'</div>'+_prvDropsRows()+'</div>';
}
// Surgically re-render just the Drops card so changing the selector visibly updates
// the list right below it (no full-page re-render / scroll jump).
function prvSetWin(w){
  _prvWin = w;
  var card = document.getElementById('prvDropsCard');
  if(card){ card.outerHTML = _prvDropsCardHtml(); if(typeof refreshIcons==='function') refreshIcons(); }
  else initPriorityView();
}
function prvOpen(company){ if(typeof nxOpen==='function') nxOpen(company); }

/* ── Landing quick-launcher: jump to a team / Head / Admin — in-app, NO new GAS deploy.
   Team boxes come from _userTeams (the teams this user may access); Head/Admin are gated
   on click. Real enforcement stays server-side (checkManager_/assertHead_); this just
   avoids dead navigation and shows a no-permission card when access is missing. */
function _prvCanHead(){ return (typeof _isV2!=='undefined' && _isV2) ? (typeof _isHead!=='undefined' && _isHead) : (typeof _isManager!=='undefined' && _isManager); }
function _prvCanAdmin(){ return (typeof _isManager!=='undefined' && _isManager); }   // matches initAdminView + server checkManager_ (Head is a viewer, not a system admin)
function _prvLauncherHtml(){
  var teams = (typeof _userTeams!=='undefined' && _userTeams) ? _userTeams : [];
  var cur = (typeof _userTeam!=='undefined') ? _userTeam : '';
  var html = '<div class="prv-jumpbar"><span class="prv-jump-lab">Jump to</span>';
  teams.forEach(function(t){
    var on = (t.name === cur);
    html += '<button class="prv-jump'+(on?' on':'')+'" onclick="nxLaunch(\'team\',\''+_prvJs(_esc(t.name))+'\')" title="Open '+_esc(t.label||t.name)+'">'+_esc(t.label||t.name)+'</button>';
  });
  html += '<button class="prv-jump prv-jump-x" onclick="nxLaunch(\'head\')" title="Head — all teams">Head</button>';
  html += '<button class="prv-jump prv-jump-x" onclick="nxLaunch(\'admin\')" title="Admin">Admin</button>';
  return html + '</div>';
}
function nxLaunch(kind, value){
  if(kind==='team'){
    var teams = (typeof _userTeams!=='undefined' && _userTeams) ? _userTeams : [];
    if(!teams.some(function(t){return t.name===value;})){ nxNoPermission('Team “'+value+'”'); return; }
    if(value === (typeof _userTeam!=='undefined'?_userTeam:'')){ if(typeof switchView==='function') switchView('priority'); return; }
    if(typeof handleTeamSwitch==='function') handleTeamSwitch(value);   // full in-app reboot for that team → lands on its landing
    return;
  }
  if(kind==='head'){ if(_prvCanHead()){ if(typeof switchView==='function') switchView('head'); } else nxNoPermission('the Head view'); return; }
  if(kind==='admin'){ if(_prvCanAdmin()){ if(typeof switchView==='function') switchView('admin'); } else nxNoPermission('Admin'); return; }
}
function nxNoPermission(label){
  var id='nxNoPerm', ov=document.getElementById(id);
  if(!ov){ ov=document.createElement('div'); document.body.appendChild(ov); ov.id=id; }
  ov.className='nxnp-ov';
  ov.innerHTML='<div class="nxnp-card"><div class="nxnp-ic">🔒</div><div class="nxnp-t">No access</div>'
    + '<div class="nxnp-s">You don\'t have permission to open '+_esc(label)+'.</div>'
    + '<button class="nxnp-btn" onclick="var e=document.getElementById(\''+id+'\');if(e)e.style.display=\'none\'">Back</button></div>';
  ov.style.display='flex';
}

/* Apply a deep-link (?team=/?view=) once after boot — same gating as the launcher.
   The boot nulls NX_DEEP after the first call so a team-switch reboot won't re-fire. */
function nxApplyDeepLink_(d){
  if(!d) return;
  var view = String(d.view||'').toLowerCase().trim();
  var team = String(d.team||'').trim();
  // V3.17 — apply TEAM first, THEN view. Previously a ?view= short-circuited and
  // returned before ?team= was honoured, so ?team=Daniel&view=cockpit landed on
  // the CURRENT team's data (Admin saw the wrong team).
  if(team && team !== (typeof _userTeam!=='undefined'?_userTeam:'')){
    var okT = ((typeof _userTeams!=='undefined' && _userTeams)?_userTeams:[]).some(function(t){return t.name===team;});
    if(okT){ handleTeamSwitch(team); } else { nxNoPermission('Team “'+team+'”'); return; }
  }
  if(view){
    if(view==='head'){ _prvCanHead() ? switchView('head') : nxNoPermission('the Head view'); }
    else if(view==='admin'){ _prvCanAdmin() ? switchView('admin') : nxNoPermission('Admin'); }
    else { try{ switchView(view); }catch(e){ console.error('deep-link view',e); } }
  }
}
</script>
