// ── V11: Team & permissions state ───────────────────────────────────────────
var _userTeam = '', _userRole = '', _userTeams = [];
// AM v2 (isolated deployment) — Head role + manager scoping. Both default false

var _isV2 = false, _isHead = false, _manageTeams = [];
// V3.9 — Lead email for the active team. Resolved via getTeamLeadEmail after

var _userTeamLeadEmail = '';
var _userPerms = null;  // full permissions object from getUserPermissions()

var _mailConfig = { proxyUrl: '', sharedEmail: '' };

// ── V3.2 — Boot state for snapshot-first hydrate ───────────────────────────
// true after handleUnifiedData has run its one-time init (views, listeners,
// downstream fetches). Subsequent updates route through refreshUnifiedData.
var _bootCompleted = false;
// true once bootstrapAM's permissions have been applied (role/teams/nav). The
// deep-link (?team=/?view=) needs BOTH this AND _bootCompleted (app visible) —
// the early IndexedDB-hydrate path can finalize the boot BEFORE perms arrive, so
// a deep-link applied there would fail the Head/Admin/team gate. See

var _permsApplied = false;

/* ═══════════════════════════════════════════════════════════════════════════
   V3.10 — Multi-language template registry (frontend cache)

   EMAIL_TEMPLATES used to be a flat object: { key: { subject, body, icon } }.
   It's now nested: { key: { display_name, category, icon, languages: { LANG: {subject, body} } } }.

   On boot we async-fetch the registry from the templates spreadsheet and
   replace the in-memory object. Until that fetch returns EMAIL_TEMPLATES is
   empty ({}); there is NO hardcoded fallback. If the sheet is unseeded or the
   fetch fails, the gallery stays empty by design (templates are sheet-only).

   Lookup helper resolveTemplate_(key, lang) is the canonical entry point.
   It applies the resolution rule:
     - normalize partner.language (blank/invalid → EN)
     - look up templates[key].languages[lang]
     - exact match → return it
     - exact missing → return null + diagnostic info; caller decides whether
       to block or fall back to EN as an explicit override
═══════════════════════════════════════════════════════════════════════════ */

// Allowed language codes — must match LANGUAGES in NX_Config.gs
var NX_LANGUAGES = ['EN', 'ES', 'DE', 'FR', 'PT', 'JA'];
var NX_LANGUAGE_LABELS = {
  EN: 'English', ES: 'Español', DE: 'Deutsch',
  FR: 'Français', PT: 'Português', JA: '日本語'
};
var NX_LANGUAGE_DEFAULT = 'EN';

// Normalize a partner.language value to one of NX_LANGUAGES, defaulting to EN.
function normalizeLanguage_(raw) {
  if (!raw) return NX_LANGUAGE_DEFAULT;
  var v = String(raw).trim().toUpperCase();
  return NX_LANGUAGES.indexOf(v) >= 0 ? v : NX_LANGUAGE_DEFAULT;
}

/**
 * Resolve a template for a given language.
 *   key: template_key
 *   lang: target language (already normalized; pass normalizeLanguage_(p.language))
 * Returns:
 *   { found: true,  subject, body, language_used }       on exact match
 *   { found: false, available: [LANG, ...], requested }  on miss
 */
function resolveTemplate_(key, lang) {
  var tpl = EMAIL_TEMPLATES[key];
  if (!tpl) return { found: false, available: [], requested: lang, missingTemplate: true };
  var langs = tpl.languages || {};
  var available = Object.keys(langs);
  if (langs[lang]) {
    return {
      found: true,
      subject: langs[lang].subject,
      body: langs[lang].body,
      language_used: lang,
      available: available
    };
  }
  return { found: false, available: available, requested: lang };
}

// V3.20 — EMAIL_TEMPLATES holds nested {key:{display_name,category,icon,languages}}.
// Loaded EXCLUSIVELY from the Email Templates sheet at boot (loadTemplatesFromSheet_,
// below). No template copy is hardcoded any more: it starts empty and the gallery
// shows whatever the sheet returns (empty if the sheet is missing / unreachable).
var EMAIL_TEMPLATES = {};

/* ═══════════════════════════════════════════════════════════════════════════
   V3.10 — Convert legacy flat-shape EMAIL_TEMPLATES into nested-by-language
   shape on initial load. Existing pre-V3.10 entries (flat: subject/body/icon
   directly on the template) are wrapped into {languages: {EN: {subject, body}}}
   on the fly. Pre-existing 'Policy EN/ES/FR/DE' entries are merged into a
   single 'Policy' template with multiple language variants.
   This adapter runs ONCE before any template consumer reads EMAIL_TEMPLATES.
═══════════════════════════════════════════════════════════════════════════ */
(function _migrateEmailTemplatesShape_() {
  var src = EMAIL_TEMPLATES;
  var out = {};
  Object.keys(src).forEach(function(key) {
    var v = src[key];
    if (!v) return;
    // Already nested — pass through
    if (v.languages) { out[key] = v; return; }

    // Detect legacy 'Policy <LANG>' aliases — fold into single 'Policy' key
    var langSuffixMatch = key.match(/^(.+?)\s+(EN|ES|DE|FR|PT|JA)$/);
    if (langSuffixMatch) {
      var canonicalKey = langSuffixMatch[1];
      var lang = langSuffixMatch[2];
      if (!out[canonicalKey]) {
        out[canonicalKey] = {
          display_name: canonicalKey, category: '', icon: v.icon || 'mail',
          languages: {}
        };
      }
      out[canonicalKey].languages[lang] = { subject: v.subject || '', body: v.body || '' };
      return;
    }

    out[key] = {
      display_name: key,
      category: '',
      icon: v.icon || 'mail',
      languages: {
        EN: { subject: v.subject || '', body: v.body || '' }
      }
    };
  });
  EMAIL_TEMPLATES = out;
})();

/* Async-load templates from the Templates sheet. Replaces EMAIL_TEMPLATES
   with sheet contents on success. Called from boot below — fire-and-forget;
   fallback shape stays in place if the call fails. */
function loadTemplatesFromSheet_() {
  var useGAS = typeof google !== 'undefined' && google.script && google.script.run;
  if (!useGAS) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.templates || !Object.keys(res.templates).length) {
        // Sheet empty / not seeded yet — leave EMAIL_TEMPLATES as {} (gallery shows 0 templates).
        return;
      }
      EMAIL_TEMPLATES = res.templates;
      // Re-render gallery if user is currently on the email view
      if (typeof renderWizStep1 === 'function' && document.getElementById('view-email') &&
          document.getElementById('view-email').style.display !== 'none' &&
          typeof wiz !== 'undefined' && wiz.step === 1) {
        try { renderWizStep1(); } catch(e) {}
      }
    })
    .withFailureHandler(function() { /* silent — fallback stays */ })
    .getTemplatesAll();
}

// Allow manual cache bust → refetch (admin / power-user button).
function reloadTemplates() {
  var useGAS = typeof google !== 'undefined' && google.script && google.script.run;
  if (!useGAS) return;
  google.script.run
    .withSuccessHandler(function() {
      loadTemplatesFromSheet_();
      if (typeof showToast === 'function') showToast('Templates reloaded', 'success');
    })
    .withFailureHandler(function(e) {
      if (typeof showToast === 'function') showToast('Reload failed: ' + (e.message || e), 'error');
    })
    .bustTemplatesCache();
}

/* ═══════════════════════════════════════      
   APP INIT      
═══════════════════════════════════════ */      
window.onload = function() {    
  currentViewMonday = getMonday(new Date());    
  refreshIcons();    
  setLoadMsg('Connecting to NEXUS…');    
  var useGAS = typeof google !== 'undefined' && google.script && google.script.run;

  // ── V3.2 (Fix 1): Early IDB hydrate ─────────────────────────────────────
  // If we have a cached team from last session, kick NX_SNAPSHOT.boot off NOW,
  // in parallel with the email+perms chain. IDB read returns in ~100 ms, so
  // first paint can happen before any GAS round-trip completes.
  // Perms flow below will validate the cached team and reconcile if it changed.
  //
  // Gate: only the cached team needs to match an enabled team. We can't check
  // email here (getActiveUserEmail hasn't returned yet); if ALLOWLIST is later
  // populated and this user isn't in it, the perms-driven isEnabled() check
  // will fall back to the live path and overwrite whatever the early boot
  // painted. In the worst case the user briefly sees their own prior IDB cache.
  var cachedTeam = null;
  try { cachedTeam = localStorage.getItem('nx_last_team'); } catch(e) { /* private mode, ignore */ }

  var earlyBootInFlight = false;
  if (useGAS && cachedTeam &&
      typeof NX_SNAPSHOT !== 'undefined' &&
      NX_SNAPSHOT.ENABLED_TEAMS && NX_SNAPSHOT.ENABLED_TEAMS.indexOf(cachedTeam) !== -1) {
    earlyBootInFlight = true;
    setLoadMsg('Loading from cache…');
    // Provisional _userTeam so syncLabel / overview greeting have something
    // to render with. Overwritten by perms in Step 2 (same value on happy path).
    _userTeam = cachedTeam;
    NX_SNAPSHOT.boot(cachedTeam, function(data, meta) {
      if (!data) {
        // V3.13 — When IDB is empty/stale AND the remote snapshot is also
        // stale/missing/unreachable, this branch used to just log and
        // return, expecting the late perms-driven flow to trigger fallback.
        // It doesn't: that flow's "happy path" sees `earlyBootInFlight`
        // still true and does nothing. Result: UI hangs forever on
        // "Loading … data…". Trigger the live fetch directly here. Guarded
        // so it doesn't fire if perms came back with a different team
        // while we were running — the late flow's re-hydrate handles that.
        if (_userTeam && _userTeam !== cachedTeam) {
          console.warn('[snapshot] early boot got no data; perms changed team — letting late flow handle');
          return;
        }
        console.warn('[snapshot] early boot got no data (' + (meta && meta.error) + '), falling back to live');
        NX_SNAPSHOT._fellBackToLive = true;
        google.script.run
          .withSuccessHandler(handleUnifiedData)
          .withFailureHandler(function(e) { console.error('UnifiedData:', e); handleUnifiedData(null); })
          .getUnifiedPartnerData(cachedTeam);
        return;
      }
      // Defensive: if perms came back in the meantime with a different team,
      // drop this callback — it's for the wrong team now.
      if (_userTeam && _userTeam !== cachedTeam) {
        console.warn('[snapshot] early boot callback stale (team changed), discarding');
        return;
      }
      if (_bootCompleted) refreshUnifiedData(data);
      else handleUnifiedData(data);
    });
  }

  if (useGAS) {

    // ── Step 1: One-shot boot (AI-01) — email + permissions + mail config +
    // team lead in a single round-trip via bootstrapAM(). ───────────────────
    setLoadMsg('Starting NEXUS…');
    google.script.run.withSuccessHandler(function(boot) {
      var email = (boot && boot.email) || '';
      _userEmail = email || '';
      var _displayName = email ? email.split('@')[0].split('.').map(function(w){ return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ') : email;    
      document.getElementById('ctxUser').innerHTML = '<option value="' + esc(email) + '">' + esc(_displayName) + '</option>';
      if (_displayName === 'Commercialsupport') _displayName = 'Commercial Support';    
      var personalOpt = document.querySelector('#sendFromSelect option[value="personal"]');    
      if (personalOpt) personalOpt.textContent = '\ud83d\udc64 ' + (email ? email.split('@')[0] : 'My Account');

      // ── Step 2: Apply permissions (already bundled by bootstrapAM — no 2nd
      // round-trip). ────────────────────────────────────────────────────────
      setLoadMsg('Loading permissions…');
      (function(perms) {
        _userPerms = perms;
        if (!perms || !perms.authorized) {    
          setLoadMsg('Access denied');    
          document.getElementById('loadingOverlay').innerHTML =    
            '<div style="font-family:Barlow,sans-serif;text-align:center;padding:40px">' +    
            '<div style="font-size:36px;font-weight:700;margin-bottom:12px">NEXUS</div>' +    
            '<div style="font-size:14px;color:#888">You don\'t have access to this hub.<br>Contact your admin to be added to the Permissions sheet.</div></div>';    
          return;    
        }

        _userRole = perms.role || 'User';
        _userTeam = perms.team || '';
        _userTeams = perms.teams || [];
        _isManager = (_userRole === 'Admin' || _userRole === 'Manager');
        _canSendShared = perms.canSendShared || false;
        // AM v2 flags (false/empty on v1 → all the old gates below are unchanged).
        _isV2 = perms.v2 === true;
        _isHead = perms.isHead === true || _userRole === 'Admin';
        _manageTeams = perms.manageTeams || [];

        // Admin page: v1 = managers+admin; v2 = admin + head + manager.
        var showAdmin = _isManager || (_isV2 && _isHead);
        if (showAdmin) { var n = document.getElementById('nav-admin'); if (n) n.style.display = 'flex'; }
        // Test send stays a manager/admin tool (Head is view-only).
        if (_isManager) { var tb = document.getElementById('btnTestSend'); if (tb) tb.style.display = 'inline-flex'; }
        // Head nav: v1 = managers+admin (unchanged); v2 = admin + head only.
        var showHead = _isV2 ? _isHead : _isManager;
        if (showHead) { var hN = document.getElementById('nav-head'); if (hN) hN.style.display = 'flex'; }
        // V3.9 — Huddle nav: visible to everyone. No gate; just unhide.
        // V3.11 — Huddle moved under Team; subs are hidden until user clicks
        // Team. No boot-time visibility change needed.

        // V3.9 — Resolve current team's lead email for the Outreach CC checkbox.
        // Async, fire-and-forget — UI hides the lead-CC option until this resolves
        // (or shows it disabled if the call comes back empty).
        if (_userTeam) {
          if (boot && boot.teamLead !== undefined && boot.teamLead !== null) {
            _userTeamLeadEmail = boot.teamLead || '';        // bundled by bootstrapAM
          } else {
            google.script.run
              .withSuccessHandler(function(email) { _userTeamLeadEmail = email || ''; })
              .withFailureHandler(function() { _userTeamLeadEmail = ''; })
              .getTeamLeadEmail(_userTeam);
          }
        }

        // V3.20 — Pull the multi-language templates registry from the sheet.
        // Fire-and-forget: if it fails or the sheet is empty, EMAIL_TEMPLATES
        // stays {} and the gallery renders empty (no hardcoded fallback).
        loadTemplatesFromSheet_();

        // Build team dropdown
        buildTeamSelector();

        if (typeof buildOverviewGreeting === 'function') buildOverviewGreeting();

        // Permissions + nav are now applied → a deferred deep-link can run (the
        // early-hydrate path may have already finalized the boot before this).
        _permsApplied = true;
        if (typeof _maybeApplyDeepLink_ === 'function') _maybeApplyDeepLink_();

        // V3.2 — cache team for next reload's early hydrate
        try { if (_userTeam) localStorage.setItem('nx_last_team', _userTeam); } catch(e) { /* ignore */ }

        // ── Step 3: Load data for user's team ───────────────────────────
        // Reconciliation with the early boot that may already be in flight.
        setLoadMsg('Loading ' + _userTeam + ' data…');

        if (earlyBootInFlight && _userTeam === cachedTeam) {
          // Happy path — cached team matched, early boot is handling both the
          // IDB hydrate and the remote refresh. Nothing to do here.
        } else {
          if (earlyBootInFlight && _userTeam !== cachedTeam) {
            // Rare: team changed since last session (e.g. manager switched teams
            // and reloaded). Discard the early hydrate's state and re-init.
            console.warn('[snapshot] team changed (' + cachedTeam + ' → ' + _userTeam + '), re-hydrating');
            _bootCompleted = false;
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
          }

          if (typeof NX_SNAPSHOT !== 'undefined' && NX_SNAPSHOT.isEnabled(_userEmail, _userTeam)) {
            NX_SNAPSHOT.boot(_userTeam, function(data, meta) {
              if (!data) {
                console.warn('[snapshot] boot failed (' + (meta && meta.error) + '), falling back to live');
                NX_SNAPSHOT._fellBackToLive = true;
                google.script.run
                  .withSuccessHandler(handleUnifiedData)
                  .withFailureHandler(function(e) { console.error('UnifiedData:', e); handleUnifiedData(null); })
                  .getUnifiedPartnerData(_userTeam);
                return;
              }
              if (_bootCompleted) refreshUnifiedData(data);
              else handleUnifiedData(data);
            });
          } else {
            google.script.run
              .withSuccessHandler(handleUnifiedData)
              .withFailureHandler(function(e) { console.error('UnifiedData:', e); handleUnifiedData(null); })
              .getUnifiedPartnerData(_userTeam);
          }
        }

        // ── Step 4: Mail proxy config (bundled by bootstrapAM when available) ──
        var _applyMailCfg = function(cfg) {
          _mailConfig = cfg || _mailConfig;
          if (_mailConfig.proxyUrl) {
            var btn = document.getElementById('btnConnectGmail');
            if (btn) btn.style.display = 'inline-flex';
            var info = document.getElementById('gmailInfoWrap');
            if (info) info.style.display = 'inline-flex';
            var dd = document.getElementById('sendFromSelect');
            if (dd) { dd.style.display = ''; applySendFromRestriction(); }
          }
        };
        if (boot && boot.mailConfig) { _applyMailCfg(boot.mailConfig); }
        else { google.script.run.withSuccessHandler(_applyMailCfg).getMailConfig(_userTeam); }

        // V3.2 — removed obsolete `getDrafts()` / `populateMproDrafts` call
        // (dead since Gen 3; was throwing ReferenceError on every boot).

      })((boot && boot.perms) || null);

    }).withFailureHandler(function(e) {
      console.error('NEXUS bootstrap failed:', e);
      setLoadMsg('Error starting NEXUS');
    }).bootstrapAM();

  } else {    
    setLoadMsg('Running in demo mode');    
    handleUnifiedData(null);    
    document.getElementById('ctxUser').innerHTML = '<option value="demo">Demo User</option>';    
  }    
};

/* ═══════════════════════════════════════    
   V11: TEAM SELECTOR    
═══════════════════════════════════════ */

/** Builds the team dropdown from _userTeams. Managers see all + each team. Users see label only. */    
function buildTeamSelector() {    
  var dd = document.getElementById('ctxTeam');    
  var badge = document.getElementById('teamRoleBadge');    
  var topBadge = document.getElementById('topbarTeamBadge');    
  if (!dd) return;

  if ((_isManager || _userTeams.length > 1) && _userTeams.length > 0) {
    // Managers (and multi-team users) get a live dropdown
    var opts = '';    
    _userTeams.forEach(function(t) {    
      var sel = (t.name === _userTeam) ? ' selected' : '';    
      opts += '<option value="' + esc(t.name) + '"' + sel + '>' + esc(t.label || t.name) + '</option>';    
    });    
    dd.innerHTML = opts;    
    dd.disabled = false;    
    dd.style.opacity = '1';    
  } else {    
    // Regular users see their team name as a label (disabled)    
    var teamLabel = _userTeams.length ? (_userTeams[0].label || _userTeam) : _userTeam;    
    dd.innerHTML = '<option value="' + esc(_userTeam) + '">' + esc(teamLabel) + '</option>';    
    dd.disabled = true;    
    dd.style.opacity = '0.7';    
  }

  // Role badge — now inline next to "User" header    
  if (badge) {    
    var roleColors = { 'Admin': '#534AB7', 'Head': '#0B6B5A', 'Manager': '#854F0B', 'User': '#5F5E5A' };
    var roleBgs = { 'Admin': '#EEEDFE', 'Head': '#DCF3EE', 'Manager': '#FAEEDA', 'User': '#F1EFE8' };
    badge.innerHTML = '<span style="font-size:7px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:1px 5px;border-radius:3px;background:' +    
      (roleBgs[_userRole] || '#F1EFE8') + ';border:1px solid ' + (roleColors[_userRole] || '#5F5E5A') + ';color:' +    
      (roleColors[_userRole] || '#5F5E5A') + '">' + esc(_userRole) + '</span>';    
    badge.style.display = 'inline';    
  }

  // Topbar team badge    
  if (topBadge) {    
    topBadge.textContent = _userTeams.length > 0 ? (_userTeams.find(function(t){return t.name===_userTeam;}) || {}).label || _userTeam : _userTeam;    
    topBadge.style.display = 'inline';    
  }    
}

/** Called when manager changes team dropdown. Reloads all data. */    
function handleTeamSwitch(newTeam) {
  if (!newTeam || newTeam === _userTeam) return;
  _userTeam = newTeam;
  // Keep the team picker in sync for PROGRAMMATIC switches (deep-link, launcher);
  // for a manual change the select already holds newTeam, so this is a no-op.
  try { var _sel = document.getElementById('ctxTeam'); if (_sel && _sel.value !== newTeam) _sel.value = newTeam; } catch (e) {}
  _syncPriorityNav_();

  // V3.8 — Clear all view-local caches that hold per-team data. Without this,
  // overview outreach, bidask, and reply center hand back the previous team's
  // results until something invalidates them.
  if (typeof _ovOutreachCache !== 'undefined') _ovOutreachCache = {};
  if (typeof bidaskState !== 'undefined') { bidaskState.data = null; bidaskState.lastFetchTeam = null; }
  if (typeof rcState !== 'undefined') { rcState.data = null; rcState.threadCache = {}; rcState.selectedSheetRow = null; rcState.activeCampaignId = null; }
  // V3.9 — Huddle is per-team; Head is hub-wide so doesn't need a reset, but
  // we still clear it so a refresh picks up any newly-added team huddles.
  if (typeof huddleState !== 'undefined') { huddleState.data = null; huddleState.lastFetchTeam = null; }
  if (typeof holidaysState !== 'undefined') { holidaysState.data = null; holidaysState.lastFetchTeam = null; }
  if (typeof headState !== 'undefined') { headState.data = null; }

  // V3.9 — Refetch team lead email for new team (drives Outreach CC option).
  _userTeamLeadEmail = '';
  google.script.run
    .withSuccessHandler(function(email) { _userTeamLeadEmail = email || ''; })
    .withFailureHandler(function() { _userTeamLeadEmail = ''; })
    .getTeamLeadEmail(newTeam);

  // V11: update canSendShared based on new team's config
  var teamCfg = _userTeams.find(function(t) { return t.name === newTeam; });
  if (_userRole === 'Admin') {
    _canSendShared = true;
  } else if (_isV2 && _userRole === 'Head') {
    _canSendShared = false;                                  // Head is view-only
  } else if (_isV2 && _userRole === 'Manager') {
    _canSendShared = (_manageTeams.indexOf(newTeam) > -1) && !!(teamCfg && teamCfg.sharedSend);
  } else {
    _canSendShared = !!(teamCfg && teamCfg.sharedSend);
  }
  applySendFromRestriction();
  adminLoaded = false;  // V11: force admin panel reload for new team
  // If the Admin panel is open when the team changes, refresh it now so the
  // Send Log / logs / accounts reflect the newly selected team (otherwise the
  // admin sees the previous team's data until they navigate away and back).
  if (typeof adminAccounts !== 'undefined') adminAccounts = [];
  try {
    var _av = document.getElementById('view-admin');
    if (_av && _av.style.display !== 'none' && typeof initAdminView === 'function') initAdminView();
  } catch (e) { console.error('NEXUS admin refresh on team switch:', e); }

  // Re-fetch mail config for the new team so sharedEmail / From label update.
  google.script.run
    .withSuccessHandler(function(cfg) {
      _mailConfig = cfg || _mailConfig;
      applySendFromRestriction();
    })
    .withFailureHandler(function() { /* keep existing _mailConfig */ })
    .getMailConfig(newTeam);

  // Show loading overlay    
  var overlay = document.getElementById('loadingOverlay');    
  overlay.style.display = 'flex';    
  document.getElementById('app').style.display = 'none';    
  setLoadMsg('Switching to ' + newTeam + '…');

  // Update topbar badge    
  var topBadge = document.getElementById('topbarTeamBadge');    
  if (topBadge) {    
    var teamObj = _userTeams.find(function(t) { return t.name === newTeam; });    
    topBadge.textContent = teamObj ? (teamObj.label || newTeam) : newTeam;    
  }

  // Reload data for new team    
  // V3.2 — treat team switch as a fresh boot (new team → new email threads,
  // contacts, etc. — we do want initEmailView / loadAllContacts to re-run).
  _bootCompleted = false;
  // Persist new team for next reload's early hydrate
  try { localStorage.setItem('nx_last_team', newTeam); } catch(e) { /* ignore */ }

  if (typeof NX_SNAPSHOT !== 'undefined' && NX_SNAPSHOT.isEnabled(_userEmail, newTeam)) {
    NX_SNAPSHOT.boot(newTeam, function(data, meta) {
      if (!data) {
        console.warn('[snapshot] team-switch boot failed, falling back to live');
        NX_SNAPSHOT._fellBackToLive = true;
        google.script.run
          .withSuccessHandler(function(r) { handleUnifiedData(r); })
          .withFailureHandler(function(e) { console.error('TeamSwitch:', e); setLoadMsg('Error loading team data'); handleUnifiedData(null); })
          .getUnifiedPartnerData(newTeam);
        return;
      }
      if (_bootCompleted) refreshUnifiedData(data);
      else handleUnifiedData(data);
    });
  } else {
    google.script.run    
      .withSuccessHandler(function(result) {    
        handleUnifiedData(result);    
      })    
      .withFailureHandler(function(e) {    
        console.error('TeamSwitch:', e);    
        setLoadMsg('Error loading team data');    
        handleUnifiedData(null);    
      })    
      .getUnifiedPartnerData(newTeam);    
  }
}

/** V11 fix: Personal (proxy) always available when URL configured.
    Shared (GmailApp) gated by team's canSendShared flag. */
function applySendFromRestriction() {
  var dd = document.getElementById('sendFromSelect');
  if (!dd) return;
  var personalOpt = dd.querySelector('option[value="personal"]');
  var sharedOpt = dd.querySelector('option[value="shared"]');
  var sharedPersOpt = dd.querySelector('option[value="shared_personal"]');
  if (personalOpt) {
    if (!_mailConfig.proxyUrl) { personalOpt.style.display = 'none'; personalOpt.disabled = true; }
    else { personalOpt.style.display = ''; personalOpt.disabled = false; }
  }
  if (sharedOpt) {
    if (!_canSendShared || !_mailConfig.sharedEmail) { sharedOpt.style.display = 'none'; sharedOpt.disabled = true; }
    else { sharedOpt.style.display = ''; sharedOpt.disabled = false; }
  }
  if (sharedPersOpt) {
    if (!_canSendShared || !_mailConfig.sharedEmail) { sharedPersOpt.style.display = 'none'; sharedPersOpt.disabled = true; }
    else { sharedPersOpt.style.display = ''; sharedPersOpt.disabled = false; }
  }
  var selOpt = dd.querySelector('option[value="' + dd.value + '"]');
  if (selOpt && (selOpt.disabled || selOpt.style.display === 'none')) {
    if (sharedPersOpt && !sharedPersOpt.disabled) dd.value = 'shared_personal';
    else if (personalOpt && !personalOpt.disabled) dd.value = 'personal';
    else if (sharedOpt && !sharedOpt.disabled) dd.value = 'shared';
  }
}

// ── Inline status pill (bottom-right, above toasts) ─────────────────────────      
var _proxyStatusEl = null;      
var _proxyFrame = null;

function showProxyStatus(state, data, errorMsg) {      
  if (!_proxyStatusEl) {      
    _proxyStatusEl = document.createElement('div');      
    _proxyStatusEl.style.cssText =      
      'position:fixed;bottom:24px;right:24px;z-index:10001;' +      
      'padding:12px 18px;border-radius:10px;' +      
      'font-family:Barlow,Arial,Helvetica,sans-serif;font-size:12px;font-weight:600;' +      
      'display:flex;align-items:center;gap:8px;' +      
      'box-shadow:0 4px 20px rgba(0,0,0,0.15);' +      
      'transition:all 0.3s ease;opacity:0;transform:translateY(8px)';      
    document.body.appendChild(_proxyStatusEl);      
    // trigger entrance animation      
    requestAnimationFrame(function() {      
      requestAnimationFrame(function() {      
        if (_proxyStatusEl) { _proxyStatusEl.style.opacity = '1'; _proxyStatusEl.style.transform = 'translateY(0)'; }      
      });      
    });      
  }

  var el = _proxyStatusEl;

  if (state === 'connecting' || state === 'retrieving') {      
    el.style.background = '#1a1a19'; el.style.color = '#faf9f7';      
    var n = data || '';      
    el.innerHTML = '<span style="font-size:15px">📧</span> Preparing' + (n ? ' ' + n + ' email' + (n > 1 ? 's' : '') : '') + '…';      
  }      
  else if (state === 'sending') {      
    el.style.background = '#1a1a19'; el.style.color = '#faf9f7';      
    var n = data || '';      
    el.innerHTML = '<span style="font-size:15px">📧</span> Sending' + (n ? ' ' + n + ' email' + (n > 1 ? 's' : '') : '') + '…';      
  }      
  else if (state === 'done') {      
    var sent = 0;      
    if (Array.isArray(data)) { sent = data.filter(function(r) { return r && r.status === 'sent'; }).length; }      
    else if (typeof data === 'number') { sent = data; }      
    el.style.background = '#16a34a'; el.style.color = '#fff';      
    el.innerHTML = '<span style="font-size:15px">✓</span> ' + (sent || 'All') + ' email' + (sent !== 1 ? 's' : '') + ' sent';      
    setTimeout(hideProxyStatus, 3500);      
  }      
  else if (state === 'error') {      
    el.style.background = '#dc2626'; el.style.color = '#fff';      
    el.innerHTML = '<span style="font-size:15px">✗</span> ' + (errorMsg || 'Send failed');      
    setTimeout(hideProxyStatus, 5000);      
  }      
}

function hideProxyStatus() {      
  if (!_proxyStatusEl) return;      
  _proxyStatusEl.style.opacity = '0';      
  _proxyStatusEl.style.transform = 'translateY(8px)';      
  setTimeout(function() {      
    if (_proxyStatusEl) { try { _proxyStatusEl.remove(); } catch(e) {} _proxyStatusEl = null; }      
  }, 300);      
}

function cleanupProxyFrame() {      
  if (_proxyFrame) { try { _proxyFrame.remove(); } catch(e) {} _proxyFrame = null; }      
}

// Legacy alias — called at end of submitEmailCampaign      
function closeProxyWindow() { cleanupProxyFrame(); }

// ── Send a batch via hidden iframe (no popup) ───────────────────────────────      
// queue: array of { to, subject, htmlBody, storeName, templateName }      
// Returns a Promise that resolves with results array when sends complete.      
//      
// Flow:      
//   1\. stageProxyQueue() → UrlFetchApp POSTs queue to proxy's CacheService → UUID      
//   2\. Hidden iframe loads proxyUrl?q=UUID      
//   3\. Proxy retrieves queue, processes sends, postMessages results back      
//   4\. Inline status pill shows progress, auto-hides on completion      
//   5\. Promise resolves with results (or [] on timeout)      
//      
function sendViaProxyBatch(queue, attachmentsByIndex) {      
  return new Promise(function(resolve, reject) {      
    if (!_mailConfig.proxyUrl) { reject(new Error('Mail proxy not configured')); return; }      
    if (!queue || !queue.length) { resolve([]); return; }

    var queueJson = JSON.stringify(queue);      
    var total = queue.length;
    var hasAttachments = !!(attachmentsByIndex && Object.keys(attachmentsByIndex).length);

    // Step 1: Stage queue on proxy's CacheService via NEXUS backend relay      
    showProxyStatus('connecting', total);

    google.script.run      
      .withSuccessHandler(function(uuid) {      
        if (!uuid) {      
          showProxyStatus('error', null, 'Staging returned no queue ID');      
          reject(new Error('Staging returned no queue ID'));      
          return;      
        }

        // Step 2: Create hidden iframe to load the proxy      
        var frame = document.createElement('iframe');      
        frame.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;top:-100px;left:-100px;border:0';      
        frame.src = _mailConfig.proxyUrl + '?q=' + encodeURIComponent(uuid) + (hasAttachments ? '&a=1' : '');      
        document.body.appendChild(frame);      
        _proxyFrame = frame;

        // Step 3: Listen for postMessage from proxy iframe      
        var settled = false;
        var readyAcked = false;

        function onMessage(e) {      
          if (!e.data || e.data.type !== 'nexus-proxy-result') return;

          // V3.8 — Attachment handshake. On 'ready', ship each attachment
          // as its own postMessage then signal 'go'. Proxy accumulates them
          // under queue index, verifies bytes match filename, then sends.
          if (e.data.status === 'ready' && !readyAcked && hasAttachments) {
            readyAcked = true;
            try {
              var target = frame.contentWindow;
              Object.keys(attachmentsByIndex).forEach(function(idxStr) {
                var idx = parseInt(idxStr, 10);
                var a = attachmentsByIndex[idxStr];
                target.postMessage({
                  type: 'nexus-proxy-attachment',
                  index: idx,
                  filename: a.filename,
                  mime: a.mime,
                  base64: a.base64
                }, '*');
              });
              target.postMessage({ type: 'nexus-proxy-go' }, '*');
            } catch (postErr) {
              settled = true;
              window.removeEventListener('message', onMessage);
              clearTimeout(safetyTimeout);
              showProxyStatus('error', null, 'Attachment transfer failed: ' + postErr.message);
              cleanupProxyFrame();
              reject(postErr);
            }
            return;
          }

          if (e.data.status === 'sending') {      
            showProxyStatus('sending', e.data.total || total);      
          }      
          else if (e.data.status === 'done' && !settled) {      
            settled = true;      
            window.removeEventListener('message', onMessage);      
            clearTimeout(safetyTimeout);      
            var results = e.data.results || [];      
            showProxyStatus('done', results);      
            cleanupProxyFrame();      
            resolve(results);      
          }      
          else if (e.data.status === 'error' && !settled) {      
            settled = true;      
            window.removeEventListener('message', onMessage);      
            clearTimeout(safetyTimeout);      
            showProxyStatus('error', null, e.data.message);      
            cleanupProxyFrame();      
            reject(new Error(e.data.message || 'Proxy error'));      
          }      
        }      
        window.addEventListener('message', onMessage);

        // Safety timeout: 90 seconds for plain batches; bump to 180 when
        // attachments are in play since each send includes a blob upload
        // to Gmail (~500ms extra per send).
        var safetyTimeout = setTimeout(function() {      
          if (settled) return;      
          settled = true;      
          window.removeEventListener('message', onMessage);      
          cleanupProxyFrame();      
          showProxyStatus('done', total);  // assume success (sends may still complete)      
          resolve([]);      
        }, hasAttachments ? 180000 : 90000);      
      })      
      .withFailureHandler(function(err) {      
        showProxyStatus('error', null, 'Failed to stage queue');      
        reject(new Error('Failed to stage email queue: ' + (err.message || 'unknown error')));      
      })      
      .stageProxyQueue(queueJson);      
  });      
}

var sendViaProxy = sendViaProxyBatch;

/**
 * V3.2 — Data-transform shared between handleUnifiedData (one-time init)
 * and refreshUnifiedData (post-boot updates from snapshot remote-refresh or
 * manual refresh). Builds P[], calEvents, SEASONS, contactMap from the payload.
 * Returns true when result had partners, false when cleared/empty.
 */
function buildStateFromResult_(result) {
  if (!result || !result.partners) {
    P = []; calEvents = []; contactMap = {};
    SEASONS = { allSeasons: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } };
    BREAKDOWNS = {
      season: { allValues: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } },
      brand:  { allValues: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } },
      family: { allValues: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } }
    };
    return false;
  }

  cockpitYears = result.cockpitYears || cockpitYears;
  kpiWeekLabels = result.kpiWeekLabels || [];
  calEvents = result.calendarEvents || [];
  SEASONS = result.seasons || { allSeasons: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } };
  // V3.7 fix — BREAKDOWNS was declared but never assigned, so all the
  // dim-aware code in cockpit/drawer/overview was silently falling through to
  // the season-only legacy path. Wire it up here from result.breakdowns.
  if (result.breakdowns) {
    BREAKDOWNS = {
      season: result.breakdowns.season || { allValues: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } },
      brand:  result.breakdowns.brand  || { allValues: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } },
      family: result.breakdowns.family || { allValues: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } }
    };
  } else {
    // Pre-V3.7 payload (shouldn't happen post-rollout): synth season subtree
    // from SEASONS so the dim-aware code at least has the season axis to use.
    BREAKDOWNS = {
      season: { allValues: SEASONS.allSeasons || [], byStore: SEASONS.byStore || {}, soh: SEASONS.soh || { byStore: {} }, totals: SEASONS.totals || { sales: {}, soh: {} } },
      brand:  { allValues: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } },
      family: { allValues: [], byStore: {}, soh: { byStore: {} }, totals: { sales: {}, soh: {} } }
    };
  }
  contactMap = {};

  var syntheticRow = -1;
  P = result.partners.map(function(p) {
    var model = p.cockpit_model || p.model || '';
    var country = p.cockpit_country || p.country || '';
    var row = p.row || syntheticRow--;
    var ytd_pct = p.py_ytd > 0 ? (p.cy_ytd - p.py_ytd) / p.py_ytd : 0;
    var w4_pct = p.py_4w > 0 ? (p.cy_4w - p.py_4w) / p.py_4w : 0;
    var d7_pct = p.py_7d > 0 ? (p.cy_7d - p.py_7d) / p.py_7d : 0;
    var fp_share = p.cy_ytd > 0 ? p.cy_fp / p.cy_ytd : 0;
    var units_pct = p.py_units_tot > 0 ? (p.cy_units_tot - p.py_units_tot) / p.py_units_tot : 0;

    if (p.contacts && p.contacts.length) {
      var primaries = p.contacts.filter(function(c) { return c.is_primary === true || c.is_primary === 'TRUE'; });
      if (!primaries.length) primaries = [p.contacts[0]];
      var primaryEmails = primaries.map(function(c) { return c.contact_email; }).filter(Boolean);
      contactMap[(p.company || p.account_name).toLowerCase()] = {
        email: primaryEmails.join(','),
        name: primaries[0].contact_name || '',
        role: primaries[0].contact_role || '',
        allEmails: p.contacts.map(function(c) { return c.contact_email; }).filter(Boolean)
      };
    }

    return {
      row: row, company: p.company || p.account_name, store_group: p.cockpit_store_group || '', country: country,
      language: p.language || '', partnerType: p.partnerType || '', model: model,
      email: p.email || '', notes: p.notes || '', stage: p.stage || 'Active - Stable',
      nextAction: p.nextAction || 'None', actionDate: p.actionDate || '',
      lastSent: p.lastSent || '', lastReceived: p.lastReceived || '',
      latestEmail: p.latestEmail || '{}', tags: p.tags || '', partnerValue: p.partnerValue || '',
      rank: p.rank || 0,
      cy_ytd: p.cy_ytd, py_ytd: p.py_ytd, cy_fp: p.cy_fp, py_fp: p.py_fp,
      cy_4w: p.cy_4w, py_4w: p.py_4w, cy_7d: p.cy_7d, py_7d: p.py_7d,
      cy_units_on: p.cy_units_on, py_units_on: p.py_units_on,
      cy_units_tot: p.cy_units_tot, py_units_tot: p.py_units_tot,
      ytd_pct: ytd_pct, w4_pct: w4_pct, d7_pct: d7_pct, fp_share: fp_share, units_pct: units_pct,
      insight_tags: p.insight_tags || [], stock_trend: p.stock_trend || [],
      cy_offline_pct: p.cy_offline_pct || 0,
      account_manager: p.account_manager || '',  // V3.8 — Sales Data col E, informational
      kpi: p.kpi || null,
      crm_matched: p.crm_matched, cockpit_matched: p.cockpit_matched,
      contacts: p.contacts || [], recent_campaigns: p.recent_campaigns || [],
      send_totals: p.send_totals || { sent: 0, replied: 0 }
    };
  });

  P = P.filter(function(p) { return p.cockpit_matched; });
  P.sort(function(a, b) { return b.cy_ytd - a.cy_ytd; });
  return true;
}

/**
 * One-time init: builds state + runs full view init + downstream fetches
 * (initEmailView, loadAllContacts) + reveals the app. Sets _bootCompleted so
 * subsequent snapshot refreshes route through refreshUnifiedData.
 * Safe to call with null/empty result — just renders empty state.
 */
function handleUnifiedData(result) {
  buildStateFromResult_(result);
  try { buildUnifiedSchedule(); setupPartnerFilters(); } catch(e) { console.error('NEXUS init prep:', e); }
  try { buildCockpitView(); } catch(e) { console.error('NEXUS buildCockpitView:', e); }
  try { renderPartnersTable(); } catch(e) { console.error('NEXUS renderPartnersTable:', e); }
  try { renderCalendar(); } catch(e) { console.error('NEXUS renderCalendar:', e); }
  try { initEmailView(); } catch(e) { console.error('NEXUS initEmailView:', e); }
  try { loadAllContacts(); } catch(e) { console.error('NEXUS loadAllContacts:', e); }
  // Landing = the priority board "AM - {team}" (Overview is now its child).
  // Heads/Admins (v2) land on the all-teams "Head" rollup instead.
  _syncPriorityNav_();
  switchView((_isV2 && _isHead) ? 'head' : 'priority');
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  refreshIcons();
  updatePendingBadge();
  document.getElementById('syncLabel').textContent = (_userTeam ? _userTeam + ' · ' : '') + P.length + ' Partners';
  _bootCompleted = true;
  // Deep-link entry (?team=/?view=): apply once when BOTH the app is visible
  // (here) AND permissions are applied (Step 2). Whichever happens second fires
  // it — this guards against the early-hydrate path finalizing before perms, the
  // case where an admin's ?view=head link was wrongly hitting "no permission".
  _maybeApplyDeepLink_();
}

// Apply the ?team=/?view= deep-link exactly once, and only when permissions are
// loaded AND the app is shown. Called from both the perms step and boot finalize.
function _maybeApplyDeepLink_() {
  try {
    if (typeof NX_DEEP === 'undefined' || !NX_DEEP || !(NX_DEEP.team || NX_DEEP.view)) return;
    if (!_permsApplied || !_bootCompleted) return;   // need perms AND visible app
    if (typeof nxApplyDeepLink_ !== 'function') return;
    var _deep = NX_DEEP; NX_DEEP = null;              // null first so it can't re-fire
    nxApplyDeepLink_(_deep);
  } catch (e) { console.error('NEXUS deep-link:', e); }
}

/**
 * V3.2 — Post-boot refresh: rebuilds P[] + re-renders data views only.
 * Does NOT re-init email/contacts or fire downstream GAS calls, and does
 * NOT touch the loading overlay. Called on snapshot remote-refresh and
 * manual pill refresh once _bootCompleted is true.
 */
function refreshUnifiedData(result) {
  if (!buildStateFromResult_(result)) return;
  try { buildUnifiedSchedule(); setupPartnerFilters(); } catch(e) { console.error('NEXUS refresh prep:', e); }
  try { buildCockpitView(); } catch(e) { console.error('NEXUS refresh cockpit:', e); }
  try { renderPartnersTable(); } catch(e) { console.error('NEXUS refresh partners:', e); }
  try { renderCalendar(); } catch(e) { console.error('NEXUS refresh calendar:', e); }
  try { var pv = document.getElementById('view-priority'); if (pv && pv.style.display !== 'none') initPriorityView(); } catch(e) { console.error('NEXUS refresh priority:', e); }
  refreshIcons();
  document.getElementById('syncLabel').textContent = (_userTeam ? _userTeam + ' · ' : '') + P.length + ' Partners';
}

function buildUnifiedSchedule() {      
  unifiedSchedule = [];      
  calEvents.forEach(function(e) {      
    if (!e.start) return;      
    var d = new Date(e.start); if (isNaN(d.getTime())) return;   // V3.17 — skip invalid dates      
    unifiedSchedule.push({ title: e.title, desc: e.desc, date: d, isGCal: e.isGCal !== false, isInternal: !!e.isInternal, time: e.isAllDay ? 'All Day' : d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });      
  });      
  P.forEach(function(d) {      
    if (d.actionDate && d.stage !== 'Inactive') {
      var _ad = new Date(d.actionDate);   // V3.17 — skip invalid CRM action dates
      if (!isNaN(_ad.getTime())) unifiedSchedule.push({ title: d.company + ' — ' + d.nextAction, desc: d.notes, date: _ad, isGCal: false, isInternal: false, time: 'CRM Action' });
    }
  });      
}

/* ═══════════════════════════════════════      
   FILTERED VIEWS      
═══════════════════════════════════════ */      
function cockpitPartners() { return P.filter(function(p) { return p.cockpit_matched; }); }      
var ckKpiMonthIdx = 0;
var ckKpiAvailMonths = [];
function stockPartners() {      
  return P.filter(function(p) { return p.stock_trend && p.stock_trend.length > 0; }).map(function(p) {      
    var v = p.stock_trend, t = v[0] || 0, prev = v[1] || 0, d15 = v[v.length - 1] || 0;      
    var diff = t - prev, pct15 = d15 === 0 ? 0 : (t - d15) / d15;      
    return { store: p.company, values: v, today: t, diff: diff, pct15: pct15, flag: pct15 > 0.15 ? 'Spike' : pct15 < -0.15 ? 'Drop' : 'Stable', _p: p };      
  });      
}      
function kpiPartners() {
  var MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var out = [];

  ckKpiAvailMonths = [];
  var monthSet = {};
  P.forEach(function(p) {
    if (p.kpi && p.kpi.months && p.kpi.months.length) {
      p.kpi.months.forEach(function(m) { var ym = m.substring(0, 7); monthSet[ym] = true; });
    }
  });
  ckKpiAvailMonths = Object.keys(monthSet).sort().reverse();
  if (ckKpiMonthIdx >= ckKpiAvailMonths.length) ckKpiMonthIdx = Math.max(0, ckKpiAvailMonths.length - 1);
  var selectedMonth = ckKpiAvailMonths[ckKpiMonthIdx] || '';

  P.forEach(function(p) {
    if (!p.kpi) return;
    try {
      var k = p.kpi;
      var months = k.months || [];
      if (!months.length) return;
      var indexed = months.map(function(m, i) { return { key: m, idx: i }; });
      indexed.sort(function(a, b) { return b.key.localeCompare(a.key); });
      var curEntry = null;
      for (var wi = 0; wi < indexed.length; wi++) {
        if (indexed[wi].key.substring(0, 7) === selectedMonth) { curEntry = indexed[wi]; break; }
      }
      if (!curEntry) curEntry = indexed[0];
      var curPos = -1;
      for (var pi = 0; pi < indexed.length; pi++) {
        if (indexed[pi].idx === curEntry.idx) { curPos = pi; break; }
      }
      var prevEntry = (curPos >= 0 && curPos + 1 < indexed.length) ? indexed[curPos + 1] : null;
      var curIdx = curEntry.idx;
      var prevIdx = prevEntry ? prevEntry.idx : -1;
      function valAt(arr, idx) { return (arr && idx >= 0 && idx < arr.length) ? (arr[idx] || 0) : 0; }
      function periodLabel(mk) {
        if (!mk || mk.length < 7) return '';
        var parts = mk.split('-');
        var mi = parseInt(parts[1], 10) - 1;
        if (isNaN(mi) || mi < 0 || mi > 11) return mk;
        return MONTH_NAMES[mi] + ' ' + parts[0];
      }
      out.push({
        store: p.company, model: p.model, country: p.country,
        currentMonthLabel: periodLabel(curEntry.key),
        prevMonthLabel: prevEntry ? periodLabel(prevEntry.key) : '',
        ns_now: valAt(k.ns_pct, curIdx), sos_now: valAt(k.sos_pct, curIdx),
        wi_now: valAt(k.wi_pct, curIdx), perfect_now: valAt(k.perfect_pct, curIdx),
        ns_prev: valAt(k.ns_pct, prevIdx), sos_prev: valAt(k.sos_pct, prevIdx),
        wi_prev: valAt(k.wi_pct, prevIdx), perfect_prev: valAt(k.perfect_pct, prevIdx),
        orders_now: valAt(k.orders, curIdx), penalty_now: valAt(k.penalty, curIdx),
        imperfect_now: valAt(k.imperfect, curIdx),
        orders_prev: valAt(k.orders, prevIdx), penalty_prev: valAt(k.penalty, prevIdx),
        imperfect_prev: valAt(k.imperfect, prevIdx), _p: p
      });
    } catch(e) { console.error('NEXUS kpiPartners skip:', p.company, e); }
  });
  return out;
}

/* ═══════════════════════════════════════      
   HELPERS      
═══════════════════════════════════════ */      
function fGtv(n) { if (!n || n === 0) return '$0'; if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M'; if (n >= 1000) return '$' + Math.round(n / 1000) + 'K'; return '$' + n; }      
function fPct(cy, py) { return (!py || py === 0) ? null : (cy - py) / py; }      
function fPctStr(pct, colored) {      
  if (pct === null || pct === undefined) return '—';      
  var s = (pct >= 0 ? '+' : '') + Math.round(pct * 100) + '%';      
  if (!colored) return s;      
  return '<span style="color:' + (pct >= 0 ? '#16a34a' : '#dc2626') + ';font-weight:600">' + s + '</span>';      
}      
function stageClass(s) { var st = String(s || '').toLowerCase(); if (st.includes('disengaged')) return 'pill-attention'; if (st.includes('attention')) return 'pill-attention'; if (st.includes('onboarding')) return 'pill-onboard'; if (st.includes('resolution')) return 'pill-issue'; if (st.includes('inactive')) return 'pill-inactive2'; if (st.includes('active')) return 'pill-stable'; return 'pill-inactive2'; }      
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }      
function showToast(msg, type) { var t = document.createElement('div'); t.className = 'toast toast-' + (type || 'success'); t.textContent = msg; document.getElementById('toastContainer').appendChild(t); setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(function() { t.remove(); }, 300); }, 3500); }      
function kpiHtml(label, value, sub) { return '<div class="kpi-card"><div class="kpi-label">' + label + '</div><div class="kpi-value">' + value + '</div><div class="kpi-sub">' + sub + '</div></div>'; }

var _iconTimer = null;      
function refreshIcons() { clearTimeout(_iconTimer); _iconTimer = setTimeout(function() { if (window.lucide) window.lucide.createIcons(); }, 30); }

/* ═══════════════════════════════════════      
   VIEW SWITCHING      
═══════════════════════════════════════ */      
function switchView(v) {      
  if (v === 'overview') v = 'priority';   // V3.18 — Overview removed; folded into the Priority landing
  // 'team' is now a REAL composite view (priorities + huddle/holiday summaries).
  // Decision: keep the accordion AND add the view — clicking Team expands the
  // Huddles/Calendar/Holidays subs AND opens view-team (fall through below).
  if (v === 'team') {
    setTeamGroupVisible_(true);
  }

  var views = ['priority', 'overview', 'cockpit', 'bidask', 'partners', 'calendar', 'email', 'campaigns', 'replies', 'contacts', 'admin', 'huddle', 'holidays', 'head', 'team'];
  views.forEach(function(id) { var el = document.getElementById('view-' + id); if (el) el.style.display = 'none'; });
  var flexViews = ['priority', 'partners', 'email', 'campaigns', 'replies', 'contacts', 'admin', 'huddle', 'holidays', 'head', 'bidask', 'team'];
  var el = document.getElementById('view-' + v);      
  if (el) el.style.display = flexViews.indexOf(v) > -1 ? 'flex' : 'block';      
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });      
  var navEl = document.getElementById('nav-' + v); if (navEl) navEl.classList.add('active');
  // Replies is a tab inside the merged Campaigns view — keep nav-campaigns lit for it
  if (v === 'replies') { var cNav2 = document.getElementById('nav-campaigns'); if (cNav2) cNav2.classList.add('active'); }
  // Team parent stays "active-ish" while any sub is open — gives visual continuity
  var teamSubs = ['huddle', 'calendar', 'holidays'];
  var teamNav = document.getElementById('nav-team');
  if (teamNav) {
    if (teamSubs.indexOf(v) > -1) teamNav.classList.add('parent-active'); else teamNav.classList.remove('parent-active');
  }
  // V3.11 — Team subs visibility: stay open whenever any sub is the active view
  var inTeam = teamSubs.indexOf(v) > -1;
  if (inTeam) setTeamGroupVisible_(true);
  var cNav = document.getElementById('nav-contacts'); if (cNav) cNav.style.display = (v === 'partners' || v === 'contacts') ? 'flex' : 'none';      
  // V3.8 — Bid-Ask sub-item under Cockpit
  var baNav = document.getElementById('nav-bidask'); if (baNav) baNav.style.display = (v === 'cockpit' || v === 'bidask') ? 'flex' : 'none';
  // V3.8 — Reply Center sibling of Campaigns under Outreach
  var campNav = document.getElementById('nav-campaigns'); if (campNav) campNav.style.display = (v === 'email' || v === 'campaigns' || v === 'replies') ? 'flex' : 'none';
  // (Reply Center is now the "Replies" tab inside the Campaigns view — no nav-replies item.)
  var titles = { priority: 'Priority', overview: 'Overview', cockpit: 'Cockpit', bidask: 'Bid-Ask', partners: 'Partners', calendar: 'Calendar', email: 'Outreach', campaigns: 'Campaigns', replies: 'Campaigns', contacts: 'Contacts', admin: 'Admin', huddle: 'Huddles', holidays: 'Holidays', head: 'Head', team: 'Team' };
  var titleEl = document.getElementById('pageTitle');
  titleEl.textContent = (v === 'priority') ? _amLandingLabel_() : (titles[v] || v);
  var ckToggle = document.getElementById('ckTabToggle'); if (ckToggle) ckToggle.style.display = v === 'cockpit' ? 'flex' : 'none';    
  // Topbar view badge kept hidden (OPS Projects view removed / descoped).
  var viewBadge = document.getElementById('topbarViewBadge');    
  if (viewBadge) { viewBadge.textContent = ''; viewBadge.style.display = 'none'; }    
  if (v === 'priority') { try { initPriorityView(); } catch(e) { console.error('NEXUS initPriorityView:', e); } }
  if (v === 'overview') { buildOverviewGreeting(); buildOverview(); }
  if (v === 'cockpit') buildCockpitView();
  if (v === 'bidask') initBidAskView();
  if (v === 'email') initEmailView();      
  if (v === 'campaigns') initCampaignsView();      
  if (v === 'replies') initReplyCenterView();
  if (v === 'contacts') loadAllContacts();      
  if (v === 'admin') initAdminView();      
  if (v === 'huddle') initHuddleView();
  if (v === 'holidays') initHolidaysView();
  if (v === 'head') initHeadView();
  if (v === 'team') { try { initTeamView(); } catch(e) { console.error('NEXUS initTeamView:', e); } }
  refreshIcons();      
}

// V3.11 — Helpers for the Team parent's expand/collapse behavior. Subs are
// shown/hidden by toggling display on the three nav items as a group.
function teamGroupVisible_() {
  var n = document.getElementById('nav-huddle');
  return n && n.style.display !== 'none';
}
function setTeamGroupVisible_(visible) {
  ['nav-huddle', 'nav-calendar-sub', 'nav-holidays'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = visible ? 'flex' : 'none';
  });
}

// Landing naming: the priority board is titled after the active team, "AM - {team}".
function _amTeamName_() {
  if (_userTeams && _userTeams.length) {
    var t = _userTeams.find(function(x) { return x.name === _userTeam; });
    if (t) return t.label || t.name || _userTeam;
  }
  return _userTeam || '';
}
function _amLandingLabel_() {
  var n = _amTeamName_();
  return n || 'Priority';
}
function _syncPriorityNav_() {
  var el = document.getElementById('navPriorityLabel');
  if (el) el.textContent = _amLandingLabel_();
}

function buildOverviewGreeting() {
  var el = document.getElementById('ovTitle');
  if (el) el.textContent = (typeof _userTeam !== 'undefined' && _userTeam) ? ('Overview · ' + _userTeam) : 'Overview';
  var countEl = document.getElementById('ovPartnerCount');
  if (countEl) countEl.textContent = P.length + ' Partners';      
}

function handleSearch() { if (document.getElementById('view-partners').style.display !== 'flex') switchView('partners'); filterPartners(); }

function toggleNotif() {      
  notifOpen = !notifOpen;      
  document.getElementById('notifPanel').style.display = notifOpen ? 'block' : 'none';      
  if (notifOpen) renderNotif();      
}      
document.addEventListener('click', function(e) {      
  if (!notifOpen) return;      
  var btn = document.getElementById('notifBtn'), panel = document.getElementById('notifPanel');      
  if ((btn && btn.contains(e.target)) || (panel && panel.contains(e.target))) return;      
  notifOpen = false; document.getElementById('notifPanel').style.display = 'none';      
});

function renderNotif() {      
  var range = getBizRange(5);      
  var upcoming = P.filter(function(d) { return d.actionDate && d.actionDate >= range.min && d.actionDate <= range.max && !String(d.stage || '').includes('Inactive'); });      
  var html = '';      
  if (!upcoming.length) { html = '<div style="padding:24px;text-align:center"><div style="font-size:22px;margin-bottom:4px">✅</div><p style="font-size:12px;font-weight:600;color:var(--ink-3)">All caught up!</p></div>'; }      
  else {      
    html = '<div style="padding:10px 14px;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4)">Upcoming · ' + upcoming.length + ' tasks</div>';      
    upcoming.slice(0, 6).forEach(function(d) { html += '<div style="padding:8px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s" onmouseenter="this.style.background=\'var(--bg)\'" onmouseleave="this.style.background=\'\'" onclick="openDeal(' + d.row + ');notifOpen=false;document.getElementById(\'notifPanel\').style.display=\'none\'"><div style="font-size:12px;font-weight:600">' + esc(d.company) + '</div><div style="font-size:10px;color:var(--ink-3)">' + d.actionDate + ' · ' + (d.nextAction || 'Action') + '</div></div>'; });      
  }      
  document.getElementById('notifContent').innerHTML = html;      
}

function getBizRange(n) { var dates = [], d = new Date(); dates.push(d.toISOString().split('T')[0]); var temp = new Date(d), count = 0; while (count < n) { temp = new Date(temp.getTime() + 86400000); if (temp.getDay() !== 0 && temp.getDay() !== 6) { dates.push(temp.toISOString().split('T')[0]); count++; } } return { min: dates[0], max: dates[dates.length - 1] }; }

function updatePendingBadge() {      
  var n = pendingContacts.length;      
  var badge = document.getElementById('pendingBadge');      
  if (badge) { badge.style.display = n > 0 ? 'inline' : 'none'; badge.textContent = n; }      
  var adminBadge = document.getElementById('adminPendingBadge');      
  if (adminBadge) { adminBadge.style.display = n > 0 ? 'inline' : 'none'; adminBadge.textContent = n; }      
}

/* ═══════════════════════════════════════      
   PLACEHOLDER RESOLUTION      
═══════════════════════════════════════ */      
// Offline-stock % for the {{offline_pct}} placeholder — from cy_offline_pct
// (fraction), falling back to 1 - units_online/units_total. Blank if no data.
function _offlinePctStr(deal){
  var f = (deal.cy_offline_pct != null && deal.cy_offline_pct !== '') ? Number(deal.cy_offline_pct)
        : ((deal.cy_units_tot || 0) > 0 ? 1 - (Number(deal.cy_units_on) || 0) / Number(deal.cy_units_tot) : null);
  return (f != null && !isNaN(f)) ? (f * 100).toFixed(1) + '%' : '';
}

function applyPlaceholders(text, deal) {      
  var contact = contactMap[(deal.company || '').toLowerCase()];      
  var cn = (contact && contact.name) ? contact.name : ((deal.company || 'Partner') + ' team');      
  var ce = contact ? contact.email : (deal.email || '');      
  var ytdPct = deal.ytd_pct || 0;      
  var varStr = (ytdPct >= 0 ? '+' : '') + Math.round(ytdPct * 100) + '%';      
  var now = new Date(), months = ['January','February','March','April','May','June','July','August','September','October','November','December'];      

  // --- SIGNATURE RESOLUTION ---
  var sendFromEl = document.getElementById('sendFromSelect');
  var composeFromEl = document.getElementById('composeSendFrom');
  var isShared = false;
  
  // Read whichever Send-from control is actually ON SCREEN. The compose select
  // sits inside a CSS-hidden modal during the wizard, so its inline style.display
  // is empty (not 'none') and the old check wrongly read it — leaving the wizard
  // stuck on 'signed as me'. offsetParent is null when an element (or an ancestor)
  // is display:none, so it reliably tells us which control is visible.
  var _vis = function(el){ return !!(el && el.offsetParent !== null); };
  if (_vis(composeFromEl)) {
    isShared = composeFromEl.value === 'shared';
  } else if (_vis(sendFromEl)) {
    isShared = sendFromEl.value === 'shared';
  } else {
    isShared = (sendFromEl && sendFromEl.value === 'shared') || (composeFromEl && composeFromEl.value === 'shared');
  }

  var rawSender = _userEmail ? _userEmail.split('@')[0].split('.').map(function(w){ return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ') : '';
  
  // If dropdown is 'shared' OR the parsed email is 'commercialsupport', force the correct name
  if (isShared || rawSender.replace(/\s+/g, '').toLowerCase() === 'commercialsupport') {
    rawSender = 'Commercial Support';
  }

  var map = {      
    'sender_name': rawSender,      
    'partner_name': deal.company || '', 'partner': deal.company || '', 'store': deal.company || '',      
    'contact_name': cn, 'contact': cn, 'contact_email': ce, 'contact_role': contact ? contact.role || '' : '',      
    'ytd_yoy': varStr, 'var_pct': varStr,
    'offline_pct': _offlinePctStr(deal), 'offline': _offlinePctStr(deal),
    'today': now.toLocaleDateString('en-IE'), 'month': months[now.getMonth()],      
    'year': String(now.getFullYear()), 'quarter': 'Q' + (Math.floor(now.getMonth() / 3) + 1),      
    'stage': deal.stage || '', 'model': deal.model || '', 'country': deal.country || '',      
    'ytd_gtv': fGtv(deal.cy_ytd), 'ytd': fGtv(deal.cy_ytd), 'fp_gtv': fGtv(deal.cy_fp),      
    '4w_gtv': fGtv(deal.cy_4w), '7d_gtv': fGtv(deal.cy_7d),      
    'four_week': fGtv(deal.cy_4w), 'seven_day': fGtv(deal.cy_7d),      
    'next_action': deal.nextAction || '', 'last_action': deal.nextAction || '',      
    'action_date': deal.actionDate || '', 'tags': deal.tags || '', 'notes': deal.notes || '',      
    'last_sent': deal.lastSent || '', 'last_received': deal.lastReceived || '',      
    'partner_value': deal.partnerValue || '', 'partner_type': deal.partnerType || '',      
    'language': deal.language || '', 'insight_tags': (deal.insight_tags || []).join(', ')      
  };      
  return text.replace(/\{\{([^}]+)\}\}/g, function(match, key) { var val = map[key.toLowerCase().trim()]; return val !== undefined ? val : match; });      
}

function checkUnresolved(text) { var out = [], re = /\{\{([^}]+)\}\}/g, m; while ((m = re.exec(text)) !== null) out.push(m[0]); return out; }
