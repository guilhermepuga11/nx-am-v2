<style>
/* ═══════════════════════════════════════════════════════════════════════════
   BID-ASK SUB-VIEW (V2 — adapted from the bid-ask skeleton into NEXUS)

   A partner-prioritisation dashboard: weighted Priority score, alert flags,
   and Sales / Commercial-Discount / Stock / Performance metric groups, with a
   configurable Priority-Weights panel and per-row alert-email composers.

   • Style  = NEXUS (Barlow, monochrome chrome + the EXISTING NEXUS semantic
     pill colors for data heat). All selectors scoped under #view-bidask (chrome)
     or .ba-ov (modals, appended to body) so nothing leaks into the rest of NEXUS.
   • Logic  = NEXUS: data via getBidAskData(team) → { headers, rows, empty, … };
     rows are mapped header→key and every score/alert is computed client-side,
     exactly like the skeleton. No backend redeploy needed when the sheet schema
     grows — unknown columns are ignored, missing ones degrade gracefully.

   Data source (placeholder until populated): the per-team prefixed `Bid-Ask`
   tab in BIDASK_SHEET_ID (Carlos `Bid-Ask`, Daniel `(Dan) Bid-Ask`,
   Tanya `(Tan) Bid-Ask`). Expected column headers = the keys in BA_HEADER_MAP
   below (see the steps doc). Percent columns may be stored as fractions (0.25)
   or whole percents (25) — BA.pctNorm handles both.
═══════════════════════════════════════════════════════════════════════════ */
#view-bidask{font-family:'Barlow',sans-serif;}
#view-bidask .ba-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;flex-shrink:0;}
#view-bidask .ba-toolbar label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4);}
#view-bidask .ba-f-input{background:var(--bg);border:1px solid var(--border);border-radius:9px;
  padding:5px 10px;font:600 11.5px 'Barlow',sans-serif;color:var(--ink);outline:none;width:210px;}
#view-bidask .ba-f-input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(13,13,12,.08);}
#view-bidask .ba-f-sel{background:var(--bg);border:1px solid var(--border);border-radius:9px;
  padding:5px 9px;font:600 11px 'Barlow',sans-serif;color:var(--ink-2);outline:none;cursor:pointer;}
#view-bidask .ba-f-sel.active-filter{background:var(--ink);color:#fff;border-color:var(--ink);}
#view-bidask .ba-sep{width:1px;height:20px;background:var(--border);margin:0 2px;}
#view-bidask .ba-btn{border-radius:9px;padding:5px 11px;font:700 10.5px 'Barlow',sans-serif;
  letter-spacing:.03em;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
#view-bidask .ba-btn-weights{background:var(--ink);color:#fff;border:1px solid var(--ink);}
#view-bidask .ba-btn-weights:hover{opacity:.85;}
#view-bidask .ba-btn-clear{background:var(--surface);color:var(--ink-3);border:1px solid var(--border);}
#view-bidask .ba-btn-clear:hover{border-color:var(--border-2);color:var(--ink);}
#view-bidask .ba-rowcount{margin-left:auto;font-size:10px;font-weight:600;color:var(--ink-3);}

/* legend */
#view-bidask .ba-legend{display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:7px 14px;background:var(--surface-2,#fafaf8);border-bottom:1px solid var(--border);font-size:9.5px;color:var(--ink-3);}
#view-bidask .ba-leg{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
#view-bidask .ba-leg-dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
#view-bidask .ba-col-note{font-size:8px;color:var(--ink-4);vertical-align:super;}

/* stat cards */
#view-bidask .ba-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:12px 14px 4px;flex-shrink:0;}
#view-bidask .ba-stat{position:relative;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px 10px 18px;box-shadow:0 1px 2px rgba(13,13,12,.05);}
#view-bidask .ba-stat::before{content:"";position:absolute;left:0;top:11px;bottom:11px;width:4px;border-radius:0 3px 3px 0;background:var(--ink);}
#view-bidask .ba-stat.s-red::before{background:#be123c;}
#view-bidask .ba-stat.s-amber::before{background:#b45309;}
#view-bidask .ba-stat.s-violet::before{background:#7c3aed;}
#view-bidask .ba-stat.s-green::before{background:#15803d;}
#view-bidask .ba-stat.s-teal::before{background:var(--ink-3);}
#view-bidask .ba-stat-num{display:block;font-size:24px;font-weight:800;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;}
#view-bidask .ba-stat-lbl{display:block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);margin-top:4px;}

/* table */
#view-bidask .ba-table-wrap{flex:1;overflow:auto;margin:10px 14px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 2px rgba(13,13,12,.05);}
#view-bidask table.ba-table{width:100%;border-collapse:collapse;font-size:11px;font-variant-numeric:tabular-nums;}
#view-bidask .ba-table th{position:sticky;background:#ebebe7;font-weight:800;text-align:center;
  padding:6px 5px;white-space:nowrap;border-bottom:1px solid var(--border);}
#view-bidask .ba-table tr.th-g th{top:0;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);
  border-bottom-width:2px;z-index:3;}
#view-bidask .ba-table tr.th-s th{top:25px;font-size:8.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-3);
  cursor:pointer;z-index:2;border-bottom:2px solid var(--ink);}
#view-bidask .ba-table tr.th-s th:hover{color:var(--ink);}
#view-bidask .ba-table tr.th-s th.sort-asc::after{content:" ↑";color:var(--ink);}
#view-bidask .ba-table tr.th-s th.sort-desc::after{content:" ↓";color:var(--ink);}
#view-bidask .ba-table td{padding:3px 6px;text-align:center;border-bottom:1px solid var(--border);color:var(--ink-2);}
#view-bidask .ba-table td.ta-l{text-align:left;}
#view-bidask .ba-table td.cg{background:rgba(13,13,12,.015);}
#view-bidask .ba-table .tx-bold{font-weight:700;color:var(--ink);}
#view-bidask .ba-table tbody tr:hover td{background:var(--bg);}
#view-bidask .ba-table tbody tr.row-crit td{background:#fff1f2;}
#view-bidask .ba-table tbody tr.row-warn td{background:#fffbeb;}
#view-bidask .ba-table tbody tr.row-noprods td{background:#f0fdf4;}

/* priority chip */
#view-bidask .ba-prio{display:inline-flex;align-items:center;justify-content:center;width:22px;height:20px;
  border-radius:6px;font-weight:800;font-size:11px;color:#fff;}
#view-bidask .prio-h{background:#be123c;}
#view-bidask .prio-m{background:#b45309;}
#view-bidask .prio-l{background:var(--ink-4);}

/* alert + var badges (NEXUS semantic palette) */
#view-bidask .ba-ab{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;
  border-radius:4px;font-size:9px;font-weight:800;margin:0 1px;}
#view-bidask .ab-red{background:#fff1f2;color:#be123c;border:1px solid #fecdd3;}
#view-bidask .ab-amber{background:#fffbeb;color:#b45309;border:1px solid #fde68a;}
#view-bidask .ab-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
#view-bidask .ab-teal{background:var(--bg);color:var(--ink-3);border:1px solid var(--border);}
#view-bidask .ba-vb{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:5px;font-size:10px;font-weight:700;}
#view-bidask .var-up{background:#f0fdf4;color:#15803d;}
#view-bidask .var-dn{background:#fff1f2;color:#be123c;}
#view-bidask .var-warn{background:#fffbeb;color:#b45309;}
#view-bidask .var-neu{color:var(--ink-3);}
#view-bidask .var-top{background:var(--ink);color:#fff;}
#view-bidask .ps-cell{display:flex;align-items:center;justify-content:center;gap:4px;}
#view-bidask .ps-out{font-size:9px;font-weight:700;color:#b45309;}

/* row action buttons */
#view-bidask .ba-abtn{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;
  padding:0 4px;border-radius:5px;font-size:9px;font-weight:800;cursor:pointer;border:1px solid var(--border);
  background:var(--surface);color:var(--ink-2);transition:all .14s;}
#view-bidask .ba-abtn:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
#view-bidask .cd-actions{display:flex;gap:3px;justify-content:center;}
#view-bidask .ba-muted{color:var(--ink-4);font-size:9px;}
#view-bidask .ba-empty{padding:48px 24px;text-align:center;color:var(--ink-3);}
#view-bidask .ba-empty svg{color:var(--ink-4);margin-bottom:10px;}

/* ── modals (appended to <body>, so scoped by .ba-ov not #view-bidask) ── */
.ba-ov{position:fixed;inset:0;z-index:140;background:rgba(13,13,12,.5);
  display:none;align-items:center;justify-content:center;padding:24px;}
.ba-ov.open{display:flex;}
.ba-modal{background:var(--surface);border-radius:18px;width:100%;max-width:680px;max-height:86vh;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 50px -16px rgba(13,13,12,.4);font-family:'Barlow',sans-serif;}
.ba-modal.wide{max-width:820px;}
.ba-modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  padding:16px 20px;border-bottom:1px solid var(--border);}
.ba-modal-title{font-size:15px;font-weight:800;letter-spacing:-.02em;color:var(--ink);}
.ba-modal-sub{font-size:11px;color:var(--ink-3);margin-top:2px;}
.ba-modal-x{background:var(--bg);border:1px solid var(--border);border-radius:8px;width:28px;height:28px;
  cursor:pointer;color:var(--ink-3);font-size:15px;line-height:1;flex-shrink:0;}
.ba-modal-x:hover{background:var(--ink);color:#fff;}
.ba-modal-body{padding:18px 20px;overflow-y:auto;}
.ba-modal-ftr{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface-2,#fafaf8);}
.ba-drill{width:100%;border-collapse:collapse;font-size:11.5px;}
.ba-drill th{text-align:left;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-3);padding:6px 10px;border-bottom:2px solid var(--ink);}
.ba-drill td{padding:5px 10px;border-bottom:1px solid var(--border);color:var(--ink-2);}
.ba-drill tr.row-neg td{background:#fff1f2;}
.ba-vb{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:5px;font-size:10px;font-weight:700;}
.ba-vb.var-up{background:#f0fdf4;color:#15803d;}
.ba-vb.var-dn{background:#fff1f2;color:#be123c;}
.ba-field{margin-bottom:12px;}
.ba-field label{display:block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);margin-bottom:4px;}
.ba-field input,.ba-field textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:8px 11px;font:400 12.5px 'Barlow',sans-serif;color:var(--ink);outline:none;resize:vertical;}
.ba-field input:focus,.ba-field textarea:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(13,13,12,.08);}
.ba-btn-p{background:var(--ink);color:#fff;border:none;border-radius:10px;padding:8px 16px;font:700 12px 'Barlow',sans-serif;cursor:pointer;}
.ba-btn-p:hover{opacity:.85;}
.ba-btn-g{background:var(--surface);color:var(--ink-2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font:600 12px 'Barlow',sans-serif;cursor:pointer;}
.ba-btn-g:hover{background:var(--bg);}
.ba-check{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12.5px;color:var(--ink-2);}
.ba-check input{accent-color:var(--ink);width:14px;height:14px;}
/* weights panel */
.ba-wgrp{margin-bottom:14px;}
.ba-wgrp-hdr{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px;}
.ba-wgrp-dot{width:8px;height:8px;border-radius:2px;}
.ba-wrow{display:grid;grid-template-columns:34px 1fr 120px 52px;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);}
.ba-wrow.w-off{opacity:.4;}
.ba-wlbl{font-size:12px;font-weight:700;color:var(--ink);}
.ba-wdesc{font-size:10px;color:var(--ink-3);}
.ba-wtrack{height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.ba-wfill{height:100%;background:var(--ink);border-radius:99px;}
.ba-winput{width:52px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:4px 6px;font:700 11px 'Barlow',sans-serif;color:var(--ink);text-align:right;outline:none;}
.ba-wtotal{display:flex;align-items:center;justify-content:space-between;padding:10px 0 2px;font-size:12px;font-weight:800;}
.ba-whint{font-size:10.5px;color:var(--ink-3);margin-top:8px;line-height:1.5;}
</style>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   BID-ASK controller. Public entry: initBidAskView() (called by switchView).
   Preserves the original load/refetch contract (per-team, lazy, cached).
═══════════════════════════════════════════════════════════════════════════ */
var BA = (function () {
  'use strict';

  // ── state ──────────────────────────────────────────────────────────────
  var state = { loading:false, raw:null, rows:[], filtered:[], lastFetchTeam:null,
                sortKey:null, sortDir:1, sellThruTop:null, built:false, modalsBuilt:false };

  // ── header → canonical key map (normalise: lowercase alphanumerics) ─────
  // Canonical sheet headers = these keys; common friendly aliases accepted.
  var KEYS = ['name','id','arm','am','gtv_ytd','gtv_ytd_var','gtv_l7d','gtv_wow',
    'net_sales_units','sell_thru','pct_sales','avg_cd_ty','wtd_cd','cd_var_ly',
    'avg_uncomp','units_online','units_wow_pct','stock_offline_pct',
    'products_last_month','orders_last_month','return_rate','perfect_orders'];
  var ALIASES = {
    'store':'name','storename':'name','boutique':'name','partner':'name',
    'storeid':'id','merchantid':'id','skmerchant':'id',
    'accountmanager':'am','accountrelationshipmanager':'arm',
    'gtvytd':'gtv_ytd','gtvytdvar':'gtv_ytd_var','ytdvar':'gtv_ytd_var',
    'gtvl7d':'gtv_l7d','gtvwow':'gtv_wow','wow':'gtv_wow',
    'netsales':'net_sales_units','netsalesunits':'net_sales_units',
    'sellthru':'sell_thru','sellthrough':'sell_thru','pctsales':'pct_sales',
    'cdty':'avg_cd_ty','avgcdty':'avg_cd_ty','cdend':'wtd_cd','wtdcd':'wtd_cd',
    'varly':'cd_var_ly','cdvarly':'cd_var_ly','uncomp':'avg_uncomp','avguncomp':'avg_uncomp',
    'uncompetitiveness':'avg_uncomp','units':'units_online','unitsonline':'units_online',
    'unitswow':'units_wow_pct','unitswowpct':'units_wow_pct',
    'offline':'stock_offline_pct','stockoffline':'stock_offline_pct','stockofflinepct':'stock_offline_pct',
    'products':'products_last_month','productslastmonth':'products_last_month',
    'orders':'orders_last_month','orderslastmonth':'orders_last_month',
    'returns':'return_rate','returnrate':'return_rate','perfect':'perfect_orders','perfectorders':'perfect_orders'
  };
  function norm(h){ return String(h==null?'':h).toLowerCase().replace(/[^a-z0-9]/g,''); }
  function keyFor(h){ var n=norm(h); if(KEYS.indexOf(n)>-1) return n; return ALIASES[n]||null; }

  // ── numeric helpers ────────────────────────────────────────────────────
  var PCT_KEYS = {gtv_ytd_var:1,gtv_wow:1,sell_thru:1,pct_sales:1,units_wow_pct:1,
                  stock_offline_pct:1,return_rate:1,perfect_orders:1};
  // accept fractions (0.25) or whole percents (25) — store as fraction
  function pctNorm(v){ if(v==null||v==='') return null; var n=Number(v); if(isNaN(n)) return null;
                       return Math.abs(n)>1.5 ? n/100 : n; }
  function num(v){ if(v==null||v==='') return null; var n=Number(v); return isNaN(n)?null:n; }

  // map a backend {headers, rows} into typed record objects
  function mapRows(d){
    var headers=(d&&d.headers)||[], rows=(d&&d.rows)||[];
    var colKey=headers.map(keyFor);
    return rows.map(function(r,ri){
      var o={};
      for(var c=0;c<colKey.length;c++){
        var k=colKey[c]; if(!k) continue;
        var v=r[c];
        if(PCT_KEYS[k]) o[k]=pctNorm(v);
        else if(k==='name'||k==='arm'||k==='am'||k==='id') o[k]=(v==null?'':String(v));
        else o[k]=num(v);
      }
      if(o.name==null) o.name='Row '+(ri+1);
      if(!o.id) o.id=norm(o.name)||('row'+ri);
      if(o.arm==null) o.arm=''; if(o.am==null) o.am='';
      return o;
    });
  }

  // ── formatters ─────────────────────────────────────────────────────────
  function abbr(n){ n=String(n||''); if(!n) return '—'; var p=n.trim().split(/\s+/);
                    return p.length===1?p[0]:(p[0][0]+'. '+p[p.length-1]); }
  function fmtGTV(v){ if(v==null) return '—'; if(v>=1e6) return '$'+(v/1e6).toFixed(2)+'M';
                      if(v>=1e3) return '$'+(v/1e3).toFixed(0)+'K'; return '$'+v; }
  function fmtNum(v){ if(v==null) return '—'; return v.toLocaleString(); }
  function pctTxt(v,d){ if(v==null) return '—'; return (v*100).toFixed(d==null?1:d)+'%'; }
  function vb(v,isGood,fmt){ if(v==null) return '<span class="var-neu">—</span>';
    var pos=v>=0, good=isGood?pos:!pos, cls=good?'var-up':'var-dn', arr=pos?'▲':'▼';
    return '<span class="ba-vb '+cls+'">'+arr+' '+(fmt?fmt(Math.abs(v)):pctTxt(Math.abs(v)))+'</span>'; }

  function pctileTop(arr,p){ if(!arr.length) return null; var s=arr.slice().sort(function(a,b){return a-b;});
    var idx=(s.length-1)*p, lo=Math.floor(idx), hi=Math.ceil(idx);
    return lo===hi?s[lo]:s[lo]+(s[hi]-s[lo])*(idx-lo); }
  function sellThruCell(v){ if(v==null) return '<span class="var-neu">—</span>';
    var t=pctTxt(v); if(state.sellThruTop!=null&&v>=state.sellThruTop)
      return '<span class="ba-vb var-top" title="Top 10% sell-through in current view">★ '+t+'</span>';
    return t; }
  function pctSalesCell(v){ if(v==null) return '<span class="var-neu">—</span>';
    var out=1-v, ff=(v*100).toFixed(0)+'%';
    var ob=out>=0.25?'<span class="ps-out" title="'+(out*100).toFixed(1)+'% sold outside Farfetch">⚠ '+(out*100).toFixed(0)+'%</span>':'';
    return '<div class="ps-cell"><span>'+ff+'</span>'+ob+'</div>'; }

  // ── priority weights (identical model to the skeleton) ──────────────────
  var WEIGHT_DEFS=[
    {key:'wow',      cat:'Sales',       color:'#15803d', label:'GTV WoW Decline',         desc:'Rises as WoW decline deepens (0 → −50%)',        def:25, cap:[0,.5],  src:function(r){return Math.max(0,-(r.gtv_wow==null?0:r.gtv_wow));}},
    {key:'ytd_var',  cat:'Sales',       color:'#15803d', label:'GTV YTD Variance Decline', desc:'Rises as YTD variance turns negative (0 → −50%)', def:15, cap:[0,.5],  src:function(r){return Math.max(0,-(r.gtv_ytd_var==null?0:r.gtv_ytd_var));}},
    {key:'sellthru', cat:'Sales',       color:'#15803d', label:'Low Sell-Through',         desc:'Rises below 60% sell-through rate',               def:5,  cap:[0,.6],  src:function(r){return Math.max(0,.60-(r.sell_thru==null?.60:r.sell_thru));}},
    {key:'uncomp',   cat:'Commercial',  color:'#7c3aed', label:'AVG Uncompetitiveness',    desc:'Rises with uncompetitiveness index (0 → 30)',     def:15, cap:[0,30],  src:function(r){return r.avg_uncomp==null?0:r.avg_uncomp;}},
    {key:'cd',       cat:'Commercial',  color:'#7c3aed', label:'CD Negative Variance LY',  desc:'Rises as commercial discount drops vs LY',        def:5,  cap:[0,20],  src:function(r){return Math.max(0,-(r.cd_var_ly==null?0:r.cd_var_ly));}},
    {key:'offline',  cat:'Stock',       color:'#b45309', label:'Stock Offline %',          desc:'Rises with % of stock offline (0 → 50%)',         def:10, cap:[0,.5],  src:function(r){return r.stock_offline_pct==null?0:r.stock_offline_pct;}},
    {key:'units_wow',cat:'Stock',       color:'#b45309', label:'Units Online WoW Decline', desc:'Rises as units online decline WoW',               def:5,  cap:[0,.3],  src:function(r){return Math.max(0,-(r.units_wow_pct==null?0:r.units_wow_pct));}},
    {key:'noprods',  cat:'Stock',       color:'#b45309', label:'No Products Last Month',   desc:'Binary: 0 products created = full factor weight', def:5,  cap:[0,1],   src:function(r){return r.products_last_month===0?1:0;}},
    {key:'ret',      cat:'Performance', color:'#1d4ed8', label:'Return Rate',              desc:'Rises with return rate (0 → 30%)',                def:10, cap:[0,.30], src:function(r){return r.return_rate==null?0:r.return_rate;}},
    {key:'perfect',  cat:'Performance', color:'#1d4ed8', label:'Low Perfect Orders',       desc:'Rises as perfect orders fall below 95%',          def:5,  cap:[0,.20], src:function(r){return Math.max(0,.95-(r.perfect_orders==null?.95:r.perfect_orders));}}
  ];
  var weights={}; WEIGHT_DEFS.forEach(function(d){ weights[d.key]=d.def; });

  function calcPriority(r){
    var raw=0, tot=0, k; for(k in weights) tot+=weights[k]; if(!tot) tot=100;
    WEIGHT_DEFS.forEach(function(d){
      var lo=d.cap[0], hi=d.cap[1], v=d.src(r);
      var n=hi===lo?0:Math.max(0,Math.min(1,(v-lo)/(hi-lo)));
      raw+=n*(weights[d.key]/tot);
    });
    return Math.max(1,Math.min(10,Math.round(raw*10)));
  }
  function getAlerts(r){
    var a=[], s=r.stock_offline_pct||0, w=r.gtv_wow||0, ret=r.return_rate||0;
    if(s>0.30) a.push({c:'ab-red',l:'O',t:'Stock Offline > 30%'});
    else if(s>0.15) a.push({c:'ab-amber',l:'O',t:'Stock Offline > 15%'});
    if(w<-0.25) a.push({c:'ab-red',l:'G',t:'GTV WoW decline > 25%'});
    else if(w<-0.10) a.push({c:'ab-amber',l:'G',t:'GTV WoW decline > 10%'});
    if(ret>0.30) a.push({c:'ab-red',l:'R',t:'Return rate > 30%'});
    else if(ret>0.20) a.push({c:'ab-amber',l:'R',t:'Return rate > 20%'});
    if((r.avg_uncomp||0)>20) a.push({c:'ab-amber',l:'U',t:'Uncompetitiveness > 20'});
    if(r.products_last_month===0) a.push({c:'ab-blue',l:'P',t:'0 new products last month'});
    if((r.sell_thru==null?1:r.sell_thru)<0.15) a.push({c:'ab-teal',l:'T',t:'Sell-through < 15%'});
    return a;
  }
  function rowClass(r){
    var s=r.stock_offline_pct||0, w=r.gtv_wow||0, ret=r.return_rate||0;
    if(s>0.30||w<-0.25||ret>0.30) return 'row-crit';
    if(s>0.15||w<-0.10||ret>0.20||(r.avg_uncomp||0)>20) return 'row-warn';
    if(r.products_last_month===0) return 'row-noprods';
    return '';
  }
  function isPerfRed(r){ return (r.return_rate||0)>0.30 || (r.perfect_orders==null?1:r.perfect_orders)<0.85; }

  // ── filters / sort / render ──────────────────────────────────────────────
  function val(id){ var el=document.getElementById(id); return el?el.value:''; }
  function applyFilters(){
    var q=val('baSearch').toLowerCase(), arm=val('baARM'), am=val('baAM'), al=val('baAlert'), pr=val('baPrio');
    ['baARM','baAM','baAlert','baPrio'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.toggle('active-filter',el.value!=='');});
    state.filtered=state.rows.filter(function(r){
      if(q && r.name.toLowerCase().indexOf(q)<0 && r.am.toLowerCase().indexOf(q)<0 && r.arm.toLowerCase().indexOf(q)<0) return false;
      if(arm && r.arm!==arm) return false;
      if(am && r.am!==am) return false;
      if(al){ var rc=rowClass(r);
        if(al==='crit'&&rc!=='row-crit') return false;
        if(al==='warn'&&rc!=='row-warn') return false;
        if(al==='noprods'&&rc!=='row-noprods') return false; }
      if(pr){ var p=calcPriority(r);
        if(pr==='high'&&p<8) return false;
        if(pr==='mid'&&(p<4||p>7)) return false;
        if(pr==='low'&&p>3) return false; }
      return true;
    });
    renderTable();
  }
  function clearFilters(){ ['baSearch','baARM','baAM','baAlert','baPrio'].forEach(function(id){var el=document.getElementById(id);if(el){el.value='';el.classList.remove('active-filter');}}); applyFilters(); }
  function sortVal(r,k){ if(k==='priority') return calcPriority(r); if(k==='_alert') return getAlerts(r).length;
    var v=r[k]; if(v==null) return state.sortDir===1?-Infinity:Infinity; return typeof v==='string'?v.toLowerCase():v; }
  function sortBy(k,th){
    if(state.sortKey===k) state.sortDir*=-1; else { state.sortKey=k; state.sortDir=1; }
    var host=document.getElementById('view-bidask');
    host.querySelectorAll('tr.th-s th').forEach(function(t){t.classList.remove('sort-asc','sort-desc');});
    if(th) th.classList.add(state.sortDir===1?'sort-asc':'sort-desc');
    renderTable();
  }
  function renderTable(){
    var data=state.filtered.slice();
    if(state.sortKey){ var k=state.sortKey, dir=state.sortDir;
      data.sort(function(a,b){var av=sortVal(a,k),bv=sortVal(b,k);return av<bv?-dir:av>bv?dir:0;}); }
    else data.sort(function(a,b){return calcPriority(b)-calcPriority(a);});
    var st=data.map(function(r){return r.sell_thru;}).filter(function(v){return v!=null;});
    state.sellThruTop=st.length?pctileTop(st,0.9):null;
    var tb=document.getElementById('baBody');
    if(!tb) return;
    if(!data.length){
      tb.innerHTML='<tr><td colspan="26"><div class="ba-empty">'
        + '<i data-lucide="search-x" style="width:30px;height:30px"></i>'
        + '<div style="font-size:13px;font-weight:600;color:var(--ink-2)">No partners match the current filters.</div>'
        + '<div style="margin-top:10px"><button class="ba-btn ba-btn-clear" onclick="BA.clearFilters()">✕ Clear filters</button></div>'
        + '</div></td></tr>';
    } else {
      tb.innerHTML=data.map(buildRow).join('');

    var rc=document.getElementById('baRowCount'); if(rc) rc.textContent=data.length+' / '+state.rows.length+' partners';
    updateStats(data);
    refreshIcons();
  }
  function updateStats(data){
    var crit=0,warn=0,hi=0,ok=0,cd=0;
    data.forEach(function(r){ var rc=rowClass(r);
      if(rc==='row-crit')crit++; else if(rc==='row-warn')warn++;
      if(calcPriority(r)>=8)hi++; if(!rc)ok++;
      if((r.avg_cd_ty!=null)||(r.cd_var_ly!=null))cd++; });
    set('baStAll',data.length);set('baStCrit',crit);set('baStWarn',warn);
    set('baStHi',hi);set('baStOk',ok);set('baStCd',cd);
  }

    eachWeight(function(d,en,inp){ if(en&&en.checked){ var nv=Math.round((Number(inp.value)||0)/t*100); inp.value=nv;

  function applyWeights(){ var t=0; eachWeight(function(d,en,inp){ if(en&&en.checked) t+=Number(inp.value)||0; });

    set2('baModalStockSub',esc(r.name)+' — Offline: '+(r.stock_offline_pct!=null?(r.stock_offline_pct*100).toFixed(1)+'%':'—'));
    setVal('baModalStockTo',''); setVal('baModalStockSubj','[Farfetch] Stock on Hand Request — '+r.name);
    setVal('baModalStockBody','Dear '+r.name+' team,\n\nWe have noticed that '+(r.stock_offline_pct!=null?(r.stock_offline_pct*100).toFixed(1)+'%':'a portion')+' of your stock is currently offline on Farfetch.\n\nCould you please share your current Stock on Hand file so we can help get your full catalogue live?\n\nBest regards,\n'+(r.am||'Your Account Manager'));
    open('baModalStock'); }
  function openPerf(id){ var r=findRow(id); if(!r) return; var issues=[];
    if((r.return_rate||0)>0.30) issues.push('  • Return rate: '+(r.return_rate*100).toFixed(1)+'% (threshold 30%)');
    if((r.perfect_orders==null?1:r.perfect_orders)<0.85) issues.push('  • Perfect order rate: '+(r.perfect_orders*100).toFixed(1)+'% (threshold 85%)');
    set2('baModalPerfSub',esc(r.name)+' — Returns: '+(r.return_rate!=null?(r.return_rate*100).toFixed(1)+'%':'—')+' · Perfect: '+(r.perfect_orders!=null?(r.perfect_orders*100).toFixed(1)+'%':'—'));
    setVal('baModalPerfTo',''); setVal('baModalPerfSubj','[Farfetch] Performance Alert — '+r.name);
    setVal('baModalPerfBody','Dear '+r.name+' team,\n\nWe have identified the following performance issues on your store (last complete month):\n\n'+issues.join('\n')+'\n\nCould you please review and let us know your plan to improve these metrics?\n\nBest regards,\n'+(r.am||'Your Account Manager'));
    open('baModalPerf'); }
  function openGTV(id){ var r=findRow(id); if(!r) return; state._gtv=id;
    set2('baModalGTVSub',esc(r.name)+' — WoW: '+(r.gtv_wow!=null?(r.gtv_wow*100).toFixed(1)+'%':'—')+' · YTD: '+fmtGTV(r.gtv_ytd));
    var checks=[['g1','Boost catalogue — request new products & content',true],['g2','More aggressive commercial discounts',false],
                ['g3','Promotional event participation',false],['g4','Improve product content (images, descriptions)',false]];
    document.getElementById('baGTVChecks').innerHTML=checks.map(function(c){
      return '<label class="ba-check"><input type="checkbox" id="ba'+c[0]+'" '+(c[2]?'checked':'')+' onchange="BA.updateGTV()"> '+c[1]+'</label>'; }).join('');
    setVal('baModalGTVTo',''); setVal('baModalGTVSubj','[Farfetch] GTV Recovery Plan — '+r.name);
    updateGTV(); open('baModalGTV'); }
  function updateGTV(){ var r=findRow(state._gtv); if(!r) return; var a=[];
    if(chk('bag1')) a.push('- Boost catalogue: please upload new products with full content (images, descriptions, sizing).');
    if(chk('bag2')) a.push('- Commercial discounts: please review and increase discounts to improve price competitiveness.');
    if(chk('bag3')) a.push('- Promotional events: we would like to invite you to participate in upcoming promotional events.');
    if(chk('bag4')) a.push('- Content improvement: please enhance product imagery and descriptions to drive conversion.');
    setVal('baModalGTVBody','Dear '+r.name+' team,\n\nWe have observed a decline in your GTV performance (WoW: '+(r.gtv_wow!=null?(r.gtv_wow*100).toFixed(1)+'%':'—')+', YTD: '+fmtGTV(r.gtv_ytd)+').\n\nTo support recovery, we recommend:\n\n'+a.join('\n')+'\n\nPlease let us know if you need any assistance.\n\nBest regards,\n'+(r.am||'Your Account Manager')); }

  function copyDraft(id){
    var to=val(id+'To'), subj=val(id+'Subj'), body=val(id+'Body');
    var text='To: '+to+'\nSubject: '+subj+'\n\n'+body;
    var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); if(typeof toast==='function') toast('Email draft copied to clipboard'); }
    catch(e){ if(typeof toast==='function') toast('Copy failed — select & copy manually','error'); }
    document.body.removeChild(ta); close(id);
  }

  // small DOM helpers
  function open(id){ var el=document.getElementById(id); if(el) el.classList.add('open'); }
  function close(id){ var el=document.getElementById(id); if(el) el.classList.remove('open'); }
  function set2(id,html){ var el=document.getElementById(id); if(el) el.innerHTML=html; }
  function setVal(id,v){ var el=document.getElementById(id); if(el) el.value=v; }
  function chk(id){ var el=document.getElementById(id); return el&&el.checked; }

  // ── load / init (preserves the original per-team lazy+cached contract) ───
  function load(){
    state.loading=true;
    var body=document.getElementById('baBody');
    if(body) body.innerHTML='<tr><td colspan="26"><div class="ba-empty"><i data-lucide="loader-2" class="spin" style="width:20px;height:20px"></i><div style="margin-top:8px;font-size:12px">Loading Bid-Ask data…</div></div></td></tr>';
    refreshIcons();
    var useGAS=typeof google!=='undefined'&&google.script&&google.script.run;
    if(!useGAS){ onData({headers:[],rows:[],empty:true,teamName:(typeof _userTeam!=='undefined'?_userTeam:'')}); return; }
    google.script.run
      .withSuccessHandler(onData)
      .withFailureHandler(function(e){ onData({headers:[],rows:[],empty:true,error:(e&&e.message)||String(e)}); })
      .getBidAskData(typeof _userTeam!=='undefined'?_userTeam:'');
  }
  function onData(d){
    state.loading=false; state.raw=d||{headers:[],rows:[],empty:true};
    state.lastFetchTeam=(typeof _userTeam!=='undefined')?_userTeam:'';
    
    var allRows = mapRows(state.raw);
    
    // Normalize the team name to lowercase and remove spaces for a safe match
    var teamKey = String(state.lastFetchTeam).trim().toLowerCase();
    var targetARM = null;
    
    if (teamKey.indexOf('dan') > -1) {
      targetARM = 'Daniel Mendes Pereira';
    } else if (teamKey.indexOf('tan') > -1) {
      targetARM = 'Tanya Santos';
    } else if (teamKey.indexOf('carlos') > -1) {
      targetARM = 'Carlos Araújo';
    }
    
    // Filter rows, ensuring we trim any accidental spaces from BigQuery's output
    if (targetARM) {
      state.rows = allRows.filter(function(r) { 
        return String(r.arm).trim() === targetARM; 
      });
    } else {
      state.rows = allRows; // Fallback
    }

    if(!state.rows.length){ renderEmpty(state.raw); return; }
    populateFilters(); buildWeightsUI(); applyFilters();
  }
  function renderEmpty(d){
    var tb=document.getElementById('baBody'); if(!tb) return;
    var team=(d&&d.teamName)||(typeof _userTeam!=='undefined'?_userTeam:''), tab=(d&&d.tabName)||'', err=(d&&d.error)||'';
    set('baRowCount','0 / 0 partners'); ['baStAll','baStCrit','baStWarn','baStHi','baStOk','baStCd'].forEach(function(i){set(i,'0');});
    tb.innerHTML='<tr><td colspan="26"><div class="ba-empty">'
      + '<i data-lucide="construction" style="width:34px;height:34px"></i>'
      + '<div style="font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.01em;margin-bottom:6px">Bid-Ask data coming soon</div>'
      + '<div style="font-size:12px;max-width:520px;margin:0 auto;line-height:1.6">The source sheet is wired'+(tab?' (looking at <b>'+esc(tab)+'</b>)':'')+', but the data tab for <b>'+esc(team)+'</b> isn\'t populated yet. Add the columns from the steps doc, then Refresh.</div>'
      + (err?'<div style="margin-top:12px;font-size:10.5px;color:#be123c;background:#fff1f2;border:1px solid #fecdd3;padding:6px 12px;border-radius:6px;display:inline-block">'+esc(err)+'</div>':'')
      + '<div style="margin-top:16px"><button class="ba-btn ba-btn-clear" onclick="BA.load()">↻ Check again</button></div>'
      + '</div></td></tr>';
    refreshIcons();
  }

  function init(){
    var host=document.getElementById('view-bidask'); if(!host) return;
    var team=(typeof _userTeam!=='undefined')?_userTeam:'';
    if(state.built && state.lastFetchTeam===team && state.rows.length){ renderTable(); return; }  // re-enter, same team
    host.innerHTML=shell();
    if(!state.clickBound){  // bind once — host persists across team switches/re-renders
      host.addEventListener('click',function(e){ var th=e.target.closest&&e.target.closest('tr.th-s th[data-k]'); if(th) sortBy(th.getAttribute('data-k'),th); });
      state.clickBound=true;
    }
    buildModals(); state.built=true;
    if(state.lastFetchTeam!==team || !state.rows.length) load();   // fetch (team changed or first time)
    else { populateFilters(); buildWeightsUI(); applyFilters(); }
    refreshIcons();
  }

  // public surface
  return { init:init, load:load, applyFilters:applyFilters, clearFilters:clearFilters,
    openWeights:function(){ open('baModalWeights'); }, toggleFactor:toggleFactor, onWeight:onWeight,
    normalizeWeights:normalizeWeights, applyWeights:applyWeights, resetWeights:resetWeights,
    openCDEmail:openCDEmail, openStock:openStock, openPerf:openPerf, openGTV:openGTV, updateGTV:updateGTV,
    copyDraft:copyDraft, close:close };
})();

/* NEXUS entry point (called by switchView('bidask')) — name preserved. */
function initBidAskView(){ BA.init(); }
</script>
